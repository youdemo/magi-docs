<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'unsafe-inline'; img-src data: blob:;">
  <title>MultiCLI</title>
  <style>
    /* 设计系统变量 */
    :root {
      --spacing-1: 4px; --spacing-2: 8px; --spacing-3: 12px; --spacing-4: 16px; --spacing-5: 20px;
      --radius-1: 4px; --radius-2: 6px; --radius-3: 8px; --radius-full: 9999px;
      --font-size-1: 11px; --font-size-2: 12px; --font-size-3: 13px;
      --transition-fast: 0.1s ease; --transition-normal: 0.15s ease;

      /* 统一颜色系统 - 角色颜色 */
      --color-orchestrator: #8b5cf6;
      --color-orchestrator-bg: rgba(139, 92, 246, 0.1);
      --color-claude: #c96442;
      --color-claude-bg: rgba(201, 100, 66, 0.1);
      --color-codex: #10a37f;
      --color-codex-bg: rgba(16, 163, 127, 0.1);
      --color-gemini: #4285f4;
      --color-gemini-bg: rgba(66, 133, 244, 0.1);

      /* 统一颜色系统 - 状态颜色 */
      --color-success: #22c55e;
      --color-success-bg: rgba(34, 197, 94, 0.1);
      --color-error: #ef4444;
      --color-error-bg: rgba(239, 68, 68, 0.1);
      --color-warning: #f59e0b;
      --color-warning-bg: rgba(245, 158, 11, 0.1);
      --color-info: #3b82f6;
      --color-info-bg: rgba(59, 130, 246, 0.1);

      /* 统一卡片样式 */
      --card-border-radius: 8px;
      --card-padding: 12px;
      --card-header-gap: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--vscode-font-family); background: var(--vscode-sideBar-background); color: var(--vscode-foreground); height: 100vh; display: flex; flex-direction: column; font-size: var(--font-size-3); overflow: hidden; }

    /* 顶部标题栏 */
    .header-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 var(--spacing-3); background: var(--vscode-sideBar-background); border-bottom: 1px solid var(--vscode-panel-border); height: 40px; flex-shrink: 0; }
    .header-actions { display: flex; align-items: center; gap: var(--spacing-1); }

    /* 会话选择器 */
    .session-selector { position: relative; flex: 1; min-width: 0; }
    .session-selector-btn { display: flex; align-items: center; gap: var(--spacing-2); padding: var(--spacing-1) var(--spacing-2); background: transparent; border: 1px solid transparent; border-radius: var(--radius-2); cursor: pointer; font-size: var(--font-size-2); color: var(--vscode-foreground); transition: all var(--transition-fast); max-width: 100%; width: auto; }
    .session-selector-btn:hover { background: var(--vscode-toolbar-hoverBackground); border-color: var(--vscode-panel-border); }
    .session-selector-btn.open { background: var(--vscode-toolbar-hoverBackground); border-color: var(--vscode-focusBorder); }
    .session-selector-icon { width: 16px; height: 16px; fill: currentColor; opacity: 0.7; flex-shrink: 0; }
    .session-selector-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; font-weight: 500; }
    .session-selector-chevron { width: 12px; height: 12px; fill: currentColor; opacity: 0.5; flex-shrink: 0; transition: transform var(--transition-fast); }
    .session-selector-btn.open .session-selector-chevron { transform: rotate(180deg); }

    /* 会话下拉菜单 */
    .session-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; min-width: 280px; background: var(--vscode-dropdown-background); border: 1px solid var(--vscode-dropdown-border); border-radius: var(--radius-2); box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 100; max-height: 400px; display: none; flex-direction: column; overflow: hidden; }
    .session-dropdown.visible { display: flex; animation: dropdownIn 0.15s ease; }
    @keyframes dropdownIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .session-dropdown-header { display: flex; align-items: center; justify-content: space-between; padding: var(--spacing-2) var(--spacing-3); border-bottom: 1px solid var(--vscode-panel-border); background: var(--vscode-sideBar-background); }
    .session-dropdown-title { font-size: var(--font-size-1); font-weight: 600; color: var(--vscode-descriptionForeground); text-transform: uppercase; letter-spacing: 0.5px; }
    .session-list { flex: 1; overflow-y: auto; padding: var(--spacing-1) 0; }
    .session-dropdown-empty { display: none; flex-direction: column; align-items: center; justify-content: center; padding: var(--spacing-5) var(--spacing-3); color: var(--vscode-descriptionForeground); gap: var(--spacing-2); }
    .session-dropdown-empty svg { width: 32px; height: 32px; fill: currentColor; }
    .session-dropdown-empty.visible { display: flex; }

    /* 会话列表项 */
    .session-item { display: flex; align-items: center; gap: var(--spacing-2); padding: var(--spacing-2) var(--spacing-3); cursor: pointer; transition: background var(--transition-fast); position: relative; }
    .session-item:hover { background: var(--vscode-list-hoverBackground); }
    .session-item.active { background: var(--vscode-list-activeSelectionBackground); }
    .session-item.active .session-item-name { color: var(--vscode-list-activeSelectionForeground); }
    .session-item-icon { width: 16px; height: 16px; fill: currentColor; opacity: 0.6; flex-shrink: 0; }
    .session-item.active .session-item-icon { opacity: 1; }
    .session-item-content { flex: 1; min-width: 0; }
    .session-item-name { font-size: var(--font-size-2); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--vscode-foreground); }
    .session-item-meta { font-size: var(--font-size-1); color: var(--vscode-descriptionForeground); display: flex; gap: var(--spacing-2); margin-top: 2px; }
    .session-item-actions { display: flex; gap: var(--spacing-1); opacity: 0; transition: opacity var(--transition-fast); }
    .session-item:hover .session-item-actions { opacity: 1; }

    .icon-btn-sm { width: 26px; height: 26px; border-radius: var(--radius-1); border: none; background: transparent; color: var(--vscode-descriptionForeground); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s ease, color 0.1s ease; }
    .icon-btn-sm:hover { background: var(--vscode-toolbar-hoverBackground); color: var(--vscode-foreground); }
    .icon-btn-sm:active { background: var(--vscode-toolbar-activeBackground, var(--vscode-list-activeSelectionBackground)); transform: scale(0.96); }
    .icon-btn-sm svg { width: 14px; height: 14px; fill: currentColor; }

    /* 顶部 Tab 栏 */
    .top-tabs { display: flex; align-items: center; padding: 0 var(--spacing-3); background: var(--vscode-sideBar-background); border-bottom: 1px solid var(--vscode-panel-border); height: 36px; flex-shrink: 0; gap: var(--spacing-1); }
    .top-tab { padding: var(--spacing-1) var(--spacing-3); font-size: var(--font-size-2); color: var(--vscode-descriptionForeground); cursor: pointer; border-radius: var(--radius-2); display: flex; align-items: center; gap: var(--spacing-1); transition: all var(--transition-fast); background: transparent; border: none; }
    .top-tab:hover { color: var(--vscode-foreground); background: var(--vscode-toolbar-hoverBackground); }
    .top-tab.active { background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
    .top-tab .badge { background: var(--vscode-badge-background); color: var(--vscode-badge-foreground); font-size: 10px; padding: 1px 5px; border-radius: var(--radius-full); min-width: 16px; text-align: center; }
    .top-tab.active .badge { background: rgba(255,255,255,0.2); }

    /* Tab 内容容器 */
    .tab-content-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .tab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* 底部 Tab 栏 - 切换消息区域内容 */
    .bottom-tabs { display: flex; align-items: center; padding: 0 var(--spacing-2); background: var(--vscode-sideBar-background); border-bottom: 1px solid var(--vscode-panel-border); height: 32px; flex-shrink: 0; gap: var(--spacing-1); }
    .bottom-tab { padding: var(--spacing-1) var(--spacing-2); font-size: var(--font-size-1); color: var(--vscode-descriptionForeground); cursor: pointer; border-radius: var(--radius-1); display: flex; align-items: center; gap: 4px; transition: all var(--transition-fast); background: transparent; border: none; }
    .bottom-tab:hover { color: var(--vscode-foreground); background: var(--vscode-toolbar-hoverBackground); }
    .bottom-tab.active { color: var(--vscode-foreground); background: var(--vscode-input-background); }
    .bottom-tab .dot { width: 6px; height: 6px; border-radius: var(--radius-full); flex-shrink: 0; }
    .bottom-tab .dot.available { background: #3dd68c; }
    .bottom-tab .dot.running { background: #ffc53d; animation: pulse 1.5s ease-in-out infinite; }
    .bottom-tab .dot.unavailable { background: var(--vscode-descriptionForeground); opacity: 0.5; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* CLI 能力标识 */
    .cli-capabilities { display: flex; gap: 2px; margin-left: 4px; }
    .cli-cap-icon { width: 12px; height: 12px; fill: currentColor; opacity: 0.5; }
    .cli-cap-icon.active { opacity: 0.8; }
    .cli-cap-icon.inactive { opacity: 0.2; }
    .bottom-tab:hover .cli-cap-icon { opacity: 0.9; }

    /* 交互模式选择器（下拉框） */
    .mode-selector { padding: 4px 8px; font-size: var(--font-size-1); background: var(--vscode-dropdown-background); color: var(--vscode-dropdown-foreground); border: 1px solid var(--vscode-dropdown-border); border-radius: var(--radius-1); cursor: pointer; outline: none; min-width: 70px; }
    .mode-selector:hover { border-color: var(--vscode-focusBorder); }
    .mode-selector:focus { border-color: var(--vscode-focusBorder); }

    /* 模式指示器 */
    .mode-indicator { display: flex; align-items: center; gap: 4px; font-size: var(--font-size-1); color: var(--vscode-descriptionForeground); padding: 2px 6px; border-radius: var(--radius-1); background: var(--vscode-badge-background); }
    .mode-indicator.ask { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .mode-indicator.agent { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .mode-indicator.auto { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

    /* 阶段指示器 */
    .phase-indicator { display: none; align-items: center; gap: 6px; padding: 6px 12px; background: var(--vscode-editor-background); border-bottom: 1px solid var(--vscode-panel-border); font-size: var(--font-size-2); }
    .phase-indicator.visible { display: flex; }
    .phase-indicator .phase-icon { width: 14px; height: 14px; fill: currentColor; animation: spin 1s linear infinite; }
    .phase-indicator .phase-text { color: var(--vscode-foreground); }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* 恢复确认对话框 */
    .recovery-dialog { display: none; flex-direction: column; gap: var(--spacing-3); padding: var(--spacing-4); background: var(--vscode-editor-background); border: 1px solid var(--vscode-panel-border); border-radius: var(--radius-3); margin: var(--spacing-3); }
    .recovery-dialog.visible { display: flex; }
    .recovery-dialog-title { font-size: var(--font-size-3); font-weight: 600; color: var(--vscode-errorForeground); display: flex; align-items: center; gap: 8px; }
    .recovery-dialog-title svg { width: 16px; height: 16px; fill: currentColor; }
    .recovery-dialog-error { font-size: var(--font-size-2); color: var(--vscode-descriptionForeground); background: var(--vscode-input-background); padding: var(--spacing-2); border-radius: var(--radius-2); max-height: 100px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; }
    .recovery-dialog-actions { display: flex; gap: var(--spacing-2); justify-content: flex-end; }
    .recovery-btn { padding: 6px 12px; font-size: var(--font-size-2); border-radius: var(--radius-2); border: none; cursor: pointer; transition: all var(--transition-fast); }
    .recovery-btn.retry { background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
    .recovery-btn.rollback { background: var(--vscode-errorForeground); color: white; }
    .recovery-btn.continue { background: transparent; color: var(--vscode-descriptionForeground); border: 1px solid var(--vscode-panel-border); }
    .recovery-btn:hover { opacity: 0.9; }

    /* 执行计划确认对话框 - 已移除弹窗，保留内联卡片样式 */
    .plan-confirmation-header { display: flex; align-items: center; gap: 8px; font-size: var(--font-size-3); font-weight: 600; color: var(--vscode-foreground); }
    .plan-confirmation-header svg { width: 14px; height: 14px; fill: var(--vscode-button-background); }
    .plan-confirmation-content { font-size: var(--font-size-2); color: var(--vscode-descriptionForeground); background: var(--vscode-input-background); padding: var(--spacing-3); border-radius: var(--radius-2); max-height: 300px; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
    .plan-confirmation-content h2 { font-size: var(--font-size-3); color: var(--vscode-foreground); margin: 0 0 var(--spacing-2) 0; }
    .plan-confirmation-content strong { color: var(--vscode-foreground); }
    .plan-confirmation-actions { display: flex; gap: var(--spacing-2); justify-content: flex-end; padding-top: var(--spacing-2); border-top: 1px solid var(--vscode-panel-border); }
    .plan-confirm-btn { padding: 8px 16px; font-size: var(--font-size-2); font-weight: 500; border-radius: var(--radius-2); border: none; cursor: pointer; transition: all var(--transition-fast); display: flex; align-items: center; gap: 6px; }
    .plan-confirm-btn.confirm { background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
    .plan-confirm-btn.confirm:hover { background: var(--vscode-button-hoverBackground); }
    .settings-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--spacing-2); }
    .settings-btn { border: 1px solid var(--vscode-button-border, var(--vscode-contrastBorder, rgba(255,255,255,0.1))); border-radius: var(--radius-2); padding: 6px 12px; cursor: pointer; background: var(--vscode-button-background); color: var(--vscode-button-foreground); font-size: var(--font-size-2); min-width: 80px; transition: background var(--transition-fast), border-color var(--transition-fast); }
    .settings-btn:hover { border-color: var(--vscode-focusBorder); }
    .settings-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .settings-btn.secondary { background: var(--vscode-button-secondaryBackground, var(--vscode-button-background)); color: var(--vscode-button-secondaryForeground, var(--vscode-button-foreground)); }
    .settings-btn.secondary:hover { background: var(--vscode-button-secondaryHoverBackground, var(--vscode-button-hoverBackground)); }
    .plan-confirm-btn.cancel { background: transparent; color: var(--vscode-descriptionForeground); border: 1px solid var(--vscode-panel-border); }
    .plan-confirm-btn.cancel:hover { background: var(--vscode-toolbar-hoverBackground); color: var(--vscode-foreground); }
    /* =========================================================================
       统一卡片组件系统 (Unified Card Component System)
       所有卡片类型统一使用此系统，不再使用独立的卡片样式
       ========================================================================= */
    .unified-card {
      background: var(--vscode-editor-background);
      border: 1px solid var(--vscode-panel-border);
      border-radius: var(--card-border-radius);
      margin: var(--spacing-2) 0;
      overflow: hidden;
      width: 100%;
      box-sizing: border-box;
    }

    /* 卡片变体 - 左边框颜色 */
    .unified-card.card-orchestrator { border-left: 3px solid var(--color-orchestrator); }
    .unified-card.card-claude { border-left: 3px solid var(--color-claude); }
    .unified-card.card-codex { border-left: 3px solid var(--color-codex); }
    .unified-card.card-gemini { border-left: 3px solid var(--color-gemini); }
    .unified-card.card-success { border-left: 3px solid var(--color-success); }
    .unified-card.card-error { border-left: 3px solid var(--color-error); }
    .unified-card.card-warning { border-left: 3px solid var(--color-warning); }
    .unified-card.card-info { border-left: 3px solid var(--color-info); }

    /* 卡片头部 */
    .unified-card .card-header {
      display: flex;
      align-items: center;
      gap: var(--card-header-gap);
      padding: var(--spacing-2) var(--card-padding);
      background: var(--vscode-sideBar-background);
      border-bottom: 1px solid var(--vscode-panel-border);
      cursor: default;
    }
    .unified-card.collapsible-panel .card-header { cursor: pointer; }
    .unified-card.collapsible-panel .card-header:hover { background: var(--vscode-list-hoverBackground); }

    .unified-card .card-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .unified-card .card-icon svg { width: 14px; height: 14px; fill: currentColor; opacity: 0.8; }
    .unified-card.card-orchestrator .card-icon svg { fill: var(--color-orchestrator); }
    .unified-card.card-claude .card-icon svg { fill: var(--color-claude); }
    .unified-card.card-codex .card-icon svg { fill: var(--color-codex); }
    .unified-card.card-gemini .card-icon svg { fill: var(--color-gemini); }
    .unified-card.card-success .card-icon svg { fill: var(--color-success); }
    .unified-card.card-error .card-icon svg { fill: var(--color-error); }
    .unified-card.card-warning .card-icon svg { fill: var(--color-warning); }
    .unified-card.card-info .card-icon svg { fill: var(--color-info); }

    .unified-card .card-title {
      font-weight: 600;
      font-size: var(--font-size-2);
      flex: 1;
      color: var(--vscode-foreground);
    }

    .unified-card .card-badges { display: flex; gap: 4px; }
    .unified-card .card-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: var(--radius-1);
      font-weight: 500;
      background: var(--vscode-badge-background);
      color: var(--vscode-badge-foreground);
    }
    .unified-card .card-badge.badge-orchestrator { background: var(--color-orchestrator); color: #fff; }
    .unified-card .card-badge.badge-claude { background: var(--color-claude); color: #fff; }
    .unified-card .card-badge.badge-codex { background: var(--color-codex); color: #fff; }
    .unified-card .card-badge.badge-gemini { background: var(--color-gemini); color: #fff; }
    .unified-card .card-badge.badge-success { background: var(--color-success); color: #fff; }
    .unified-card .card-badge.badge-error { background: var(--color-error); color: #fff; }
    .unified-card .card-badge.badge-warning { background: var(--color-warning); color: #000; }
    .unified-card .card-badge.badge-info { background: var(--color-info); color: #fff; }
    .unified-card .card-badge.badge-pending { background: var(--vscode-charts-yellow); color: #000; }
    .unified-card .card-badge.badge-running { background: var(--vscode-charts-blue); color: #fff; }
    .unified-card .card-badge.badge-completed { background: var(--vscode-charts-green); color: #fff; }
    .unified-card .card-badge.badge-failed { background: var(--vscode-charts-red); color: #fff; }

    .unified-card .card-time {
      font-size: 10px;
      color: var(--vscode-descriptionForeground);
    }

    /* 卡片内容 */
    .unified-card .card-body {
      padding: var(--card-padding);
      font-size: var(--font-size-2);
      line-height: 1.5;
      color: var(--vscode-foreground);
    }
    .unified-card .card-body .markdown-rendered { margin: 0; }

    /* 卡片底部 */
    .unified-card .card-footer {
      display: flex;
      gap: var(--spacing-2);
      justify-content: flex-end;
      padding: var(--spacing-2) var(--card-padding);
      border-top: 1px solid var(--vscode-panel-border);
      background: var(--vscode-sideBar-background);
    }

    /* 卡片类型特定样式 */
    .unified-card.card-type-error { border-color: var(--color-error); background: var(--color-error-bg); }
    .unified-card.card-type-error .card-header { background: rgba(239, 68, 68, 0.15); }
    .unified-card.card-type-warning { border-color: var(--color-warning); background: var(--color-warning-bg); }
    .unified-card.card-type-warning .card-header { background: rgba(245, 158, 11, 0.15); }

    /* 系统提示消息（轻量级内联样式，不使用完整卡片） */
    .system-notice { display: flex; align-items: center; gap: 8px; padding: 6px 12px; margin: 4px 0; font-size: var(--font-size-2); color: var(--vscode-descriptionForeground); border-radius: var(--radius-2); background: transparent; width: 100%; box-sizing: border-box; }
    .system-notice-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
    .system-notice-icon svg { width: 14px; height: 14px; }
    .system-notice.info { color: var(--vscode-textLink-foreground); }
    .system-notice.info .system-notice-icon svg { fill: var(--vscode-textLink-foreground); }
    .system-notice.success { color: var(--vscode-charts-green); }
    .system-notice.success .system-notice-icon svg { fill: var(--vscode-charts-green); }
    .system-notice.warning { color: var(--vscode-charts-yellow); }
    .system-notice.warning .system-notice-icon svg { fill: var(--vscode-charts-yellow); }
    .system-notice.error { color: var(--vscode-errorForeground); }
    .system-notice.error .system-notice-icon svg { fill: var(--vscode-errorForeground); }
    .system-notice-text { flex: 1; }
    .system-notice-time { font-size: 10px; opacity: 0.6; }

    /* 统一卡片内容样式 - 用于卡片内部的特定内容区域 */

    /* 错误卡片内容 */
    .error-content { white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto; }
    .error-hint { margin-top: var(--spacing-2); font-size: var(--font-size-1); color: var(--vscode-descriptionForeground); padding-top: var(--spacing-2); border-top: 1px solid var(--vscode-panel-border); }

    /* 任务卡片内容 */

    .task-card-file-list code { font-family: var(--vscode-editor-font-family); font-size: 11px; background: var(--vscode-textCodeBlock-background); padding: 1px 4px; border-radius: 3px; }

    /* 子任务状态列表 */

    .subtask-status-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius-2); background: rgba(255, 255, 255, 0.02); border: 1px solid transparent; transition: all 0.15s; }
