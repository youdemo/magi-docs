     * 统一的消息列表渲染函数
     * @param {Array} messages - 消息数组
     * @param {object} options - 渲染选项
     * @returns {string} - HTML 字符串
     */
    function renderMessageList(messages, options) {
      const { tabType, defaultCli, toolPanelPrefix, showStreamingHint } = options;

      if (!messages || messages.length === 0) {
        return '';
      }

      // 按时间戳排序
      const sortedMessages = [...messages]
        .map((m, idx) => ({ m, idx }))
        .sort((a, b) => {
          const tsA = a.m.timestamp || a.m.startedAt || a.idx;
          const tsB = b.m.timestamp || b.m.startedAt || b.idx;
          if (tsA !== tsB) return tsA - tsB;
          return a.idx - b.idx;
        });

      let html = '';
      let prevMessageKey = null;

      sortedMessages.forEach(({ m, idx }) => {
        // 尝试渲染特殊消息
        const specialHtml = renderSpecialMessage(m, idx, tabType);
        if (specialHtml !== null) {
          html += specialHtml;
          prevMessageKey = null; // 特殊消息不参与分组
          return;
        }

        // 普通消息渲染
        const isUser = m.role === 'user';
        const source = m.source || 'worker';
        const currentMessageKey = getMessageGroupKey(m, source);
        const isGrouped = prevMessageKey === currentMessageKey;
        prevMessageKey = currentMessageKey;

        const { roleName, badgeClass } = getRoleInfo(m, source, defaultCli);
        const cli = m.cli || defaultCli || 'claude';

        html += renderMessageBlock(m, idx, {
          isUser,
          source,
          cli,
          grouped: isGrouped,
          roleName,
          badgeClass,
          toolPanelPrefix: toolPanelPrefix + idx,
          showStreamingHint: showStreamingHint !== false
        });
      });

      return html;
    }

    // =========================================================================
    // 消息渲染函数
    // =========================================================================

    function renderMessageBlock(message, idx, options) {
      const isUser = !!options.isUser;
      const source = options.source || 'worker';
      const cli = options.cli || message.cli || 'claude';
      const grouped = !!options.grouped;
      const roleName = options.roleName || '';
      const badgeClass = options.badgeClass || '';
      const toolPanelPrefix = options.toolPanelPrefix || 'tool-thread-';
      const showStreamingHint = options.showStreamingHint !== false;

      const streamingClass = message.streaming ? ' streaming' : '';
      const messageTypeClass = isUser ? ' user-message' : ' assistant-message';
      const groupedClass = grouped ? ' grouped' : '';
      // 🆕 澄清消息和 Worker 问题消息的特殊样式类
      const clarificationClass = message.isClarification ? ' clarification-message' : '';
      const workerQuestionClass = message.isWorkerQuestion ? ' worker-question-message' : '';
      const streamKeyAttr = message.streamKey ? (' data-stream-key="' + message.streamKey + '"') : '';
      const cliAttr = cli ? (' data-cli="' + cli + '"') : '';
      let html = '<div class="message' + messageTypeClass + streamingClass + groupedClass + clarificationClass + workerQuestionClass + '" data-msg-idx="' + idx + '"' + streamKeyAttr + cliAttr + '>';
      html += '<div class="message-body">';

      // 悬停操作按钮（非用户消息）
      if (!isUser) {
        html += '<div class="message-actions">';
        html += '<button class="message-action-btn" onclick="copyMessageContent(this, ' + idx + ')" title="复制消息"><svg viewBox="0 0 16 16"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg></button>';
        // 🆕 澄清消息添加跳过按钮
        if (message.isClarification && window._pendingClarification) {
          html += '<button class="message-action-btn" onclick="skipClarification()" title="跳过澄清"><svg viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg></button>';
        }
        // 🆕 Worker 问题消息添加跳过按钮
        if (message.isWorkerQuestion && window._pendingWorkerQuestion) {
          html += '<button class="message-action-btn" onclick="skipWorkerQuestion()" title="跳过问题"><svg viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg></button>';
        }
        html += '</div>';
      }

      html += '<div class="message-header">';
      // 🆕 澄清消息显示特殊徽章
      if (message.isClarification) {
        html += '<span class="clarification-badge"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M5.255 5.786a.237.237 0 0 0 .241.247h.825c.138 0 .248-.113.266-.25.09-.656.54-1.134 1.342-1.134.686 0 1.314.343 1.314 1.168 0 .635-.374.927-.965 1.371-.673.489-1.206 1.06-1.168 1.987l.003.217a.25.25 0 0 0 .25.246h.811a.25.25 0 0 0 .25-.25v-.105c0-.718.273-.927 1.01-1.486.609-.463 1.244-.977 1.244-2.056 0-1.511-1.276-2.241-2.673-2.241-1.267 0-2.655.59-2.75 2.286zm1.557 5.763c0 .533.425.927 1.01.927.609 0 1.028-.394 1.028-.927 0-.552-.42-.94-1.029-.94-.584 0-1.009.388-1.009.94z"/></svg>需求澄清</span>';
      }
      // 🆕 Worker 问题消息显示特殊徽章
      if (message.isWorkerQuestion) {
        const workerId = message.workerQuestionData?.workerId || 'Worker';
        html += '<span class="clarification-badge" style="background: var(--vscode-charts-orange);"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/><path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/></svg>' + escapeHtml(workerId) + ' 提问</span>';
      }
      if (!isUser && roleName && !message.isClarification && !message.isWorkerQuestion) {
        html += '<span class="message-role-badge ' + badgeClass + '">' + roleName + '</span>';
      }
      // 使用相对时间
      const timestamp = message.timestamp || message.startedAt;
      const timeDisplay = timestamp ? formatRelativeTime(timestamp) : (message.time || '');
      const timestampAttr = timestamp ? (' data-timestamp="' + timestamp + '"') : '';
      html += '<span class="message-time"' + timestampAttr + '>' + timeDisplay + '</span>';
      html += '</div>';

      if (!isUser && message.thinking && message.thinking.length > 0) {
        const panelId = (toolPanelPrefix || 'panel-') + 'thinking-' + idx;
        const thinkingExpanded = !!message.streaming;
        html += '<div class="collapsible-panel thinking" data-panel-id="' + panelId + '">';
        html += '<div class="collapsible-header" onclick="togglePanel(\'' + panelId + '\')">';
        html += '<span class="collapsible-icon' + (thinkingExpanded ? ' expanded' : '') + '"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 12.796V3.204L11.481 8 6 12.796z"/></svg></span>';
        html += '<span class="collapsible-title"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/></svg>思考过程</span>';
        html += '<span class="collapsible-badge">' + message.thinking.length + ' 步</span>';
        html += '</div>';
        const thinkingContent = message.thinking.join('\n\n');
        html += '<div class="collapsible-content' + (thinkingExpanded ? ' expanded' : '') + '"><div class="collapsible-body markdown-rendered">' + renderMarkdown(thinkingContent) + '</div></div>';
        html += '</div>';
      }

      let contentHtml = '';
      let contentIsMarkdown = false;
      let rawContent = '';
      if (message.images && message.images.length > 0) {
        contentHtml += '<div class="message-images">';
        message.images.forEach(imgSrc => {
          contentHtml += '<img src="' + imgSrc + '" class="message-image-thumb" onclick="showImageViewer(this.src)" />';
        });
        contentHtml += '</div>';
      }
      if (!isUser && message.content) {
        rawContent = message.content;
        // 🆕 使用智能渲染：优先使用后端已解析的 blocks
        const rendered = renderMessageContentSmart(message, cli);
        contentHtml += rendered.html;
        contentIsMarkdown = rendered.isMarkdown;
      } else {
        rawContent = message.content || '';
        contentHtml += escapeHtml(rawContent);
      }

      // 检查是否需要折叠长消息
      const needsCollapse = !isUser && !message.streaming && shouldCollapseMessage(rawContent);
      const collapsedClass = needsCollapse ? ' collapsed' : '';
      const contentClass = 'message-content' + (contentIsMarkdown ? ' markdown-rendered' : '') + collapsedClass;

      // 如果需要折叠，用容器包裹内容和按钮
      if (needsCollapse) {
        html += '<div class="message-collapsible-wrapper">';
        html += '<div class="' + contentClass + '">' + contentHtml + '</div>';
        html += '<button class="message-expand-btn" onclick="toggleMessageExpand(this)">展开更多</button>';
        html += '</div>';
      } else {
        html += '<div class="' + contentClass + '">' + contentHtml + '</div>';
      }

      if (!isUser && message.toolCalls && message.toolCalls.length > 0) {
        html += renderToolTrack(message.toolCalls, toolPanelPrefix + idx);
      }

      if (!isUser && message.reconnecting) {
        html += '<div class="reconnect-indicator"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/><path d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/></svg>' + escapeHtml(message.reconnectMessage || '正在重连...') + '</div>';
      }

      // 🔧 修复：流式输出时的动画显示逻辑
      if (showStreamingHint && !isUser && message.streaming) {
        const startAt = message.startedAt || thinkingStartAt || Date.now();
        const elapsed = formatElapsed(Date.now() - startAt);
        const hasContent = message.content && message.content.trim();

        if (!hasContent) {
          // 没有内容时显示"正在思考"
          html += '<div class="message-content message-streaming-hint" data-start-at="' + startAt + '"><span class="thinking-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span> 正在思考 <span class="thinking-elapsed">用时 ' + elapsed + '</span></div>';
        } else {
          // 有内容但仍在流式输出时，在底部显示"正在输出"提示
          html += '<div class="message-streaming-footer" data-start-at="' + startAt + '"><span class="thinking-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span> 正在输出 <span class="thinking-elapsed">用时 ' + elapsed + '</span></div>';
        }
      }

      html += '</div></div>';
      return html;
    }

    function renderCliOutputView(container, cli) {
      const messages = cliOutputs[cli] || [];
      if (!messages.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 9a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3A.5.5 0 0 1 6 9zM3.854 4.146a.5.5 0 1 0-.708.708L4.793 6.5 3.146 8.146a.5.5 0 1 0 .708.708l2-2a.5.5 0 0 0 0-.708l-2-2z"/><path d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm12 1a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h12z"/></svg></div><span class="empty-state-text">' + cli.toUpperCase() + ' 输出</span><span class="empty-state-hint">暂无输出内容</span></div>';
        return;
      }

      // 使用统一的消息列表渲染函数
      const html = renderMessageList(messages, {
        tabType: 'cli',
        defaultCli: cli,
        toolPanelPrefix: 'tool-cli-' + cli + '-',
        showStreamingHint: true
      });

      container.innerHTML = html;
    }


    /** 增量更新 CLI 面板：只更新流式消息的内容 */
    function updateCliStreamingMessage(cli, content) {
      const container = document.getElementById('main-content');
      if (!container || currentBottomTab !== cli) return false;

      // 查找带有 streaming 类的消息元素
      const streamingMessage = container.querySelector('.message.streaming[data-cli="' + cli + '"]');
      if (!streamingMessage) return false;

      const contentEl = streamingMessage.querySelector('.message-content');
      if (!contentEl) return false;

      const messages = cliOutputs[cli] || [];
      const lastMsg = messages.find(m => m.streaming);
      if (lastMsg) {
        // 🆕 使用智能渲染：优先使用后端已解析的 blocks
        const rendered = renderMessageContentSmart(lastMsg, cli);
        contentEl.innerHTML = rendered.html;
        if (rendered.isMarkdown) {
          contentEl.classList.add('markdown-rendered');
        } else {
          contentEl.classList.remove('markdown-rendered');
        }

        // 🔧 检测特殊内容并添加溢出标记
        const special = detectSpecialContent(content || lastMsg.content || '');
        if (special.hasSpecial) {
          contentEl.classList.add('has-special-content');
        }
        // 检测内容是否溢出
        if (contentEl.scrollHeight > contentEl.clientHeight + 20) {
          contentEl.classList.add('content-overflow');
        }
      } else {
        contentEl.textContent = content;
      }
      return true;
    }

    function updateCliDots() {
      const statuses = state?.cliStatuses || [];
      ['claude', 'codex', 'gemini'].forEach(cli => {
        const s = statuses.find(x => x.type === cli);
        const dotEl = document.getElementById('dot-' + cli);
        if (dotEl) {
          const hasOutput = cliOutputs[cli] && cliOutputs[cli].length > 0;
          const isRunning = state?.tasks?.some(t => t.status === 'running' && t.cli === cli);
          dotEl.className = 'dot ' + (isRunning ? 'running' : s?.available ? 'available' : 'unavailable');
        }
      });
    }

    // 更新 CLI 执行统计面板
    function updateExecutionStats(stats, orchestratorStats) {
      if (!stats || !Array.isArray(stats)) return;

     
      if (orchestratorStats) {
        const totalTasksEl = document.getElementById('orch-total-tasks');
        const successEl = document.getElementById('orch-success');
        const failedEl = document.getElementById('orch-failed');
        const inputTokensEl = document.getElementById('orch-input-tokens');
        const outputTokensEl = document.getElementById('orch-output-tokens');
        if (totalTasksEl) totalTasksEl.textContent = orchestratorStats.totalTasks || 0;
        if (successEl) successEl.textContent = orchestratorStats.totalSuccess || 0;
        if (failedEl) failedEl.textContent = orchestratorStats.totalFailed || 0;
        if (inputTokensEl) inputTokensEl.textContent = formatTokenCount(orchestratorStats.totalInputTokens || 0);
        if (outputTokensEl) outputTokensEl.textContent = formatTokenCount(orchestratorStats.totalOutputTokens || 0);
      }

      stats.forEach(stat => {
        const card = document.querySelector(`.cli-stat-card[data-cli="${stat.cli}"]`);
        if (!card) return;

        // 更新健康状态
        card.classList.toggle('healthy', stat.isHealthy);
        card.classList.toggle('unhealthy', !stat.isHealthy);

        const healthDot = card.querySelector('.health-dot');
        if (healthDot) {
          healthDot.classList.toggle('healthy', stat.isHealthy);
          healthDot.classList.toggle('unhealthy', !stat.isHealthy);
        }

        // 更新成功率
        const rateEl = card.querySelector('.cli-stat-rate');
        if (rateEl) {
          const rate = stat.totalExecutions > 0 ? Math.round(stat.successRate * 100) : '--';
          rateEl.textContent = rate === '--' ? '--' : rate + '%';
          rateEl.className = 'cli-stat-rate';
          if (rate !== '--') {
            if (rate >= 80) rateEl.classList.add('good');
            else if (rate >= 60) rateEl.classList.add('warning');
            else rateEl.classList.add('bad');
          }
        }

        // 更新详情
        const detailEl = card.querySelector('.cli-stat-detail');
        if (detailEl) {
          const avgTime = stat.avgDuration > 0 ? Math.round(stat.avgDuration / 1000) + 's' : '-';
          detailEl.textContent = `${stat.totalExecutions} 次执行 · 平均 ${avgTime}`;
        }

       
        const tokensEl = card.querySelector('.cli-stat-tokens');
        if (tokensEl) {
          const inputTokens = formatTokenCount(stat.totalInputTokens || 0);
          const outputTokens = formatTokenCount(stat.totalOutputTokens || 0);
          tokensEl.textContent = `${inputTokens} / ${outputTokens}`;
        }

        // 更新进度条
        const barFill = card.querySelector('.cli-stat-bar-fill');
        if (barFill) {
          const rate = stat.totalExecutions > 0 ? stat.successRate * 100 : 0;
          barFill.style.width = rate + '%';
          barFill.className = 'cli-stat-bar-fill';
          if (rate >= 80) barFill.classList.add('good');
          else if (rate >= 60) barFill.classList.add('warning');
          else barFill.classList.add('bad');
        }
      });
    }

   
    function formatTokenCount(count) {
      if (count >= 1000000000) return (count / 1000000000).toFixed(2) + 'G';
      if (count >= 1000000) return (count / 1000000).toFixed(2) + 'M';
      if (count >= 1000) return (count / 1000).toFixed(2) + 'K';
      return count.toString();
    }

    // 请求执行统计数据
    function requestExecutionStats() {
      vscode.postMessage({ type: 'requestExecutionStats' });
    }

    // Session 选择器
    const sessionSelectorBtn = document.getElementById('session-selector-btn');
    const sessionDropdown = document.getElementById('session-dropdown');

    sessionSelectorBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      sessionSelectorBtn.classList.toggle('open');
      sessionDropdown.classList.toggle('visible');
      if (sessionDropdown.classList.contains('visible')) renderSessionList();
    });

    document.addEventListener('click', (e) => {
      if (!sessionDropdown.contains(e.target) && e.target !== sessionSelectorBtn) {
        sessionSelectorBtn.classList.remove('open');
        sessionDropdown.classList.remove('visible');
      }
    });

    document.getElementById('new-session-dropdown-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      createNewSession();
    });

    function renderSessionList() {
      const listEl = document.getElementById('session-list');
      const emptyEl = document.getElementById('session-empty');
      const nameEl = document.getElementById('current-session-name');
      const currentSession = sessions.find(s => s.id === currentSessionId);
      nameEl.textContent = currentSession ? (currentSession.name || '会话 ' + currentSession.id.slice(0,6)) : '新会话';

      if (sessions.length === 0) {
        listEl.innerHTML = '';
        emptyEl.classList.add('visible');
        return;
      }

      emptyEl.classList.remove('visible');
      let html = '';
      sessions.slice().reverse().forEach(session => {
        const isActive = session.id === currentSessionId;
        const name = session.name || '会话 ' + session.id.slice(0,6);
        const time = session.updatedAt ? formatTime(new Date(session.updatedAt)) : '';
        const msgCount = (session.messages || []).length;
        html += '<div class="session-item' + (isActive ? ' active' : '') + '" data-session-id="' + session.id + '">';
        html += '<svg class="session-item-icon" viewBox="0 0 16 16"><path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12z"/></svg>';
        html += '<div class="session-item-content"><div class="session-item-name">' + escapeHtml(name) + '</div>';
        html += '<div class="session-item-meta"><span>' + msgCount + ' 条消息</span><span>' + time + '</span></div></div>';
        html += '<div class="session-item-actions">';
        html += '<button class="icon-btn-sm" onclick="event.stopPropagation();renameSession(\'' + session.id + '\')" title="重命名"><svg viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10z"/></svg></button>';
        html += '<button class="icon-btn-sm" onclick="event.stopPropagation();deleteSession(\'' + session.id + '\')" title="删除"><svg viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1z"/></svg></button>';
        html += '</div></div>';
      });
      listEl.innerHTML = html;

      listEl.querySelectorAll('.session-item').forEach(item => {
        item.addEventListener('click', () => {
          const sessionId = item.dataset.sessionId;
          if (sessionId !== currentSessionId) switchSession(sessionId);
          sessionDropdown.classList.remove('visible');
          sessionSelectorBtn.classList.remove('open');
        });
      });
    }

    function formatTime(date) {
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      return date.toLocaleDateString();
    }

    function createNewSession() {
      // 修复：先保存当前会话的消息到后端
      if (currentSessionId && threadMessages.length > 0) {
        vscode.postMessage({
          type: 'saveCurrentSession',
          messages: threadMessages,
          cliOutputs: cliOutputs
        });
      }

      // 清空本地状态准备新会话
      threadMessages = [];
      cliOutputs = { claude: [], codex: [], gemini: [] };

      // 通知后端创建新会话
      vscode.postMessage({ type: 'newSession' });

      sessionDropdown.classList.remove('visible');
      sessionSelectorBtn.classList.remove('open');
      saveWebviewState();
      renderMainContent();
    }

    function switchSession(sessionId) {
      // 修复：先保存当前会话的消息到后端
      if (currentSessionId && currentSessionId !== sessionId && threadMessages.length > 0) {
        vscode.postMessage({
          type: 'saveCurrentSession',
          messages: threadMessages,
          cliOutputs: cliOutputs
        });
      }

      vscode.postMessage({ type: 'switchSession', sessionId });
    }

    function loadSessionMessages(sessionId) {
      const session = sessions.find(s => s.id === sessionId);
      if (!session) return;
      const sessionMessages = Array.isArray(session.messages) ? session.messages : [];
      // 转换消息格式：后端存储的是 SessionMessage，前端需要简化格式
      threadMessages = sessionMessages.map(m => ({
        role: m.role,
        content: m.content,
        time: m.timestamp ? new Date(m.timestamp).toLocaleTimeString().slice(0,5) : '',
        timestamp: m.timestamp,
        cli: m.cli,
        images: m.images
      }));

      cliOutputs = { claude: [], codex: [], gemini: [] };
      // 恢复 cliOutputs
      if (session.cliOutputs) {
        ['claude', 'codex', 'gemini'].forEach(cli => {
          if (Array.isArray(session.cliOutputs[cli])) {
            cliOutputs[cli] = session.cliOutputs[cli];
          }
        });
      }

      saveWebviewState();
      renderMainContent();

      // 更新会话选择器显示
      renderSessionList();
    }

    function renameSession(sessionId) {
      const session = sessions.find(s => s.id === sessionId);
      const currentName = session ? (session.name || '会话 ' + session.id.slice(0,6)) : '';

      // 使用内联编辑模式
      const sessionItem = document.querySelector('.session-item[data-session-id="' + sessionId + '"]');
      if (!sessionItem) return;

      const contentEl = sessionItem.querySelector('.session-item-content');
      const actionsEl = sessionItem.querySelector('.session-item-actions');
      const originalHtml = contentEl.innerHTML;

      // 隐藏操作按钮
      actionsEl.style.display = 'none';

      // 替换为编辑表单
      contentEl.innerHTML = '<div class="session-item-edit">' +
        '<input type="text" value="' + escapeHtml(currentName) + '" id="rename-input-' + sessionId + '" />' +
        '<button class="save-btn" onclick="saveRename(\'' + sessionId + '\')">保存</button>' +
        '<button class="cancel-btn" onclick="cancelRename(\'' + sessionId + '\')">取消</button>' +
        '</div>';

      const input = document.getElementById('rename-input-' + sessionId);
      input.focus();
      input.select();

      // 回车保存，ESC 取消
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') saveRename(sessionId);
        if (e.key === 'Escape') cancelRename(sessionId);
      });

      // 存储原始 HTML 以便取消时恢复
      sessionItem.dataset.originalHtml = originalHtml;
    }

    window.saveRename = function(sessionId) {
      const input = document.getElementById('rename-input-' + sessionId);
      const newName = input ? input.value.trim() : '';
      if (newName) {
        vscode.postMessage({ type: 'renameSession', sessionId, name: newName });
        // 更新本地数据
        const session = sessions.find(s => s.id === sessionId);
        if (session) session.name = newName;
      }
      renderSessionList();
    };

    window.cancelRename = function(sessionId) {
      renderSessionList();
    };

    function deleteSession(sessionId) {

        () => {

          sessions = sessions.filter(s => s.id !== sessionId);
          if (currentSessionId === sessionId) {
            currentSessionId = sessions.length > 0 ? sessions[sessions.length - 1].id : null;
            if (currentSessionId) loadSessionMessages(currentSessionId);

    // 拖动调整输入框高度
    (function() {
      const resizeBar = document.getElementById('input-resize-bar');
      const inputWrapper = document.getElementById('input-wrapper');
      const inputBox = document.getElementById('prompt-input');
      if (!resizeBar || !inputWrapper || !inputBox) return;

      let isDragging = false;
      let startY = 0;
      let startHeight = 0;
      let rafId = null;

      function updateHeight(e) {
        if (!isDragging) return;
        // 向上拖拽增加高度，向下拖拽减少高度
        const dy = startY - e.clientY;
        const newHeight = Math.max(60, Math.min(startHeight + dy, 300));
        inputBox.style.height = newHeight + 'px';
      }

      resizeBar.addEventListener('mousedown', function(e) {
        isDragging = true;
        startY = e.clientY;
        startHeight = inputBox.offsetHeight;
        inputWrapper.classList.add('resizing');
        document.body.style.cursor = 'ns-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
        e.stopPropagation();
      });

      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        e.preventDefault();
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(function() { updateHeight(e); });
      });

      document.addEventListener('mouseup', function() {
        if (isDragging) {
          isDragging = false;
          inputWrapper.classList.remove('resizing');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        }
      });

      // 防止拖拽时选中文本
      resizeBar.addEventListener('selectstart', function(e) { e.preventDefault(); });
    })();

    // 执行按钮

        if (hasPendingClarification()) {

        // 🆕 处理 Worker 问题（使用底部输入框回答）
        if (hasPendingWorkerQuestion()) {

          if (!answerText) {

            return;

          handleWorkerQuestionAnswer(answerText, false);

            return;
          }
          handleQuestionAnswer(answerText, false);
          input.value = '';

          renderImagePreviews();
          return;
        }

        // 如果有待确认的面板，先取消它
        if (hasPendingConfirmation()) {
          cancelPendingConfirmation();

        const promptText = input.value.trim() || '请分析这张图片';
        const hasImages = attachedImages.length > 0;
        const selectedCli = document.getElementById('cli-selector')?.value || '';
        const isOrchestratorMode = !selectedCli; // 没有选择 CLI 时使用编排者模式
        setProcessingActor(isOrchestratorMode ? 'orchestrator' : 'worker', selectedCli || 'claude');

        // 存储图片数据（不是 HTML 字符串）
        const imageDataUrls = hasImages ? attachedImages.map(img => img.dataUrl) : [];

        const userMsg = {
          role: 'user',
          content: promptText,
          time: new Date().toLocaleTimeString().slice(0,5),
          timestamp: Date.now(),
          images: imageDataUrls  // 单独存储图片数据
        };
        threadMessages.push(userMsg);

        // 🔧 修复：立即创建流式消息，避免出现两个消息卡片
        // 在编排者模式下，预先创建带 Orchestrator 徽章的流式消息
        if (isOrchestratorMode) {
          const streamKey = generateStreamKey('orchestrator', 'claude');
          const assistantMsg = {
            role: 'assistant',
            content: '',
            time: new Date().toLocaleTimeString().slice(0,5),
            timestamp: Date.now(),
            streaming: true,
            startedAt: Date.now(),
            source: 'orchestrator',
            cli: 'claude',
            streamKey: streamKey
          };
          threadMessages.push(assistantMsg);
          // 🔧 P3 修复：移除直接设置 thinkingStartAt，由 setProcessingState 统一管理
        }

        // 设置处理状态（会自动设置 thinkingStartAt）
        setProcessingState(true);

        // 发送消息（包含图片数据）
        const imageData = attachedImages.map(img => ({ dataUrl: img.dataUrl }));
        vscode.postMessage({ type: 'executeTask', prompt: promptText, images: imageData });

        // 清空输入和图片
        input.value = '';
        attachedImages = [];
        renderImagePreviews();

        // 切换到对话 Tab 和对话视图
        currentTopTab = 'thread';
        currentBottomTab = 'thread';
        document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
        document.querySelector('.top-tab[data-tab="thread"]')?.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-thread')?.classList.add('active');
        document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
        document.querySelector('.bottom-tab[data-bottom-tab="thread"]')?.classList.add('active');

        // 🔧 修复：直接调用 renderMainContent 而不是 render()
        // render() 依赖 state，但此时 state 可能还是 null
        // 导致"正在思考"动画延迟显示
        saveWebviewState();
        renderMainContent();
        startStreamingHintTimer();

        requestAnimationFrame(() => {
          const mainContent = document.getElementById('main-content');
          if (mainContent) mainContent.scrollTop = mainContent.scrollHeight;
        });

    });

    function updateEditsBadge() {

        badge.style.display = count > 0 ? 'inline' : 'none';

    function updateTasksBadge() {
      const badge = document.getElementById('tasks-badge');
      if (badge) {
        const tasks = state?.tasks || [];
        // 找到当前运行中的任务，或最新的有子任务的任务
        const currentTask = tasks.find(t => t.status === 'running' && t.subTasks?.length > 0)
          || tasks.filter(t => t.subTasks?.length > 0).slice(-1)[0];
        const subTasks = currentTask?.subTasks || [];

        if (subTasks.length > 0) {
         
          const completedCount = subTasks.filter(st => st.status === 'completed').length;
          const totalCount = subTasks.length;
          badge.textContent = completedCount + '/' + totalCount;
          badge.style.display = 'inline';
        } else {
          badge.style.display = 'none';
        }
      }

    function renderMainContent() {
      const container = document.getElementById('main-content');
      if (!container) return;
      if (!container.dataset.scrollListener) {
        container.dataset.scrollListener = 'true';
        container.addEventListener('scroll', () => {
          const atBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 20;
          autoScrollEnabled[currentBottomTab] = atBottom;
          saveWebviewState();
        }, { passive: true });
      }

      // 修复：渲染前保存滚动位置
      const scrollTop = container.scrollTop;
      const scrollHeight = container.scrollHeight;
      const clientHeight = container.clientHeight;
      // 判断是否在底部附近（允许 50px 误差）
      const wasAtBottom = scrollTop + clientHeight >= scrollHeight - 50;

      if (currentBottomTab === 'thread') {
        renderThreadView(container);
      } else if (['claude', 'codex', 'gemini'].includes(currentBottomTab)) {
        renderCliOutputView(container, currentBottomTab);
      }

      // 修复：渲染后恢复滚动位置
      requestAnimationFrame(() => {
        if (wasAtBottom) {
          // 如果之前在底部，保持在底部
          container.scrollTop = container.scrollHeight;
          autoScrollEnabled[currentBottomTab] = true;
        } else {
          // 否则恢复到之前的位置
          container.scrollTop = scrollTop;
          autoScrollEnabled[currentBottomTab] = false;
        }
      });
    }

    // 生成唯一的流式消息 ID
    let streamKeyCounter = 0;
    function generateStreamKey(source, cli) {
      streamKeyCounter += 1;
      return (source || 'orchestrator') + ':' + (cli || 'claude') + ':' + Date.now() + '-' + streamKeyCounter;
    }

    // 查找指定来源的活跃流式消息
    function findActiveStreamMessage(source, cli) {
      const prefix = (source || 'orchestrator') + ':' + (cli || 'claude') + ':';
      for (let i = threadMessages.length - 1; i >= 0; i -= 1) {
        const msg = threadMessages[i];
        if (msg.streaming && msg.streamKey && msg.streamKey.startsWith(prefix)) {
          return { idx: i, msg };
        }
      }
      return null;
    }

    function ensureThreadStreamMessage(source, cli, initialContent) {
      // 查找当前来源的活跃流式消息
      const active = findActiveStreamMessage(source, cli);
      if (active) {
        return active;
      }
      // 创建新的流式消息，使用唯一的 streamKey
      const streamKey = generateStreamKey(source, cli);
      const msg = {
        role: 'assistant',
        content: initialContent || '',
        time: new Date().toLocaleTimeString().slice(0,5),
        timestamp: Date.now(),
        streaming: true,
        startedAt: Date.now(),
        source: source,
        cli: cli,
        streamKey: streamKey
      };
      threadMessages.push(msg);
      const idx = threadMessages.length - 1;
      return { idx, msg: threadMessages[idx] };
    }

    /** 检测内容是否包含特殊格式（文件路径列表、带行号的代码等） */
    function detectSpecialContent(content) {
      if (!content) return { hasSpecial: false };
      const lines = content.split('\n');

      // 检测文件路径列表（连续多行以 / 开头的路径）
      let pathCount = 0;
      for (const line of lines) {
        if (/^\/[^\s]+/.test(line.trim())) {
          pathCount++;
        }
      }
      if (pathCount >= 5) {
        return { hasSpecial: true, type: 'file-list', count: pathCount };
      }

      // 检测带行号的代码（数字→ 格式）
      let numberedLineCount = 0;
      for (const line of lines) {
        if (/^\s*\d+→/.test(line)) {
          numberedLineCount++;
        }
      }
      if (numberedLineCount >= 5) {
        return { hasSpecial: true, type: 'numbered-code', count: numberedLineCount };
      }

      return { hasSpecial: false };
    }

    /** 增量更新：只更新流式消息的内容，避免重建整个 DOM */
    function updateStreamingMessage(streamKey, content) {
      const container = document.getElementById('main-content');
      if (!container || currentBottomTab !== 'thread') return false;

      // 查找带有 streaming 类的消息元素
      const streamingMessage = container.querySelector('.message.streaming[data-stream-key="' + streamKey + '"]');
      if (!streamingMessage) return false;

      const contentEl = streamingMessage.querySelector('.message-content');
      if (!contentEl) return false;

      const streamingMsg = threadMessages.find(m => m.streaming && m.streamKey === streamKey);
      const cli = streamingMsg?.cli || 'claude';
      // 🆕 使用智能渲染：优先使用后端已解析的 blocks
      const rendered = streamingMsg ? renderMessageContentSmart(streamingMsg, cli) : { html: escapeHtml(content || ''), isMarkdown: false };
      contentEl.innerHTML = rendered.html;
      if (rendered.isMarkdown) {
        contentEl.classList.add('markdown-rendered');
      } else {
        contentEl.classList.remove('markdown-rendered');
      }

      // 🔧 检测特殊内容并添加溢出标记
      const special = detectSpecialContent(content);
      if (special.hasSpecial) {
        contentEl.classList.add('has-special-content');
      }
      // 检测内容是否溢出
      if (contentEl.scrollHeight > contentEl.clientHeight + 20) {
        contentEl.classList.add('content-overflow');
      }

      return true;
    }

    /** 平滑滚动到底部（使用 requestAnimationFrame 避免跳动） */
    let scrollRAF = null;
    function smoothScrollToBottom() {
      if (scrollRAF) return; // 避免重复调度
      scrollRAF = requestAnimationFrame(() => {
        const mainContent = document.getElementById('main-content');
        if (mainContent) {
          if (!autoScrollEnabled[currentBottomTab]) {
            scrollRAF = null;
            return;
          }
          // 使用 smooth 滚动行为
          mainContent.scrollTo({
            top: mainContent.scrollHeight,
            behavior: 'auto' // 流式更新时用 auto 避免延迟
          });
        }
        scrollRAF = null;
      });
    }

    /** 节流的状态保存（避免频繁序列化） */
    let saveStateTimeout = null;
    function throttledSaveState() {
      if (saveStateTimeout) return;
      saveStateTimeout = setTimeout(() => {
        saveWebviewState();
        saveStateTimeout = null;
      }, 500); // 500ms 节流
    }

    function renderThreadView(container) {
      if (threadMessages.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12.793a.5.5 0 0 0 .854.353l2.853-2.853A1 1 0 0 1 4.414 12H14a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/></svg></div><span class="empty-state-text">开始新对话</span><span class="empty-state-hint">输入任务描述，按 ⌘↵ 发送</span></div>';
        return;
      }

      // 使用统一的消息列表渲染函数
      let html = renderMessageList(threadMessages, {
        tabType: 'thread',
        defaultCli: null, // Thread 面板没有默认 CLI
        toolPanelPrefix: 'tool-thread-',
        showStreamingHint: false
      });

      // Thread 面板特有：显示运行中的 Worker 状态卡片
      const runningEntries = collectWorkerStatusEntries();
      if (runningEntries.length > 0) {
        html += renderWorkerStatusCard(runningEntries);
      }

      // Thread 面板特有：底部 loading 动画
      // 🔧 修复：只在没有任何 AI 响应时显示"正在思考"动画
      if (isProcessing) {
        const hasActiveStreaming = threadMessages.some(m => m.streaming && m.content && m.content.trim().length > 0);
        const hasRunningToolCall = threadMessages.some(m =>
          m.streaming && m.toolCalls && m.toolCalls.some(t => t.status === 'running')
        );
        // 🔧 新增：检查是否有来自 orchestrator 的最新消息（在用户消息之后）
        const lastUserMsgIdx = threadMessages.map((m, i) => ({ m, i })).filter(x => x.m.role === 'user').pop()?.i ?? -1;
        const hasOrchestratorResponse = threadMessages.slice(lastUserMsgIdx + 1).some(
          m => m.role === 'assistant' && m.source === 'orchestrator' && m.content && m.content.trim().length > 0
        );

        // 只有在没有流式内容且没有 Orchestrator 响应时才显示"正在思考"
        const shouldShowThinking = !hasActiveStreaming && !hasOrchestratorResponse;

        if (shouldShowThinking || hasRunningToolCall) {
          html += '<div class="message assistant-message loading-message">';
          html += '<div class="message-body">';
          const startAt = thinkingStartAt || Date.now();
          const elapsed = formatElapsed(Date.now() - startAt);
          html += '<div class="message-content message-streaming-hint" data-start-at="' + startAt + '"><span class="thinking-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span> 正在思考 <span class="thinking-elapsed">用时 ' + elapsed + '</span></div>';
          html += '</div></div>';
        }
      }

      container.innerHTML = html;
      // 🔧 修复：同时检测 streaming-hint 和 streaming-footer
      if (container.querySelector('.message-streaming-hint, .message-streaming-footer')) {
        startStreamingHintTimer();
      } else {
        stopStreamingHintTimer();
      }
    }

    function collectWorkerStatusEntries() {
      const entries = [];
      const tasks = state?.tasks || [];
      tasks.forEach(task => {
        const subTasks = task.subTasks || [];
        subTasks.forEach(st => {
          const status = st.status || 'pending';
          if (status !== 'running' && status !== 'pending') return;
          const workerName = (st.assignedWorker || st.assignedCli || '').toLowerCase();
          if (!workerName) return;
          const desc = st.description || st.title || task.prompt || '子任务';
          entries.push({
            worker: workerName,
            status,
            description: desc
          });
        });
      });
      return entries;
    }

    // 渲染子代理运行状态卡片（使用统一卡片组件）
    function renderWorkerStatusCard(entries) {
      const statusMap = { running: '执行中', pending: '等待中' };

      // 构建列表内容
      let listHtml = '<div class="worker-status-list">';
      entries.forEach(item => {
        const cliClass = item.worker.includes('claude') ? 'claude' : item.worker.includes('codex') ? 'codex' : item.worker.includes('gemini') ? 'gemini' : '';
        const statusClass = item.status === 'running' ? 'badge-running' : 'badge-pending';
        listHtml += '<div class="worker-status-item">';
        listHtml += '<span class="task-cli ' + cliClass + '">' + escapeHtml(item.worker) + '</span>';
        listHtml += '<span class="task-desc">' + escapeHtml(item.description) + '</span>';
        listHtml += '<span class="card-badge ' + statusClass + '">' + (statusMap[item.status] || item.status) + '</span>';
        listHtml += '</div>';
      });
      listHtml += '</div>';

      return renderUnifiedCard({
        type: 'worker-status',
        variant: 'info',
        icon: getRoleIcon('orchestrator'),
        title: '子代理运行状态',
        badges: [{ text: entries.length + ' 项', class: 'badge-info' }],
        content: listHtml,
        className: 'worker-status-card'
      });
    }

    // 渲染任务卡片（子代理面板显示编排者分配的任务，使用统一卡片组件）
    function renderTaskCard(m, idx) {
      const cli = m.cli || '';
      const statusClass = m.status || 'started';
      const statusText = statusClass === 'started' ? '执行中' : statusClass === 'completed' ? '已完成' : statusClass === 'failed' ? '失败' : statusClass;
      const badgeStatusClass = statusClass === 'started' ? 'badge-running' : statusClass === 'completed' ? 'badge-completed' : statusClass === 'failed' ? 'badge-failed' : '';

      // 构建内容
      let contentHtml = '<div class="task-card-description">' + escapeHtml(m.description || '') + '</div>';

      // 添加进度条（如果有进度信息）
      if (m.progress !== undefined || m.subtasks) {
        contentHtml += renderTaskProgress(m);
      }

      if (m.reason) {
        contentHtml += '<div class="task-card-reason"><span class="task-card-label">分配原因:</span> ' + escapeHtml(m.reason) + '</div>';
      }
      if (m.targetFiles && m.targetFiles.length > 0) {
        contentHtml += '<div class="task-card-files"><span class="task-card-label">目标文件:</span>';
        contentHtml += '<ul class="task-card-file-list">';
        m.targetFiles.forEach(file => {
          contentHtml += '<li><code>' + escapeHtml(file) + '</code></li>';
        });
        contentHtml += '</ul></div>';
      }

      // 添加子任务状态列表
      if (m.subtasks && m.subtasks.length > 0) {
        contentHtml += renderSubtaskStatusList(m.subtasks);
      }

      return renderUnifiedCard({
        type: 'task',
        variant: cli.toLowerCase() || 'info',
        icon: getRoleIcon('task'),
        title: '任务分配',
        badges: [{ text: statusText, class: badgeStatusClass }],
        time: m.time || '',
        content: contentHtml,
        dataAttrs: { 'msg-idx': idx, 'subtask-id': m.subTaskId || '' }
      });
    }

    /**
     * 渲染任务进度条
     */
    function renderTaskProgress(task) {
      let completed = 0;
      let total = 1;
      let failed = 0;

      if (task.subtasks && task.subtasks.length > 0) {
        total = task.subtasks.length;
        completed = task.subtasks.filter(s => s.status === 'completed').length;
        failed = task.subtasks.filter(s => s.status === 'failed').length;
      } else if (task.progress !== undefined) {
        completed = task.progress;
        total = task.total || 100;
      }

      const percent = Math.round((completed / total) * 100);
      const progressClass = failed > 0 ? 'failed' : (percent >= 100 ? 'completed' : '');

      let html = '<div class="task-progress-container">';
      html += '<div class="task-progress-header">';
      html += '<span class="task-progress-label">进度</span>';
      html += '<span class="task-progress-percent">' + completed + '/' + total + ' (' + percent + '%)</span>';
      html += '</div>';
      html += '<div class="task-progress-bar">';
      html += '<div class="task-progress-fill ' + progressClass + '" style="width: ' + percent + '%"></div>';
      html += '</div>';
      html += '</div>';

      return html;
    }

    /**
     * 渲染子任务状态列表
     */
    function renderSubtaskStatusList(subtasks) {
      if (!subtasks || subtasks.length === 0) return '';

      const statusIcons = {
        pending: '<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>',
        running: '<svg viewBox="0 0 16 16"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>',
        completed: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>',
        failed: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>'
      };

      let html = '<div class="subtask-status-list">';

      subtasks.forEach(subtask => {
        const status = subtask.status || 'pending';
        const cli = subtask.cli || '';
        const desc = subtask.description || subtask.prompt || '';
        const time = subtask.time || '';

        html += '<div class="subtask-status-item ' + status + '">';
        html += '<span class="subtask-status-icon ' + status + '">' + (statusIcons[status] || statusIcons.pending) + '</span>';
        if (cli) {
          html += '<span class="subtask-status-cli ' + cli.toLowerCase() + '">' + cli + '</span>';
        }
        html += '<span class="subtask-status-desc" title="' + escapeHtml(desc) + '">' + escapeHtml(desc.substring(0, 50) + (desc.length > 50 ? '...' : '')) + '</span>';
        if (time) {
          html += '<span class="subtask-status-time">' + time + '</span>';
        }
        html += '</div>';
      });

      html += '</div>';
      return html;
    }

    // 渲染系统提示消息（轻量级，保持原有简洁样式）
    function renderSystemNotice(m, idx) {
      const type = m.noticeType || 'info';
      const icons = {
        success: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>',
        error: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>',
        warning: '<svg viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>',
        info: '<svg viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>'
      };
      // 系统通知保持轻量级样式，不使用完整卡片
      let html = '<div class="system-notice ' + type + '" data-msg-idx="' + idx + '">';
      html += '<span class="system-notice-icon">' + (icons[type] || icons.info) + '</span>';
      html += '<span class="system-notice-text">' + escapeHtml(m.content || '') + '</span>';
      html += '<span class="system-notice-time">' + (m.time || '') + '</span>';
      html += '</div>';
      return html;
    }

    function formatToolPayload(payload) {
      if (payload === undefined || payload === null) return '';
      if (typeof payload === 'string') return payload;
      try {
        return JSON.stringify(payload, null, 2);
      } catch {
        return String(payload);
      }
    }

    // 渲染错误消息（使用统一卡片组件）
    function renderErrorMessage(m, idx) {
      const cli = m.cli || 'system';
      const contentHtml = '<div class="error-content">' + escapeHtml(m.content || '未知错误') + '</div>' +
        '<div class="error-hint">查看 CLI 输出 Tab 获取详细信息</div>';

      return renderUnifiedCard({
        type: 'error',
        variant: 'error',
        icon: getRoleIcon('error'),
        title: '执行失败',
        badges: [{ text: cli.toUpperCase(), class: 'badge-' + cli.toLowerCase() }],
        time: m.time || '',
        content: contentHtml,
        dataAttrs: { 'msg-idx': idx }
      });
    }

    // 渲染执行计划预览卡片（使用统一卡片组件）
    function renderPlanPreviewCard(m, idx) {
      const reviewStatus = m.review?.status || 'approved';
      const statusText = reviewStatus === 'rejected' ? '需修订' : '待执行';
      const badgeClass = reviewStatus === 'rejected' ? 'badge-error' : 'badge-info';
      const footerHtml = reviewStatus === 'rejected'
        ? ''
        : '<button class="plan-confirm-btn confirm plan-start-btn" data-plan-id="' + escapeHtml(m.planId || '') + '">' +
          '<svg viewBox="0 0 16 16"><path d="M5.5 3.5a.5.5 0 0 1 .8-.4l5 4a.5.5 0 0 1 0 .8l-5 4a.5.5 0 0 1-.8-.4v-8z"/></svg>' +
          '开始执行</button>';

      const reviewHtml = m.review?.summary
        ? '<div class="plan-review"><strong>评审结论</strong><br>' + escapeHtml(m.review.summary) + '</div>'
        : '';

      return renderUnifiedCard({
        type: 'plan',
        variant: 'info',
        icon: getRoleIcon('plan'),
        title: '执行计划已生成',
        badges: [{ text: statusText, class: badgeClass }],
        time: m.time || '',
        content: '<div class="plan-content">' + formatPlanHtml(m.content || '') + '</div>' + reviewHtml,
        footer: footerHtml,
        className: 'plan-confirmation-card ' + (reviewStatus === 'rejected' ? 'cancelled' : 'ready'),
        dataAttrs: { 'msg-idx': idx }
      });
    }

    // 渲染执行计划确认卡片（使用统一卡片组件）
    function renderPlanConfirmationCard(m, idx) {
      const isPending = m.isPending;
      const statusClass = isPending ? 'pending' : (m.confirmed ? 'confirmed' : 'cancelled');
      const statusText = isPending ? '等待确认' : (m.confirmed ? '已确认' : '已取消');
      const badgeClass = isPending ? 'badge-warning' : (m.confirmed ? 'badge-success' : 'badge-error');

      let footerHtml = '';
      if (isPending) {
        footerHtml = '<button class="plan-confirm-btn cancel" data-action="cancel">' +
          '<svg viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>' +
          '取消</button>' +
          '<button class="plan-confirm-btn confirm" data-action="confirm">' +
          '<svg viewBox="0 0 16 16"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg>' +
          '确认执行</button>';
      }

      return renderUnifiedCard({
        type: 'plan',
        variant: isPending ? 'warning' : (m.confirmed ? 'success' : 'error'),
        icon: getRoleIcon('plan'),
        title: '执行计划确认',
        badges: [{ text: statusText, class: badgeClass }],
        time: m.time || '',
        content: '<div class="plan-content">' + formatPlanHtml(m.content || '') + '</div>',
        footer: footerHtml,
        className: 'plan-confirmation-card ' + statusClass,
        dataAttrs: { 'msg-idx': idx }
      });
    }

    // 渲染问题补充卡片（使用统一卡片组件）
    function renderQuestionCard(m, idx) {
      const isPending = m.isPending;
      const answered = !!m.answered;
      const statusClass = isPending ? 'pending' : (answered ? 'answered' : 'cancelled');
      const statusText = isPending ? '等待回答' : (answered ? '已回答' : '已取消');
      const badgeClass = isPending ? 'badge-warning' : (answered ? 'badge-success' : 'badge-error');
      const questions = Array.isArray(m.questions) ? m.questions : [];

      // 构建内容
      let contentHtml = '<ol class="question-list">';
      questions.forEach(q => {
        contentHtml += '<li>' + escapeHtml(String(q)) + '</li>';
      });
      contentHtml += '</ol>';
      if (isPending) {
        contentHtml += '<div class="question-hint">请在下方输入框回答问题，然后点击发送。</div>';
      } else if (answered && m.answer) {
        contentHtml += '<div class="question-answer-display">' + escapeHtml(m.answer) + '</div>';
      }

      // 构建底部
      let footerHtml = '';
      if (isPending) {
        footerHtml = '<button class="question-btn cancel" data-action="cancel">取消</button>';
      }

      return renderUnifiedCard({
        type: 'question',
        variant: isPending ? 'warning' : (answered ? 'success' : 'error'),
        icon: getRoleIcon('question'),
        title: '需要补充信息',
        badges: [{ text: statusText, class: badgeClass }],
        time: m.time || '',
        content: contentHtml,
        footer: footerHtml,
        className: 'question-card ' + statusClass,
        dataAttrs: { 'msg-idx': idx }
      });
    }

    // 🔧 渲染 CLI 询问卡片
    function renderCliQuestionCard(m, idx) {
      const isPending = m.isPending;
      const answered = !!m.answered;
      const timedOut = !!m.timedOut;
      const hasError = !!m.error;

      let statusClass, statusText, badgeClass;
      if (isPending) {
        statusClass = 'pending';
        statusText = '等待回答';
        badgeClass = 'badge-warning';
      } else if (timedOut) {
        statusClass = 'timeout';
        statusText = '已超时';
        badgeClass = 'badge-error';
      } else if (hasError) {
        statusClass = 'error';
        statusText = '发送失败';
        badgeClass = 'badge-error';
      } else if (answered) {
        statusClass = 'answered';
        statusText = '已回答';
        badgeClass = 'badge-success';
      } else {
        statusClass = 'cancelled';
        statusText = '已取消';
        badgeClass = 'badge-error';
      }

      // 构建内容
      let contentHtml = '<div class="cli-question-content">';
      contentHtml += '<pre class="cli-question-text">' + escapeHtml(m.content || '') + '</pre>';
      contentHtml += '</div>';

      if (!isPending && m.answer) {
        contentHtml += '<div class="cli-question-answer">';
        contentHtml += '<strong>回答:</strong> ' + escapeHtml(m.answer);
        contentHtml += '</div>';
      }

      if (hasError) {
        contentHtml += '<div class="cli-question-error">';
        contentHtml += '<strong>错误:</strong> ' + escapeHtml(m.error);
        contentHtml += '</div>';
      }

      // 构建底部（快捷回答按钮）
      let footerHtml = '';
      if (isPending) {
        const cli = m.cli || 'claude';
        const questionId = m.questionId || '';
        const adapterRole = m.adapterRole || 'worker';

        footerHtml = '<div class="cli-question-actions">' +
          '<button class="cli-answer-btn yes" onclick="answerCliQuestion(\'' + cli + '\', \'' + questionId + '\', \'y\', \'' + adapterRole + '\')">' +
          '<svg viewBox="0 0 16 16"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg>' +
          'Yes (y)</button>' +
          '<button class="cli-answer-btn no" onclick="answerCliQuestion(\'' + cli + '\', \'' + questionId + '\', \'n\', \'' + adapterRole + '\')">' +
          '<svg viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>' +
          'No (n)</button>' +
          '<input type="text" class="cli-answer-input" placeholder="或输入自定义回答..." ' +
          'onkeydown="if(event.key===\'Enter\'){answerCliQuestion(\'' + cli + '\', \'' + questionId + '\', this.value, \'' + adapterRole + '\');this.value=\'\';}">' +
          '</div>';
      }

      return renderUnifiedCard({
        type: 'cli_question',
        variant: isPending ? 'warning' : (answered ? 'success' : 'error'),
        icon: '<svg viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M5.255 5.786a.237.237 0 0 0 .241.247h.825c.138 0 .248-.113.266-.25.09-.656.54-1.134 1.342-1.134.686 0 1.314.343 1.314 1.168 0 .635-.374.927-.965 1.371-.673.489-1.206 1.06-1.168 1.987l.003.217a.25.25 0 0 0 .25.246h.811a.25.25 0 0 0 .25-.25v-.105c0-.718.273-.927 1.01-1.486.609-.463 1.244-.977 1.244-2.056 0-1.511-1.276-2.241-2.673-2.241-1.267 0-2.655.59-2.75 2.286zm1.557 5.763c0 .533.425.927 1.01.927.609 0 1.028-.394 1.028-.927 0-.552-.42-.94-1.029-.94-.584 0-1.009.388-1.009.94z"/></svg>',
        title: 'CLI 询问 (' + (m.cli || 'CLI') + ')',
        badges: [{ text: statusText, class: badgeClass }],
        time: m.time || '',
        content: contentHtml,
        footer: footerHtml,
        className: 'cli-question-card ' + statusClass,
        dataAttrs: { 'msg-idx': idx, 'question-id': m.questionId || '' }
      });
    }

    // 🆕 跳过澄清（取消等待状态）
    function skipClarification() {
      handleClarificationAnswer('', true);
    }
    window.skipClarification = skipClarification;

    // 🆕 跳过 Worker 问题（取消等待状态）
    function skipWorkerQuestion() {
      handleWorkerQuestionAnswer('', true);
    }
    window.skipWorkerQuestion = skipWorkerQuestion;

    // 通用折叠面板切换函数
    function togglePanel(panelId) {
      const panel = document.querySelector('[data-panel-id="' + panelId + '"]');
      if (!panel) return;
      const icon = panel.querySelector('.collapsible-icon');
      const content = panel.querySelector('.collapsible-content');
      if (icon) icon.classList.toggle('expanded');
      if (content) content.classList.toggle('expanded');
    }
    window.togglePanel = togglePanel;

    // 图片查看器
    function showImageViewer(src) {
      const viewer = document.createElement('div');
      viewer.className = 'image-viewer';
      viewer.innerHTML = '<img src="' + src + '" />';
      viewer.onclick = () => viewer.remove();
      document.body.appendChild(viewer);
    }
    window.showImageViewer = showImageViewer;

    function renderTasksView() {
      const container = document.getElementById('tasks-content');
      if (!container) return;

      // 获取所有任务，过滤掉没有子任务的任务（编排者直接回复的不需要显示）
      // 只有需要 Worker 协助的任务才显示在任务面板
      const allTasks = state?.tasks || [];
      const tasks = allTasks
        .filter(t => t.subTasks && t.subTasks.length > 0)  // 只显示有子任务的
        .slice()
        .reverse();  // 按时间倒序

      if (tasks.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v13.5a.5.5 0 0 1-.777.416L8 13.101l-5.223 2.815A.5.5 0 0 1 2 15.5V2zm2-1a1 1 0 0 0-1 1v12.566l4.723-2.482a.5.5 0 0 1 .554 0L13 14.566V2a1 1 0 0 0-1-1H4z"/></svg></div><span class="empty-state-text">暂无任务</span><span class="empty-state-hint">需要 Worker 协助的任务将在此显示</span></div>';
        return;
      }

      // 任务列表头部（带清理按钮）
      let html = '<div class="tasks-header">';
      html += '<span class="tasks-count">' + tasks.length + ' 个任务</span>';
      html += '<button class="btn-small btn-secondary" onclick="clearAllTasks()" title="清理所有任务">清理</button>';
      html += '</div>';
      html += '<div class="task-list">';

      // 渲染每个任务
      tasks.forEach((task, taskIndex) => {
        const isRunning = task.status === 'running';
        const isExpanded = isRunning || taskIndex === 0; // 运行中或最新的任务默认展开
        const statusMap = { pending: '等待中', running: '执行中', completed: '已完成', failed: '失败', interrupted: '已中断', cancelled: '已取消' };
        const statusClass = task.status || 'pending';
        const subTasks = task.subTasks || [];
        const completedCount = subTasks.filter(st => st.status === 'completed').length;
        const taskTime = task.createdAt ? new Date(task.createdAt).toLocaleTimeString().slice(0, 5) : '';

        html += '<div class="task-group ' + (isExpanded ? 'expanded' : 'collapsed') + '" data-task-id="' + task.id + '">';

        // 任务头部（可点击展开/折叠）
        html += '<div class="task-group-header" onclick="toggleTaskGroup(\'' + task.id + '\')">';
        html += '<div class="task-group-toggle"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg></div>';
        html += '<div class="task-status ' + statusClass + '"></div>';
        html += '<div class="task-group-info">';
        html += '<span class="task-group-title">' + escapeHtml((task.prompt || '任务').slice(0, 50)) + (task.prompt && task.prompt.length > 50 ? '...' : '') + '</span>';
        html += '<span class="task-group-meta">' + (statusMap[task.status] || task.status);
        if (subTasks.length > 0) html += ' · ' + completedCount + '/' + subTasks.length + ' 子任务';
        if (taskTime) html += ' · ' + taskTime;
        html += '</span></div>';
        if (isRunning) {
          html += '<button class="btn-icon btn-danger" onclick="event.stopPropagation();interruptTask(\'' + task.id + '\')" title="中断"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5z"/></svg></button>';
        }
        html += '</div>';

        // 子任务列表（可折叠）
        if (subTasks.length > 0) {
          html += '<div class="task-group-content">';
          subTasks.forEach((st, index) => {
            const stStatusCls = st.status === 'running' ? 'running' : st.status === 'completed' ? 'completed' : st.status === 'failed' ? 'failed' : st.status === 'skipped' ? 'skipped' : 'pending';
            const workerName = (st.assignedWorker || st.assignedCli || 'auto').toLowerCase();
            const description = st.description || st.title || '子任务 ' + (index + 1);
            const cliClass = workerName.includes('claude') ? 'claude' : workerName.includes('codex') ? 'codex' : workerName.includes('gemini') ? 'gemini' : '';

            html += '<div class="task-item" data-subtask-id="' + st.id + '">';
            html += '<div class="task-status ' + stStatusCls + '"></div>';
            html += '<div class="task-info">';
            html += '<span class="task-name">' + escapeHtml(description.slice(0, 50)) + (description.length > 50 ? '...' : '') + '</span>';
            html += '<div class="task-meta">';
            html += '<span class="task-cli ' + cliClass + '">' + workerName + '</span>';
            const fileCount = (st.modifiedFiles && st.modifiedFiles.length > 0)
              ? st.modifiedFiles.length
              : (st.targetFiles ? st.targetFiles.length : 0);
            if (fileCount > 0) {
              html += '<span class="task-files">' + fileCount + '文件</span>';
            }
            html += '</div></div></div>';
          });
          html += '</div>';
        }

        html += '</div>';
      });

      html += '</div>';
      container.innerHTML = html;
    }

    // 切换任务组展开/折叠
    function toggleTaskGroup(taskId) {
      const group = document.querySelector('.task-group[data-task-id="' + taskId + '"]');
      if (group) {
        group.classList.toggle('expanded');
        group.classList.toggle('collapsed');
      }

    window.toggleTaskGroup = toggleTaskGroup;

    // 清理所有任务

    function renderEditsView() {
      const container = document.getElementById('edits-content');

      pendingChanges.forEach(edit => {
        const fileName = edit.filePath.split('/').pop();
        const dirPath = edit.filePath.split('/').slice(0, -1).join('/');

        html += '<div class="edit-item" data-file="' + escapeHtml(edit.filePath) + '" onclick="viewDiff(\'' + escapeHtml(edit.filePath) + '\')">';
        html += '<svg class="edit-file-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.414A2 2 0 0 0 13.414 3L11 .586A2 2 0 0 0 9.586 0H4z"/></svg>';

        html += '<div class="edit-file-path"><span class="edit-file-name">' + escapeHtml(fileName) + '</span>';
        if (dirPath) html += '<span class="edit-file-dir">' + escapeHtml(dirPath) + '</span>';
        html += '</div></div>';
        html += '<div class="edit-stats">';
        html += '<span class="edit-stat-add">+' + (edit.additions || 0) + '</span>';
        html += '<span class="edit-stat-del">-' + (edit.deletions || 0) + '</span>';

        html += '<div class="edit-actions" onclick="event.stopPropagation()">';
        html += '<button class="btn-icon" onclick="approveChange(\'' + escapeHtml(edit.filePath) + '\')" title="批准"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg></button>';
        html += '<button class="btn-icon" onclick="revertChange(\'' + escapeHtml(edit.filePath) + '\')" title="还原"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 0-.908-.417A6 6 0 1 0 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 0-.41-.192L5.23 2.308a.25.25 0 0 0 0 .384l2.36 1.966A.25.25 0 0 0 8 4.466z"/></svg></button>';
        html += '</div></div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

   
    function getToolIcon(toolName) {
      const name = (toolName || '').toLowerCase();
      // 文件读取
      if (name.includes('read') || name.includes('view') || name.includes('cat')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zM10 4a1 1 0 0 1-1-1V1.5L13.5 6H11a1 1 0 0 1-1-1V4z"/></svg>';
      }
      // 文件写入/编辑
      if (name.includes('write') || name.includes('edit') || name.includes('save') || name.includes('create') || name.includes('patch')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5L13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5z"/></svg>';

      if (name.includes('search') || name.includes('find') || name.includes('grep') || name.includes('glob')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>';

      // 终端/命令执行

        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M6 9a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3A.5.5 0 0 1 6 9zM3.854 4.146a.5.5 0 1 0-.708.708L4.793 6.5 3.146 8.146a.5.5 0 1 0 .708.708l2-2a.5.5 0 0 0 0-.708l-2-2z"/><path d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm12 1a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h12z"/></svg>';
      }
      // 列表/目录
      if (name.includes('list') || name.includes('ls') || name.includes('dir')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2zm4 0v12h10a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1H4zm-1 0H2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h1V2z"/></svg>';
      }
      // 网络/API
      if (name.includes('fetch') || name.includes('http') || name.includes('api') || name.includes('web') || name.includes('url')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm7.5-6.923c-.67.204-1.335.82-1.887 1.855A7.97 7.97 0 0 0 5.145 4H7.5V1.077zM4.09 4a9.267 9.267 0 0 1 .64-1.539 6.7 6.7 0 0 1 .597-.933A7.025 7.025 0 0 0 2.255 4H4.09zm-.582 3.5c.03-.877.138-1.718.312-2.5H1.674a6.958 6.958 0 0 0-.656 2.5h2.49zM4.847 5a12.5 12.5 0 0 0-.338 2.5H7.5V5H4.847z"/></svg>';
      }
      // 思考/分析
      if (name.includes('think') || name.includes('reason') || name.includes('analyze')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zM7 6.5C7 7.328 6.552 8 6 8s-1-.672-1-1.5S5.448 5 6 5s1 .672 1 1.5zM4.285 9.567a.5.5 0 0 1 .683.183A3.498 3.498 0 0 0 8 11.5a3.498 3.498 0 0 0 3.032-1.75.5.5 0 1 1 .866.5A4.498 4.498 0 0 1 8 12.5a4.498 4.498 0 0 1-3.898-2.25.5.5 0 0 1 .183-.683zM10 8c-.552 0-1-.672-1-1.5S9.448 5 10 5s1 .672 1 1.5S10.552 8 10 8z"/></svg>';
      }
      // 删除
      if (name.includes('delete') || name.includes('remove') || name.includes('rm')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1z"/></svg>';
      }
      // 默认：扳手工具图标
      return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M1 0L0 1l2.2 3.081a1 1 0 0 0 .815.419h.07a1 1 0 0 1 .708.293l2.675 2.675-2.617 2.654A3.003 3.003 0 0 0 0 13a3 3 0 1 0 5.878-.851l2.654-2.617.968.968-.305.914a1 1 0 0 0 .242 1.023l3.356 3.356a1 1 0 0 0 1.414 0l1.586-1.586a1 1 0 0 0 0-1.414l-3.356-3.356a1 1 0 0 0-1.023-.242l-.914.305-.968-.968 2.617-2.654A3.003 3.003 0 0 0 13 0a3 3 0 1 0-.851 5.878L9.495 8.53 6.82 5.854a1 1 0 0 1-.293-.708v-.07a1 1 0 0 0-.419-.815L1 0zm9.5 5.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm-9 8a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>';
    }

    /**
     * HTML 转义函数
     */
    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /**
     * 移除 ANSI 转义序列（CLI 输出的颜色代码）
     */
    function stripAnsi(text) {
      // 匹配 ANSI 转义序列: ESC[ ... m 和其他控制序列
      return String(text).replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
    }

    /**
     * 移除零宽字符（可能导致复制粘贴问题）
     */
    function stripZeroWidth(text) {
      // 零宽空格、零宽非连接符、零宽连接符等
      return String(text).replace(/[\u200B-\u200D\uFEFF]/g, '');
    }

    function revertAllChanges() { vscode.postMessage({ type: 'revertAllChanges' }); }
    function viewDiff(filePath) { vscode.postMessage({ type: 'viewDiff', filePath }); }
    function interruptTask(taskId) { vscode.postMessage({ type: 'interruptTask', taskId }); }
