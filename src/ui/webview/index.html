        return;
      }

      emptyEl.classList.remove('visible');
      let html = '';
      sessions.slice().reverse().forEach(session => {
        const isActive = session.id === currentSessionId;
        const name = session.name || '会话 ' + session.id.slice(0,6);
        const time = session.updatedAt ? formatTime(new Date(session.updatedAt)) : '';
        const msgCount = (session.messages || []).length;
        html += '<div class="session-item' + (isActive ? ' active' : '') + '" data-session-id="' + session.id + '">';
        html += '<svg class="session-item-icon" viewBox="0 0 16 16"><path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12z"/></svg>';
        html += '<div class="session-item-content"><div class="session-item-name">' + escapeHtml(name) + '</div>';
        html += '<div class="session-item-meta"><span>' + msgCount + ' 条消息</span><span>' + time + '</span></div></div>';
        html += '<div class="session-item-actions">';
        html += '<button class="icon-btn-sm" onclick="event.stopPropagation();renameSession(\'' + session.id + '\')" title="重命名"><svg viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10z"/></svg></button>';
        html += '<button class="icon-btn-sm" onclick="event.stopPropagation();deleteSession(\'' + session.id + '\')" title="删除"><svg viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1z"/></svg></button>';
        html += '</div></div>';
      });
      listEl.innerHTML = html;

      listEl.querySelectorAll('.session-item').forEach(item => {
        item.addEventListener('click', () => {
          const sessionId = item.dataset.sessionId;
          if (sessionId !== currentSessionId) switchSession(sessionId);
          sessionDropdown.classList.remove('visible');
          sessionSelectorBtn.classList.remove('open');
        });
      });
    }

    function formatTime(date) {
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      return date.toLocaleDateString();
    }

    function createNewSession() {
      // 修复：先保存当前会话的消息到后端
      if (currentSessionId && threadMessages.length > 0) {
        vscode.postMessage({
          type: 'saveCurrentSession',
          messages: threadMessages,
          cliOutputs: cliOutputs
        });
      }

      // 清空本地状态准备新会话
      threadMessages = [];
      cliOutputs = { claude: [], codex: [], gemini: [] };

      // 通知后端创建新会话
      vscode.postMessage({ type: 'newSession' });

      sessionDropdown.classList.remove('visible');
      sessionSelectorBtn.classList.remove('open');
      saveWebviewState();
      renderMainContent();
    }

    function switchSession(sessionId) {
      // 修复：先保存当前会话的消息到后端
      if (currentSessionId && currentSessionId !== sessionId && threadMessages.length > 0) {
        vscode.postMessage({
          type: 'saveCurrentSession',
          messages: threadMessages,
          cliOutputs: cliOutputs
        });
      }

      vscode.postMessage({ type: 'switchSession', sessionId });
    }

    function loadSessionMessages(sessionId) {
      const session = sessions.find(s => s.id === sessionId);
      if (session && session.messages) {
        // 转换消息格式：后端存储的是 SessionMessage，前端需要简化格式
        threadMessages = session.messages.map(m => ({
          role: m.role,
          content: m.content,
          time: m.timestamp ? new Date(m.timestamp).toLocaleTimeString().slice(0,5) : '',
          cli: m.cli,
          images: m.images
        }));

        cliOutputs = { claude: [], codex: [], gemini: [] };
        // 恢复 cliOutputs
        if (session.cliOutputs) {
          ['claude', 'codex', 'gemini'].forEach(cli => {
            if (Array.isArray(session.cliOutputs[cli])) {
              cliOutputs[cli] = session.cliOutputs[cli];
            }
          });
        }

        saveWebviewState();
        renderMainContent();

        // 更新会话选择器显示
        renderSessionList();
      }
    }

    function renameSession(sessionId) {
      const session = sessions.find(s => s.id === sessionId);
      const currentName = session ? (session.name || '会话 ' + session.id.slice(0,6)) : '';

      // 使用内联编辑模式
      const sessionItem = document.querySelector('.session-item[data-session-id="' + sessionId + '"]');
      if (!sessionItem) return;

      const contentEl = sessionItem.querySelector('.session-item-content');
      const actionsEl = sessionItem.querySelector('.session-item-actions');
      const originalHtml = contentEl.innerHTML;

      // 隐藏操作按钮
      actionsEl.style.display = 'none';

      // 替换为编辑表单
      contentEl.innerHTML = '<div class="session-item-edit">' +
        '<input type="text" value="' + escapeHtml(currentName) + '" id="rename-input-' + sessionId + '" />' +
        '<button class="save-btn" onclick="saveRename(\'' + sessionId + '\')">保存</button>' +
        '<button class="cancel-btn" onclick="cancelRename(\'' + sessionId + '\')">取消</button>' +
        '</div>';

      const input = document.getElementById('rename-input-' + sessionId);
      input.focus();
      input.select();

      // 回车保存，ESC 取消
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') saveRename(sessionId);
        if (e.key === 'Escape') cancelRename(sessionId);
      });

      // 存储原始 HTML 以便取消时恢复
      sessionItem.dataset.originalHtml = originalHtml;
    }

    window.saveRename = function(sessionId) {
      const input = document.getElementById('rename-input-' + sessionId);
      const newName = input ? input.value.trim() : '';
      if (newName) {
        vscode.postMessage({ type: 'renameSession', sessionId, name: newName });
        // 更新本地数据
        const session = sessions.find(s => s.id === sessionId);
        if (session) session.name = newName;
      }
      renderSessionList();
    };

    window.cancelRename = function(sessionId) {
      renderSessionList();
    };

    function deleteSession(sessionId) {
      // 显示确认对话框
      showConfirmDialog(
        '删除会话',
        '确定要删除这个会话吗？此操作无法撤销。',
        () => {
          vscode.postMessage({ type: 'closeSession', sessionId });
          sessions = sessions.filter(s => s.id !== sessionId);
          if (currentSessionId === sessionId) {
            currentSessionId = sessions.length > 0 ? sessions[sessions.length - 1].id : null;
            if (currentSessionId) loadSessionMessages(currentSessionId);
            else { threadMessages = []; cliOutputs = { claude: [], codex: [], gemini: [] }; renderMainContent(); }
          }
          renderSessionList();
        }
      );
    }

    function showConfirmDialog(title, message, onConfirm) {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-dialog';
      overlay.innerHTML = '<div class="confirm-dialog-content">' +
        '<div class="confirm-dialog-title">' + escapeHtml(title) + '</div>' +
        '<div class="confirm-dialog-message">' + escapeHtml(message) + '</div>' +
        '<div class="confirm-dialog-actions">' +
        '<button class="cancel-btn">取消</button>' +
        '<button class="confirm-btn">确定</button>' +
        '</div></div>';

      document.body.appendChild(overlay);

      overlay.querySelector('.cancel-btn').addEventListener('click', () => {
        document.body.removeChild(overlay);
      });

      overlay.querySelector('.confirm-btn').addEventListener('click', () => {
        document.body.removeChild(overlay);
        onConfirm();
      });

      // 点击背景关闭
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) document.body.removeChild(overlay);
      });
    }

    // 拖动调整输入框高度
    (function() {
      const resizeBar = document.getElementById('input-resize-bar');
      const inputWrapper = document.getElementById('input-wrapper');
      const inputBox = document.getElementById('prompt-input');
      if (!resizeBar || !inputWrapper || !inputBox) return;

      let isDragging = false;
      let startY = 0;
      let startHeight = 0;
      let rafId = null;

      function updateHeight(e) {
        if (!isDragging) return;
        // 向上拖拽增加高度，向下拖拽减少高度
        const dy = startY - e.clientY;
        const newHeight = Math.max(60, Math.min(startHeight + dy, 300));
        inputBox.style.height = newHeight + 'px';
      }

      resizeBar.addEventListener('mousedown', function(e) {
        isDragging = true;
        startY = e.clientY;
        startHeight = inputBox.offsetHeight;
        inputWrapper.classList.add('resizing');
        document.body.style.cursor = 'ns-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
        e.stopPropagation();
      });

      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        e.preventDefault();
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(function() { updateHeight(e); });
      });

      document.addEventListener('mouseup', function() {
        if (isDragging) {
          isDragging = false;
          inputWrapper.classList.remove('resizing');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        }
      });

      // 防止拖拽时选中文本
      resizeBar.addEventListener('selectstart', function(e) { e.preventDefault(); });
    })();

    // 执行按钮
    document.getElementById('execute-btn').addEventListener('click', () => {
      // 如果正在处理中，点击按钮则打断
      if (isProcessing) {
        interruptCurrentOperation();
        return;
      }

      const input = document.getElementById('prompt-input');
      if (input.value.trim() || attachedImages.length > 0) {
        if (hasPendingQuestion()) {
          const answerText = input.value.trim();
          if (!answerText) {
            addSystemMessage('请先回答问题后再提交', 'warning');
            return;
          }
          handleQuestionAnswer(answerText, false);
          input.value = '';
          attachedImages = [];
          renderImagePreviews();
          return;
        }

        // 如果有待确认的面板，先取消它
        if (hasPendingConfirmation()) {
          cancelPendingConfirmation();
        }

        const promptText = input.value.trim() || '请分析这张图片';
        const hasImages = attachedImages.length > 0;
        const selectedCli = document.getElementById('cli-selector')?.value || '';
        setProcessingActor(selectedCli ? 'worker' : 'orchestrator', selectedCli || 'claude');

        // 存储图片数据（不是 HTML 字符串）
        const imageDataUrls = hasImages ? attachedImages.map(img => img.dataUrl) : [];

        const msg = {
          role: 'user',
          content: promptText,
          time: new Date().toLocaleTimeString().slice(0,5),
          images: imageDataUrls  // 单独存储图片数据
        };
        threadMessages.push(msg);
        // 不再添加 loading 消息到数组，改为根据 isProcessing 状态动态显示

        // 设置处理状态
        setProcessingState(true);

        // 发送消息（包含图片数据）
        const imageData = attachedImages.map(img => ({ dataUrl: img.dataUrl }));
        vscode.postMessage({ type: 'executeTask', prompt: promptText, images: imageData });

        // 清空输入和图片
        input.value = '';
        attachedImages = [];
        renderImagePreviews();

        // 切换到对话 Tab 和对话视图
        currentTopTab = 'thread';
        currentBottomTab = 'thread';
        document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
        document.querySelector('.top-tab[data-tab="thread"]')?.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-thread')?.classList.add('active');
        document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
        document.querySelector('.bottom-tab[data-bottom-tab="thread"]')?.classList.add('active');
        render();
        requestAnimationFrame(() => {
          const mainContent = document.getElementById('main-content');
          if (mainContent) mainContent.scrollTop = mainContent.scrollHeight;
        });
      }
    });

    // 回车执行 (Ctrl/Cmd+Enter)
    document.getElementById('prompt-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        document.getElementById('execute-btn').click();
      }
      // Esc 键打断当前操作
      if (e.key === 'Escape' && isProcessing) {
        e.preventDefault();
        interruptCurrentOperation();
      }
    });

    // 全局 Esc 键监听
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && isProcessing) {
        e.preventDefault();
        interruptCurrentOperation();
      }
    });

    // CLI 选择器变更
    document.getElementById('cli-selector').addEventListener('change', e => {
      vscode.postMessage({ type: 'selectCli', cli: e.target.value || null });
    });

    // 增强按钮
    document.getElementById('enhance-btn').addEventListener('click', () => {
      const input = document.getElementById('prompt-input');
      const prompt = input.value.trim();
      if (!prompt) {
        showToast('请先输入任务描述', 'warning');
        return;
      }
      // 进入 loading 状态
      const btn = document.getElementById('enhance-btn');
      const textSpan = btn.querySelector('.enhance-text');
      btn.classList.add('loading');
      btn.disabled = true;
      if (textSpan) textSpan.textContent = '增强中';
      // 发送增强请求（只发送 prompt，后端从系统级存储读取配置）
      vscode.postMessage({ type: 'enhancePrompt', prompt: prompt });
    });

    // 图片粘贴功能
    let attachedImages = []; // 存储附加的图片 { id, dataUrl, file }

    function renderImagePreviews() {
      const container = document.getElementById('image-preview-container');
      if (attachedImages.length === 0) {
        container.classList.remove('has-images');
        container.innerHTML = '';
        return;
      }
      container.classList.add('has-images');
      let html = '';
      attachedImages.forEach((img, idx) => {
        html += '<div class="image-preview-item" data-idx="' + idx + '">';
        html += '<img src="' + img.dataUrl + '" alt="附加图片" />';
        html += '<button class="remove-btn" onclick="removeImage(' + idx + ')" title="移除">×</button>';
        html += '</div>';
      });
      html += '<div class="image-preview-hint"><svg viewBox="0 0 16 16"><path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/><path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/></svg>' + attachedImages.length + ' 张图片</div>';
      container.innerHTML = html;
    }

    window.removeImage = function(idx) {
      attachedImages.splice(idx, 1);
      renderImagePreviews();
    };

    function addImageFromFile(file) {
      if (!file.type.startsWith('image/')) return;
      if (attachedImages.length >= 5) {
        showToast('最多添加 5 张图片', 'warning');
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        attachedImages.push({ id: Date.now(), dataUrl: e.target.result, file: file });
        renderImagePreviews();
        showToast('图片已添加', 'success');
      };
      reader.readAsDataURL(file);
    }

    // 粘贴事件监听
    document.getElementById('prompt-input').addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (file) addImageFromFile(file);
        }
      }
    });

    // 文件选择按钮
    document.getElementById('attach-image-btn').addEventListener('click', () => {
      document.getElementById('image-file-input').click();
    });

    document.getElementById('image-file-input').addEventListener('change', (e) => {
      const files = e.target.files;
      for (const file of files) addImageFromFile(file);
      e.target.value = ''; // 重置以允许重复选择
    });

    // 拖拽上传
    const inputWrapper = document.getElementById('input-wrapper');
    const dropOverlay = document.getElementById('drop-overlay');

    inputWrapper.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropOverlay.classList.add('active');
    });

    inputWrapper.addEventListener('dragleave', (e) => {
      if (!inputWrapper.contains(e.relatedTarget)) {
        dropOverlay.classList.remove('active');
      }
    });

    inputWrapper.addEventListener('drop', (e) => {
      e.preventDefault();
      dropOverlay.classList.remove('active');
      const files = e.dataTransfer?.files;
      if (files) {
        for (const file of files) addImageFromFile(file);

    // 处理恢复确认对话框
    function showRecoveryDialog(taskId, error, canRetry, canRollback) {
      // 创建恢复对话框
      const dialog = document.createElement('div');
      dialog.className = 'recovery-dialog visible';
      dialog.id = 'recovery-dialog';
      dialog.innerHTML = `
        <div class="recovery-dialog-title">
          <svg viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>
          任务执行失败
        </div>
        <div class="recovery-dialog-error">${escapeHtml(error)}</div>

          ${canRetry ? '<button class="recovery-btn retry" data-decision="retry">重试</button>' : ''}

          <button class="recovery-btn continue" data-decision="continue">忽略继续</button>
        </div>
      `;

      // 添加到主内容区域
      const mainContent = document.getElementById('main-content');
      mainContent.appendChild(dialog);

      // 绑定按钮事件
      dialog.querySelectorAll('.recovery-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const decision = btn.dataset.decision;
          vscode.postMessage({ type: 'confirmRecovery', decision: decision });
          dialog.remove();
        });
      });
    }

    function updateEditsBadge() {
      const badge = document.getElementById('edits-badge');
      if (badge) {
        const count = pendingChanges.length;
        badge.textContent = count.toString();
        badge.style.display = count > 0 ? 'inline' : 'none';

    function updateTasksBadge() {
      const badge = document.getElementById('tasks-badge');
      if (badge) {
        const tasks = state?.tasks || [];
        // 找到当前运行中的任务，或最新的有子任务的任务
        const currentTask = tasks.find(t => t.status === 'running' && t.subTasks?.length > 0)
          || tasks.filter(t => t.subTasks?.length > 0).slice(-1)[0];
        const subTasks = currentTask?.subTasks || [];

        if (subTasks.length > 0) {
          // 🆕 显示 "已完成/总数" 格式
          const completedCount = subTasks.filter(st => st.status === 'completed').length;
          const totalCount = subTasks.length;
          badge.textContent = completedCount + '/' + totalCount;
          badge.style.display = 'inline';
        } else {
          badge.style.display = 'none';
        }
      }
    }

    function renderMainContent() {
      const container = document.getElementById('main-content');
      if (!container) return;
      if (!container.dataset.scrollListener) {
        container.dataset.scrollListener = 'true';
        container.addEventListener('scroll', () => {
          const atBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 20;
          autoScrollEnabled[currentBottomTab] = atBottom;
          saveWebviewState();
        }, { passive: true });
      }

      // 修复：渲染前保存滚动位置
      const scrollTop = container.scrollTop;
      const scrollHeight = container.scrollHeight;
      const clientHeight = container.clientHeight;
      // 判断是否在底部附近（允许 50px 误差）
      const wasAtBottom = scrollTop + clientHeight >= scrollHeight - 50;

      if (currentBottomTab === 'thread') {
        renderThreadView(container);
      } else if (['claude', 'codex', 'gemini'].includes(currentBottomTab)) {
        renderCliOutputView(container, currentBottomTab);
      }

      // 修复：渲染后恢复滚动位置
      requestAnimationFrame(() => {
        if (wasAtBottom) {
          // 如果之前在底部，保持在底部
          container.scrollTop = container.scrollHeight;
          autoScrollEnabled[currentBottomTab] = true;
        } else {
          // 否则恢复到之前的位置
          container.scrollTop = scrollTop;
          autoScrollEnabled[currentBottomTab] = false;
        }
      });
    }

    function getStreamKey(source, cli) {
      return (source || 'orchestrator') + ':' + (cli || 'claude');
    }

    function ensureThreadStreamMessage(source, cli, initialContent) {
      const streamKey = getStreamKey(source, cli);
      let idx = threadMessages.findIndex(m => m.streaming && m.streamKey === streamKey);
      if (idx === -1) {
        const msg = {
          role: 'assistant',
          content: initialContent || '',
          time: new Date().toLocaleTimeString().slice(0,5),
          streaming: true,
          startedAt: Date.now(),
          source: source,
          cli: cli,
          streamKey: streamKey
        };
        threadMessages.push(msg);
        idx = threadMessages.length - 1;
      }
      return { idx, msg: threadMessages[idx] };
    }

    function applyThreadStreamUpdate(source, cli, parsed, chunk, likelyJson) {
      const initialContent = parsed && parsed.hasJson ? (parsed.text || '') : (likelyJson ? '' : (chunk || ''));
      const { msg } = ensureThreadStreamMessage(source, cli, initialContent);
      if (parsed && parsed.hasJson) {
        const toolCount = parsed.toolCalls ? parsed.toolCalls.length : 0;
        const thinkingCount = parsed.thinking ? parsed.thinking.length : 0;
        msg.toolCountChanged = (msg.lastToolCount || 0) !== toolCount;
        msg.thinkingCountChanged = (msg.lastThinkingCount || 0) !== thinkingCount;
        msg.content = parsed.text || '';
        msg.thinking = parsed.thinking || [];
        msg.toolCalls = parsed.toolCalls || [];
        msg.lastToolCount = toolCount;
        msg.lastThinkingCount = thinkingCount;
        if (parsed.completed) {
          msg.streaming = false;
        }
      } else if (chunk && !likelyJson) {
        msg.content = (msg.content || '') + chunk;
      }
      return msg;
    }

    function finalizeThreadStream(source, cli, content, error) {
      const streamKey = getStreamKey(source, cli);
      const idx = threadMessages.findIndex(m => m.streaming && m.streamKey === streamKey);
      if (idx !== -1) {
        const msg = threadMessages[idx];
        if (content) {
          msg.content = error ? ('错误: ' + error) : content;
        }
        msg.streaming = false;
        if (error) {
          msg.type = 'error';
          msg.isError = true;
        }
        return msg;
      }
      if (content) {
        threadMessages.push({
          role: 'assistant',
          content: error ? ('错误: ' + error) : content,
          time: new Date().toLocaleTimeString().slice(0,5),
          streaming: false,
          source: source,
          cli: cli,
          streamKey: streamKey,
          isError: !!error,
          type: error ? 'error' : undefined
        });
      }
      return null;
    }

    /** 增量更新：只更新流式消息的内容，避免重建整个 DOM */
    function updateStreamingMessage(streamKey, content) {
      const container = document.getElementById('main-content');
      if (!container || currentBottomTab !== 'thread') return false;

      // 查找带有 streaming 类的消息元素
      const streamingMessage = container.querySelector('.message.streaming[data-stream-key="' + streamKey + '"]');
      if (!streamingMessage) return false;

      const contentEl = streamingMessage.querySelector('.message-content');
      if (!contentEl) return false;

      const streamingMsg = threadMessages.find(m => m.streaming && m.streamKey === streamKey);
      const cli = streamingMsg?.cli || 'claude';
      const rendered = renderNormalizedContent(content || '', cli, { toolCalls: streamingMsg?.toolCalls });
      contentEl.innerHTML = rendered.html;
      if (rendered.isMarkdown) {
        contentEl.classList.add('markdown-rendered');
      } else {
        contentEl.classList.remove('markdown-rendered');
      }
      return true;
    }

    /** 平滑滚动到底部（使用 requestAnimationFrame 避免跳动） */
    let scrollRAF = null;
    function smoothScrollToBottom() {
      if (scrollRAF) return; // 避免重复调度
      scrollRAF = requestAnimationFrame(() => {
        const mainContent = document.getElementById('main-content');
        if (mainContent) {
          if (!autoScrollEnabled[currentBottomTab]) {
            scrollRAF = null;
            return;
          }
          // 使用 smooth 滚动行为
          mainContent.scrollTo({
            top: mainContent.scrollHeight,
            behavior: 'auto' // 流式更新时用 auto 避免延迟
          });
        }
        scrollRAF = null;
      });
    }

    /** 节流的状态保存（避免频繁序列化） */
    let saveStateTimeout = null;
    function throttledSaveState() {
      if (saveStateTimeout) return;
      saveStateTimeout = setTimeout(() => {
        saveWebviewState();
        saveStateTimeout = null;
      }, 500); // 500ms 节流
    }
    let lastStreamSaveAt = 0;
    function shouldSaveStreamState() {
      const now = Date.now();
      if (now - lastStreamSaveAt > 1500) {
        lastStreamSaveAt = now;
        return true;
      }
      return false;
    }

    const streamLatencyState = {};
    function getStreamLatency(cli) {
      const key = cli || 'orchestrator';
      if (!streamLatencyState[key]) {
        streamLatencyState[key] = {
          firstSentAt: null,
          firstRenderAt: null
        };
      }
      return streamLatencyState[key];
    }

    function renderThreadView(container) {
      if (threadMessages.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12.793a.5.5 0 0 0 .854.353l2.853-2.853A1 1 0 0 1 4.414 12H14a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/></svg></div><span class="empty-state-text">开始新对话</span><span class="empty-state-hint">输入任务描述，按 ⌘↵ 发送</span></div>';
        return;
      }
      let html = '';
      // 用于消息分组：记录上一条普通消息的来源标识
      let prevMessageKey = null;

      threadMessages.forEach((m, idx) => {
        // 处理执行计划确认面板 - 不参与分组
        if (m.type === 'plan_confirmation') {
          html += renderPlanConfirmationCard(m, idx);
          prevMessageKey = null;
          return;
        }

        // 处理问题补充面板 - 不参与分组
        if (m.type === 'question_request') {
          html += renderQuestionCard(m, idx);
          prevMessageKey = null;
          return;
        }

        // 处理错误消息 - 不参与分组
        if (m.type === 'error' || m.isError) {
          html += renderErrorMessage(m, idx);
          prevMessageKey = null;
          return;
        }

        // 处理系统提示消息 - 不参与分组
        if (m.type === 'system_notice') {
          html += renderSystemNotice(m, idx);
          prevMessageKey = null;
          return;
        }

        // 处理主线进度消息 - 不参与分组
        if (m.type === 'mainline_progress') {
          html += renderMainlineProgressCard(m, idx);
          prevMessageKey = null;
          return;
        }

        const isUser = m.role === 'user';
        const source = m.source || 'worker';

        // 计算当前消息的分组标识：role + source + cli
        const currentMessageKey = isUser ? 'user' : (source + '-' + (m.cli || 'ai'));

        // 判断是否与上一条消息同源（需要分组）
        const isGrouped = prevMessageKey === currentMessageKey;
        prevMessageKey = currentMessageKey;

        const streamingClass = m.streaming ? ' streaming' : '';
        const messageTypeClass = isUser ? ' user-message' : ' assistant-message';
        const groupedClass = isGrouped ? ' grouped' : '';

        // 🆕 根据 source 和 cli 确定显示名称（仅 AI 消息显示徽章）
        let roleName = '';
        let badgeClass = '';
        if (!isUser) {
          if (source === 'orchestrator') {
            roleName = 'Orchestrator';
            badgeClass = 'orchestrator';
          } else if (m.cli) {
            roleName = m.cli.toUpperCase();
            badgeClass = m.cli.toLowerCase();
          } else {
            roleName = 'AI';
            badgeClass = 'assistant';
          }
        }

        const streamKeyAttr = m.streamKey ? (' data-stream-key="' + m.streamKey + '"') : '';
        html += '<div class="message' + messageTypeClass + streamingClass + groupedClass + '" data-msg-idx="' + idx + '"' + streamKeyAttr + '>';
        html += '<div class="message-body">';
        html += '<div class="message-header">';
        if (!isUser && roleName) {
          html += '<span class="message-role-badge ' + badgeClass + '">' + roleName + '</span>';
        }
        html += '<span class="message-time">' + (m.time || '') + '</span>';
        html += '</div>';

        // 思考面板（仅 AI 消息显示）
        if (!isUser && m.thinking && m.thinking.length > 0) {
          const panelId = 'thinking-thread-' + idx;
          html += '<div class="collapsible-panel thinking" data-panel-id="' + panelId + '">';
          html += '<div class="collapsible-header" onclick="togglePanel(\'' + panelId + '\')">';
          html += '<span class="collapsible-icon"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 12.796V3.204L11.481 8 6 12.796z"/></svg></span>';
          html += '<span class="collapsible-title"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/></svg>思考过程</span>';
          html += '<span class="collapsible-badge">' + m.thinking.length + ' 步</span>';
          html += '</div>';
          // 使用 renderMarkdown 渲染思考内容，支持代码块语法高亮
          const thinkingContent = m.thinking.join('\n\n');
          html += '<div class="collapsible-content"><div class="collapsible-body markdown-rendered">' + renderMarkdown(thinkingContent) + '</div></div>';
          html += '</div>';
        }

        // 消息内容
        let contentHtml = '';
        let contentIsMarkdown = false;
        if (m.images && m.images.length > 0) {
          contentHtml += '<div class="message-images">';
          m.images.forEach(imgSrc => {
            contentHtml += '<img src="' + imgSrc + '" class="message-image-thumb" onclick="showImageViewer(this.src)" />';
          });
          contentHtml += '</div>';
        }
        // 使用统一的规范化入口（仅对 AI 消息）
        if (!isUser && m.content) {
          if (source === 'orchestrator') {
            const sanitized = sanitizeOrchestratorMessage(m.content);
            if (sanitized) {
              const rendered = renderNormalizedContent(sanitized, m.cli, { toolCalls: m.toolCalls });
              contentHtml += rendered.html;
              contentIsMarkdown = rendered.isMarkdown;
            }
          } else {
            const rendered = renderNormalizedContent(m.content, m.cli, { toolCalls: m.toolCalls });
            contentHtml += rendered.html;
            contentIsMarkdown = rendered.isMarkdown;
          }
        } else {
          contentHtml += escapeHtml(m.content || '');
        }
        const contentClass = 'message-content' + (contentIsMarkdown ? ' markdown-rendered' : '');
        html += '<div class="' + contentClass + '">' + contentHtml + '</div>';

        // 工具调用轨道（仅 AI 消息显示）
        if (!isUser && m.toolCalls && m.toolCalls.length > 0) {
          html += renderToolTrack(m.toolCalls, 'tool-thread-' + idx);
        }

        // 重连状态（仅 AI 消息显示）
        if (!isUser && m.reconnecting) {
          html += '<div class="reconnect-indicator"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/><path d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/></svg>' + escapeHtml(m.reconnectMessage || '正在重连...') + '</div>';
        }

        html += '</div></div>';
      });

      // 修复：根据 isProcessing 状态在消息列表底部显示 "正在思考" 动画
      // 这样它始终在最底部，而不是固定在某个消息时间轴位置
      if (isProcessing) {
        // 检查是否已有流式消息正在显示内容（如果有，则不显示 loading）
        const hasActiveStreaming = threadMessages.some(m => m.streaming && m.content && m.content.trim().length > 0);
        const hasRunningToolCall = threadMessages.some(m =>
          m.streaming && m.toolCalls && m.toolCalls.some(t => t.status === 'running')
        );
        if (!hasActiveStreaming || hasRunningToolCall) {
          html += '<div class="message assistant-message loading-message">';
          html += '<div class="message-body">';
          const startAt = thinkingStartAt || Date.now();
          const elapsed = formatElapsed(Date.now() - startAt);
          html += '<div class="message-content message-streaming-hint" data-start-at="' + startAt + '"><span class="thinking-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span> 正在思考 <span class="thinking-elapsed">用时 ' + elapsed + '</span></div>';
          html += '</div></div>';
        }
      }

      container.innerHTML = html;
      if (container.querySelector('.message-streaming-hint')) {
        startStreamingHintTimer();
      } else {
        stopStreamingHintTimer();
      }
    }

    // 渲染系统提示消息
    function renderSystemNotice(m, idx) {
      const type = m.noticeType || 'info';
      const icons = {
        success: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>',
        error: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>',
        warning: '<svg viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>',
        info: '<svg viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>'
      };
      let html = '<div class="system-notice ' + type + '" data-msg-idx="' + idx + '">';
      html += '<span class="system-notice-icon">' + (icons[type] || icons.info) + '</span>';
      html += '<span class="system-notice-text">' + escapeHtml(m.content || '') + '</span>';
      html += '<span class="system-notice-time">' + (m.time || '') + '</span>';
      html += '</div>';
      return html;
    }

    function formatToolPayload(payload) {
      if (payload === undefined || payload === null) return '';
      if (typeof payload === 'string') return payload;
      try {
        return JSON.stringify(payload, null, 2);
      } catch {
        return String(payload);
      }
    }

    function upsertToolCall(message, toolCall) {
      if (!message) return;
      if (!message.toolCalls) message.toolCalls = [];
      const isResult = toolCall.kind === 'result' || toolCall.name === '工具结果';
      const toolId = toolCall.id || toolCall.tool_call_id;
      if (toolId) {
        const existingIdx = message.toolCalls.findIndex(t => t.id === toolId || t.tool_call_id === toolId);
        if (existingIdx !== -1) {
          const existing = message.toolCalls[existingIdx];
          const seq = existing.seq ?? toolCall.seq;
          const timestamp = existing.timestamp ?? toolCall.timestamp ?? Date.now();
          const keepName = existing.name && (isResult || toolCall.name === '工具调用');
          message.toolCalls[existingIdx] = {
            ...existing,
            ...toolCall,
            name: keepName ? existing.name : (toolCall.name || existing.name),
            input: toolCall.input ?? existing.input,
            result: toolCall.result ?? existing.result,
            status: toolCall.status || existing.status,
            seq,
            timestamp
          };
          message.toolCallsVersion = (message.toolCallsVersion || 0) + 1;
          message.toolCallsChanged = true;
          return;
        }
      }
      if (isResult) {
        for (let i = message.toolCalls.length - 1; i >= 0; i -= 1) {
          const existing = message.toolCalls[i];
          if (!existing) continue;
          if ((existing.kind === 'call' || !existing.kind) && (existing.status === 'running' || !existing.status)) {
            message.toolCalls[i] = {
              ...existing,
              result: toolCall.result ?? existing.result,
              status: 'completed'
            };
            message.toolCallsVersion = (message.toolCallsVersion || 0) + 1;
            message.toolCallsChanged = true;
            return;
          }
        }
      }
      const nextSeq = (message.toolCallSeq || 0) + 1;
      message.toolCallSeq = nextSeq;
      const timestamp = toolCall.timestamp ?? Date.now();
      message.toolCalls.push({ ...toolCall, seq: toolCall.seq ?? nextSeq, timestamp });
      message.toolCallsVersion = (message.toolCallsVersion || 0) + 1;
      message.toolCallsChanged = true;
    }

    // 渲染错误消息
    function renderErrorMessage(m, idx) {
      const cli = m.cli || 'system';
      let html = '<div class="error-message-card" data-msg-idx="' + idx + '">';
      html += '<div class="error-message-header">';
      html += '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
      html += '<span class="error-message-title">执行失败</span>';
      html += '<span class="error-message-cli">' + cli.toUpperCase() + '</span>';
      html += '<span class="error-message-time">' + (m.time || '') + '</span>';
      html += '</div>';
      html += '<div class="error-message-content">' + escapeHtml(m.content || '未知错误') + '</div>';
      html += '<div class="error-message-hint">查看 CLI 输出 Tab 获取详细信息</div>';
      html += '</div>';
      return html;
    }

    // 渲染主线进度卡片
    function renderMainlineProgressCard(m, idx) {
      const cli = m.cli || 'system';
      const status = m.progressType || 'started';
      const statusClass = status; // started, completed, failed

      // 状态图标
      let statusIcon = '';
      if (status === 'started') {
        statusIcon = '<svg class="spinning" viewBox="0 0 16 16" fill="currentColor"><path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/><path d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/></svg>';
      } else if (status === 'completed') {
        statusIcon = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg>';
      } else {
        statusIcon = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>';
      }

      let html = '<div class="mainline-progress-card ' + statusClass + '" data-msg-idx="' + idx + '" data-subtask-id="' + (m.subTaskId || '') + '">';
      html += '<div class="mainline-status-icon">' + statusIcon + '</div>';
      html += '<div class="mainline-progress-content">';
      html += '<span class="mainline-progress-desc">' + escapeHtml(m.description || '') + '</span>';
      if (cli !== 'system') {
        html += '<span class="mainline-progress-cli cli-' + cli.toLowerCase() + '">' + cli.toUpperCase() + '</span>';
      }
      html += '</div>';
      html += '<span class="mainline-progress-time">' + (m.time || '') + '</span>';
      html += '</div>';
      return html;
    }

    // 渲染执行计划确认卡片（内联在消息流中）
    function renderPlanConfirmationCard(m, idx) {
      const isPending = m.isPending;
      const statusClass = isPending ? 'pending' : (m.confirmed ? 'confirmed' : 'cancelled');
      const statusText = isPending ? '等待确认' : (m.confirmed ? '已确认' : '已取消');

      let html = '<div class="plan-confirmation-card ' + statusClass + '" data-msg-idx="' + idx + '">';
      html += '<div class="plan-confirmation-header">';
      html += '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0zM4.5 7.5a.5.5 0 0 0 0 1h5.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H4.5z"/></svg>';
      html += '<span class="plan-confirmation-title">执行计划确认</span>';
      html += '<span class="plan-confirmation-status ' + statusClass + '">' + statusText + '</span>';
      html += '<span class="plan-confirmation-time">' + (m.time || '') + '</span>';
      html += '</div>';
      html += '<div class="plan-confirmation-content">' + formatPlanHtml(m.content || '') + '</div>';

      // 只有待确认状态才显示按钮
      if (isPending) {
        html += '<div class="plan-confirmation-actions" id="plan-confirmation-dialog">';
        html += '<button class="plan-confirm-btn cancel" data-action="cancel">';
        html += '<svg viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>';
        html += '取消</button>';
        html += '<button class="plan-confirm-btn confirm" data-action="confirm">';
        html += '<svg viewBox="0 0 16 16"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg>';
        html += '确认执行</button>';
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    // 渲染问题补充卡片
    function renderQuestionCard(m, idx) {
      const isPending = m.isPending;
      const answered = !!m.answered;
      const statusClass = isPending ? 'pending' : (answered ? 'answered' : 'cancelled');
      const statusText = isPending ? '等待回答' : (answered ? '已回答' : '已取消');
      const questions = Array.isArray(m.questions) ? m.questions : [];

      let html = '<div class="question-card ' + statusClass + '" data-msg-idx="' + idx + '">';
      html += '<div class="question-header">';
      html += '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 12.5A5.5 5.5 0 1 1 8 2.5a5.5 5.5 0 0 1 0 11z"/><path d="M7.75 10a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0zM8 4.75a2 2 0 0 0-1.75 2.97.75.75 0 0 0 1.3-.75.5.5 0 1 1 .9 0c0 .5-.25.75-.64 1.05-.52.4-1.11.88-1.11 2.23a.75.75 0 0 0 1.5 0c0-.7.2-.93.63-1.27.55-.43 1.37-1.07 1.37-2.26A2 2 0 0 0 8 4.75z"/></svg>';
      html += '<span class="question-title">需要补充信息</span>';
      html += '<span class="question-status ' + statusClass + '">' + statusText + '</span>';
      html += '<span class="question-time">' + (m.time || '') + '</span>';
      html += '</div>';
      html += '<div class="question-content">';
      html += '<ol class="question-list">';
      questions.forEach(q => {
        html += '<li>' + escapeHtml(String(q)) + '</li>';
      });
      html += '</ol>';
      if (isPending) {
        html += '<div class="question-hint">请在下方输入框回答问题，然后点击发送。</div>';
      } else if (answered && m.answer) {
        html += '<div class="question-answer-display">' + escapeHtml(m.answer) + '</div>';
      }
      html += '</div>';
      if (isPending) {
        html += '<div class="question-actions">';
        html += '<button class="question-btn cancel" data-action="cancel">取消</button>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    // 渲染 CLI 状态卡片
    function renderCliStatusCard(m, idx) {
      const cli = m.cli || 'claude';
      const status = m.status || 'streaming';
      const statusClass = status; // streaming, completed, failed
      // 获取消息来源
      const source = m.source || 'worker';
      const sourceClass = 'source-' + source;

      // 根据来源选择图标
      const orchestratorIcon = '<svg viewBox="0 0 16 16"><path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/></svg>';
      const workerIcons = {
        claude: '<svg viewBox="0 0 16 16"><path d="M6 12.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5ZM3 8.062C3 6.76 4.235 5.765 5.53 5.886a26.58 26.58 0 0 0 4.94 0C11.765 5.765 13 6.76 13 8.062v1.157a.933.933 0 0 1-.765.935c-.845.147-2.34.346-4.235.346-1.895 0-3.39-.2-4.235-.346A.933.933 0 0 1 3 9.219V8.062Z"/></svg>',
        codex: '<svg viewBox="0 0 16 16"><path d="M5.854 4.854a.5.5 0 1 0-.708-.708l-3.5 3.5a.5.5 0 0 0 0 .708l3.5 3.5a.5.5 0 0 0 .708-.708L2.707 8l3.147-3.146zm4.292 0a.5.5 0 0 1 .708-.708l3.5 3.5a.5.5 0 0 1 0 .708l-3.5 3.5a.5.5 0 0 1-.708-.708L13.293 8l-3.147-3.146z"/></svg>',
        gemini: '<svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zM4.5 7.5a.5.5 0 0 1 0-1h7a.5.5 0 0 1 0 1h-7zM4 10a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 4 10z"/></svg>'
      };
      const icon = source === 'orchestrator' ? orchestratorIcon : (workerIcons[cli] || workerIcons.claude);

      // 状态文本
      const statusText = {
        streaming: '正在处理',
        completed: '已完成',
        failed: '执行失败',
        cancelled: '已取消'
      };

      // 来源标签
      const sourceLabel = source === 'orchestrator' ? 'Orchestrator' : 'Worker';
      const roleName = source === 'orchestrator' ? 'Orchestrator' : cli.toUpperCase();

      let html = '<div class="cli-status-card ' + statusClass + ' ' + sourceClass + '" data-cli="' + cli + '" data-msg-idx="' + idx + '" data-source="' + source + '" onclick="switchToCliTab(\'' + cli + '\')">';
      html += '<div class="cli-status-icon ' + sourceClass + '">' + icon + '</div>';
      html += '<div class="cli-status-content">';
      html += '<div class="cli-status-title"><span class="cli-name">' + roleName + '</span> ' + statusText[status];
      html += ' <span class="message-source-tag ' + source + '">' + sourceLabel + '</span></div>';
      html += '<div class="cli-status-desc">' + escapeHtml(m.shortDesc || '正在处理...') + '</div>';
      html += '</div>';
      html += '<div class="cli-status-indicator ' + statusClass + '"></div>';
      html += '</div>';
      return html;
    }

    // 点击状态卡片切换到对应 CLI Tab
    function switchToCliTab(cli) {
      const tab = document.querySelector('.bottom-tab[data-bottom-tab="' + cli + '"]');
      if (tab) tab.click();
    }
    window.switchToCliTab = switchToCliTab;

    // 通用折叠面板切换函数
    function togglePanel(panelId) {
      const panel = document.querySelector('[data-panel-id="' + panelId + '"]');
      if (!panel) return;
      const icon = panel.querySelector('.collapsible-icon');
      const content = panel.querySelector('.collapsible-content');
      if (icon) icon.classList.toggle('expanded');
      if (content) content.classList.toggle('expanded');
    }
    window.togglePanel = togglePanel;

    // 图片查看器
    function showImageViewer(src) {
      const viewer = document.createElement('div');
      viewer.className = 'image-viewer';
      viewer.innerHTML = '<img src="' + src + '" />';
      viewer.onclick = () => viewer.remove();
      document.body.appendChild(viewer);
    }
    window.showImageViewer = showImageViewer;

    function renderTaskCard(task) {
      const statusMap = { pending: '等待中', running: '执行中', completed: '已完成', failed: '失败', interrupted: '已中断' };
      const statusClass = task.status || 'pending';
      let html = '<div class="task-card" data-task-id="' + task.id + '">';
      html += '<div class="task-card-header"><span class="task-status ' + statusClass + '"></span><span class="task-card-title">' + escapeHtml(task.prompt?.slice(0, 50) || '任务') + '</span><span class="task-card-status">' + (statusMap[task.status] || task.status) + '</span></div>';
      if (task.subTasks && task.subTasks.length > 0) {
        html += '<div class="task-card-subtasks">';
        task.subTasks.forEach(st => {
          const kindLabel = st.kind === 'integration' ? '[联调] ' : st.kind === 'repair' ? '[修复] ' : '';
          html += '<div class="subtask-item"><span class="subtask-cli">' + ((st.assignedWorker || st.assignedCli || 'auto')).toUpperCase() + '</span><span class="subtask-desc">' + escapeHtml(kindLabel + (st.description || '')) + '</span></div>';
        });
        html += '</div>';
      }
      if (task.status === 'running') {
        html += '<div class="task-card-actions"><button class="icon-btn" onclick="interruptTask(\'' + task.id + '\')" title="中断">中断</button></div>';
      }
      html += '</div>';
      return html;
    }

    function renderTasksView() {
      const container = document.getElementById('tasks-content');
      if (!container) return;

      // 获取所有任务，过滤掉没有子任务的任务（编排者直接回复的不需要显示）
      // 只有需要 Worker 协助的任务才显示在任务面板
      const allTasks = state?.tasks || [];
      const tasks = allTasks
        .filter(t => t.subTasks && t.subTasks.length > 0)  // 只显示有子任务的
        .slice()
        .reverse();  // 按时间倒序

      if (tasks.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v13.5a.5.5 0 0 1-.777.416L8 13.101l-5.223 2.815A.5.5 0 0 1 2 15.5V2zm2-1a1 1 0 0 0-1 1v12.566l4.723-2.482a.5.5 0 0 1 .554 0L13 14.566V2a1 1 0 0 0-1-1H4z"/></svg></div><span class="empty-state-text">暂无任务</span><span class="empty-state-hint">需要 Worker 协助的任务将在此显示</span></div>';
        return;
      }

      // 任务列表头部（带清理按钮）
      let html = '<div class="tasks-header">';
      html += '<span class="tasks-count">' + tasks.length + ' 个任务</span>';
      html += '<button class="btn-small btn-secondary" onclick="clearAllTasks()" title="清理所有任务">清理</button>';
      html += '</div>';
      html += '<div class="task-list">';

      // 渲染每个任务
      tasks.forEach((task, taskIndex) => {
        const isRunning = task.status === 'running';
        const isExpanded = isRunning || taskIndex === 0; // 运行中或最新的任务默认展开
        const statusMap = { pending: '等待中', running: '执行中', completed: '已完成', failed: '失败', interrupted: '已中断', cancelled: '已取消' };
        const statusClass = task.status || 'pending';
        const subTasks = task.subTasks || [];
        const completedCount = subTasks.filter(st => st.status === 'completed').length;
        const taskTime = task.createdAt ? new Date(task.createdAt).toLocaleTimeString().slice(0, 5) : '';

        html += '<div class="task-group ' + (isExpanded ? 'expanded' : 'collapsed') + '" data-task-id="' + task.id + '">';

        // 任务头部（可点击展开/折叠）
        html += '<div class="task-group-header" onclick="toggleTaskGroup(\'' + task.id + '\')">';
        html += '<div class="task-group-toggle"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg></div>';
        html += '<div class="task-status ' + statusClass + '"></div>';
        html += '<div class="task-group-info">';
        html += '<span class="task-group-title">' + escapeHtml((task.prompt || '任务').slice(0, 50)) + (task.prompt && task.prompt.length > 50 ? '...' : '') + '</span>';
        html += '<span class="task-group-meta">' + (statusMap[task.status] || task.status);
        if (subTasks.length > 0) html += ' · ' + completedCount + '/' + subTasks.length + ' 子任务';
        if (taskTime) html += ' · ' + taskTime;
        html += '</span></div>';
        if (isRunning) {
          html += '<button class="btn-icon btn-danger" onclick="event.stopPropagation();interruptTask(\'' + task.id + '\')" title="中断"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5z"/></svg></button>';
        }
        html += '</div>';

        // 子任务列表（可折叠）
        if (subTasks.length > 0) {
          html += '<div class="task-group-content">';
          subTasks.forEach((st, index) => {
            const stStatusCls = st.status === 'running' ? 'running' : st.status === 'completed' ? 'completed' : st.status === 'failed' ? 'failed' : st.status === 'skipped' ? 'skipped' : 'pending';
            const workerName = (st.assignedWorker || st.assignedCli || 'auto').toLowerCase();
            const description = st.description || st.title || '子任务 ' + (index + 1);
            const cliClass = workerName.includes('claude') ? 'claude' : workerName.includes('codex') ? 'codex' : workerName.includes('gemini') ? 'gemini' : '';

            html += '<div class="task-item" data-subtask-id="' + st.id + '">';
            html += '<div class="task-status ' + stStatusCls + '"></div>';
            html += '<div class="task-info">';
            html += '<span class="task-name">' + escapeHtml(description.slice(0, 50)) + (description.length > 50 ? '...' : '') + '</span>';
            html += '<div class="task-meta">';
            html += '<span class="task-cli ' + cliClass + '">' + workerName + '</span>';
            if (st.targetFiles && st.targetFiles.length > 0) {
              html += '<span class="task-files">' + st.targetFiles.length + '文件</span>';
            }
            html += '</div></div></div>';
          });
          html += '</div>';
        }

        html += '</div>';
      });

      html += '</div>';
      container.innerHTML = html;
    }

    // 切换任务组展开/折叠
    function toggleTaskGroup(taskId) {
      const group = document.querySelector('.task-group[data-task-id="' + taskId + '"]');
      if (group) {
        group.classList.toggle('expanded');
        group.classList.toggle('collapsed');
      }
    }
    window.toggleTaskGroup = toggleTaskGroup;

    // 清理所有任务
    function clearAllTasks() {
      vscode.postMessage({ type: 'clearAllTasks' });
    }
    window.clearAllTasks = clearAllTasks;

    function renderEditsView() {
      const container = document.getElementById('edits-content');
      if (!container) return;
      if (pendingChanges.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10z"/></svg></div><span class="empty-state-text">暂无待处理变更</span><span class="empty-state-hint">CLI 修改文件后将在此显示</span></div>';
        return;
      }
      let html = '<div class="edits-header"><span class="edits-count">' + pendingChanges.length + ' 个变更</span>';
      html += '<div class="edits-batch-actions"><button class="btn-small btn-success" onclick="approveAllChanges()">全部批准</button>';
      html += '<button class="btn-small btn-danger" onclick="revertAllChanges()">全部还原</button></div></div>';
      html += '<div class="edits-list">';
      pendingChanges.forEach(edit => {
        const fileName = edit.filePath.split('/').pop();
        const dirPath = edit.filePath.split('/').slice(0, -1).join('/');
        const cliName = (edit.lastModifiedBy || '').toLowerCase();
        const cliClass = cliName.includes('claude') ? 'claude' : cliName.includes('codex') ? 'codex' : cliName.includes('gemini') ? 'gemini' : '';

        html += '<div class="edit-item" data-file="' + escapeHtml(edit.filePath) + '" onclick="viewDiff(\'' + escapeHtml(edit.filePath) + '\')">';
        html += '<svg class="edit-file-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.414A2 2 0 0 0 13.414 3L11 .586A2 2 0 0 0 9.586 0H4z"/></svg>';
        html += '<div class="edit-info">';
        html += '<div class="edit-file-path"><span class="edit-file-name">' + escapeHtml(fileName) + '</span>';
        if (dirPath) html += '<span class="edit-file-dir">' + escapeHtml(dirPath) + '</span>';
        html += '</div></div>';
        html += '<div class="edit-stats">';
        html += '<span class="edit-stat-add">+' + (edit.additions || 0) + '</span>';
        html += '<span class="edit-stat-del">-' + (edit.deletions || 0) + '</span>';
        if (cliName) html += '<span class="edit-cli-badge ' + cliClass + '">' + cliName + '</span>';
        html += '</div>';
        html += '<div class="edit-actions" onclick="event.stopPropagation()">';
        html += '<button class="btn-icon" onclick="approveChange(\'' + escapeHtml(edit.filePath) + '\')" title="批准"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg></button>';
        html += '<button class="btn-icon" onclick="revertChange(\'' + escapeHtml(edit.filePath) + '\')" title="还原"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 0-.908-.417A6 6 0 1 0 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 0-.41-.192L5.23 2.308a.25.25 0 0 0 0 .384l2.36 1.966A.25.25 0 0 0 8 4.466z"/></svg></button>';
        html += '</div></div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    // 🆕 根据工具名称返回对应的 SVG 图标
    function getToolIcon(toolName) {
      const name = (toolName || '').toLowerCase();
      // 文件读取
      if (name.includes('read') || name.includes('view') || name.includes('cat')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zM10 4a1 1 0 0 1-1-1V1.5L13.5 6H11a1 1 0 0 1-1-1V4z"/></svg>';
      }
      // 文件写入/编辑
      if (name.includes('write') || name.includes('edit') || name.includes('save') || name.includes('create') || name.includes('patch')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5L13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5z"/></svg>';
      }
      // 搜索/查找
      if (name.includes('search') || name.includes('find') || name.includes('grep') || name.includes('glob')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>';
      }
      // 终端/命令执行
      if (name.includes('bash') || name.includes('shell') || name.includes('exec') || name.includes('run') || name.includes('terminal') || name.includes('command')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M6 9a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3A.5.5 0 0 1 6 9zM3.854 4.146a.5.5 0 1 0-.708.708L4.793 6.5 3.146 8.146a.5.5 0 1 0 .708.708l2-2a.5.5 0 0 0 0-.708l-2-2z"/><path d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm12 1a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h12z"/></svg>';
      }
      // 列表/目录
      if (name.includes('list') || name.includes('ls') || name.includes('dir')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2zm4 0v12h10a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1H4zm-1 0H2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h1V2z"/></svg>';
      }
      // 网络/API
      if (name.includes('fetch') || name.includes('http') || name.includes('api') || name.includes('web') || name.includes('url')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm7.5-6.923c-.67.204-1.335.82-1.887 1.855A7.97 7.97 0 0 0 5.145 4H7.5V1.077zM4.09 4a9.267 9.267 0 0 1 .64-1.539 6.7 6.7 0 0 1 .597-.933A7.025 7.025 0 0 0 2.255 4H4.09zm-.582 3.5c.03-.877.138-1.718.312-2.5H1.674a6.958 6.958 0 0 0-.656 2.5h2.49zM4.847 5a12.5 12.5 0 0 0-.338 2.5H7.5V5H4.847z"/></svg>';
      }
      // 思考/分析
      if (name.includes('think') || name.includes('reason') || name.includes('analyze')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zM7 6.5C7 7.328 6.552 8 6 8s-1-.672-1-1.5S5.448 5 6 5s1 .672 1 1.5zM4.285 9.567a.5.5 0 0 1 .683.183A3.498 3.498 0 0 0 8 11.5a3.498 3.498 0 0 0 3.032-1.75.5.5 0 1 1 .866.5A4.498 4.498 0 0 1 8 12.5a4.498 4.498 0 0 1-3.898-2.25.5.5 0 0 1 .183-.683zM10 8c-.552 0-1-.672-1-1.5S9.448 5 10 5s1 .672 1 1.5S10.552 8 10 8z"/></svg>';
      }
      // 删除
      if (name.includes('delete') || name.includes('remove') || name.includes('rm')) {
        return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1z"/></svg>';
      }
      // 默认：扳手工具图标
      return '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M1 0L0 1l2.2 3.081a1 1 0 0 0 .815.419h.07a1 1 0 0 1 .708.293l2.675 2.675-2.617 2.654A3.003 3.003 0 0 0 0 13a3 3 0 1 0 5.878-.851l2.654-2.617.968.968-.305.914a1 1 0 0 0 .242 1.023l3.356 3.356a1 1 0 0 0 1.414 0l1.586-1.586a1 1 0 0 0 0-1.414l-3.356-3.356a1 1 0 0 0-1.023-.242l-.914.305-.968-.968 2.617-2.654A3.003 3.003 0 0 0 13 0a3 3 0 1 0-.851 5.878L9.495 8.53 6.82 5.854a1 1 0 0 1-.293-.708v-.07a1 1 0 0 0-.419-.815L1 0zm9.5 5.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm-9 8a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>';
    }

    function escapeHtml(text) {
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function approveChange(filePath) { vscode.postMessage({ type: 'approveChange', filePath }); }
    function revertChange(filePath) { vscode.postMessage({ type: 'revertChange', filePath }); }
    function approveAllChanges() { vscode.postMessage({ type: 'approveAllChanges' }); }
    function revertAllChanges() { vscode.postMessage({ type: 'revertAllChanges' }); }
    function viewDiff(filePath) { vscode.postMessage({ type: 'viewDiff', filePath }); }
    function interruptTask(taskId) { vscode.postMessage({ type: 'interruptTask', taskId }); }

    // viewDiff 现在直接在 VS Code 中打开原生 diff 视图，无需模态框

    // Toast 通知系统（保留用于即时反馈，如输入验证）
    function showToast(message, type = 'info', duration = 3000) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      const icons = {
        success: '<svg class="toast-icon success" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>',
        error: '<svg class="toast-icon error" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>',
        warning: '<svg class="toast-icon warning" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>',
        info: '<svg class="toast-icon info" viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>'
      };
      toast.innerHTML = icons[type] + '<span class="toast-message">' + escapeHtml(message) + '</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>';
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hiding'); setTimeout(() => toast.remove(), 200); }, duration);
    }

    // 系统消息（显示在对话面板中，替代大部分 Toast）
    function addSystemMessage(message, type = 'info') {
      const icons = {
        success: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>',
        error: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>',
        warning: '<svg viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>',
        info: '<svg viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>'
      };
      const now = new Date();
      const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

      // 添加到当前会话的消息列表
      const sessionMessages = messages[currentSessionId] || [];
      sessionMessages.push({
        type: 'system_notice',
        noticeType: type,
        content: message,
        time: time,
        timestamp: Date.now()
      });
      messages[currentSessionId] = sessionMessages;

      // 渲染并滚动
      renderMainContent();
      smoothScrollToBottom();
      throttledSaveState();
    }

    // 设置面板
    const settingsOverlay = document.getElementById('settings-overlay');
    document.getElementById('settings-btn').addEventListener('click', () => {
      settingsOverlay.classList.add('visible');
      // 打开设置面板时请求 CLI 状态和执行统计
      requestCliStatus();
      requestExecutionStats();
    });
    document.getElementById('settings-close-btn').addEventListener('click', () => settingsOverlay.classList.remove('visible'));
    settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('visible'); });

    // 设置面板 Tab 切换
    document.querySelectorAll('.settings-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;
        // 更新 Tab 按钮状态
        document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        // 更新 Tab 内容显示
        document.querySelectorAll('.settings-tab-content').forEach(content => content.classList.remove('active'));
        document.getElementById('settings-tab-' + targetTab).classList.add('active');
      });
    });

    // CLI 刷新按钮
    document.getElementById('cli-refresh-btn').addEventListener('click', () => {
      const btn = document.getElementById('cli-refresh-btn');
      btn.classList.add('loading');
      requestCliStatus();
      setTimeout(() => btn.classList.remove('loading'), 1000);
    });

    // 统计重置按钮
    document.getElementById('stats-reset-btn').addEventListener('click', () => {
      vscode.postMessage({ type: 'resetExecutionStats' });
    });

    // 请求 CLI 连接状态
    function requestCliStatus() {
      vscode.postMessage({ type: 'checkCliStatus' });
    }

    // 更新 CLI 连接状态 UI
    function updateCliConnectionStatus(cliStatuses) {
      if (!cliStatuses) return;
      const statusTexts = {
        'available': '可用',
        'not_installed': '未安装',
        'auth_failed': '认证失败',
        'unknown': '未知'
      };
      ['claude', 'codex', 'gemini'].forEach(cli => {
        const item = document.querySelector(`.cli-connection-item[data-cli="${cli}"]`);
        if (!item) return;
        const status = cliStatuses[cli] || { status: 'unknown' };
        const isAvailable = status.status === 'available';

        // 更新样式
        item.classList.remove('available', 'unavailable');
        item.classList.add(isAvailable ? 'available' : 'unavailable');

        // 更新状态文本
        const statusEl = item.querySelector('.cli-connection-status');
        if (statusEl) {
          statusEl.textContent = status.version ? `版本: ${status.version}` : (statusTexts[status.status] || status.status);
        }

        // 更新徽章
        const badge = item.querySelector('.cli-connection-badge');
        if (badge) {
          badge.classList.remove('available', 'unavailable', 'checking');
          badge.classList.add(isAvailable ? 'available' : 'unavailable');
          badge.textContent = isAvailable ? '已连接' : (statusTexts[status.status] || '不可用');
        }
      });
    }

    // Prompt 增强配置
    const promptEnhanceUrl = document.getElementById('prompt-enhance-url');
    const promptEnhanceKey = document.getElementById('prompt-enhance-key');
    const promptEnhanceEye = document.getElementById('prompt-enhance-eye');
    const promptEnhanceTest = document.getElementById('prompt-enhance-test');
    const promptEnhanceStatus = document.getElementById('prompt-enhance-status');

    // 从后端获取系统级配置（初始化时请求）
    vscode.postMessage({ type: 'getPromptEnhanceConfig' });

    // 输入变化时保存到后端（系统级存储）
    promptEnhanceUrl.addEventListener('change', savePromptEnhanceConfig);
    promptEnhanceKey.addEventListener('change', savePromptEnhanceConfig);

    // 密钥显示/隐藏切换
    promptEnhanceEye.addEventListener('click', () => {
      const isPassword = promptEnhanceKey.type === 'password';
      promptEnhanceKey.type = isPassword ? 'text' : 'password';
      document.getElementById('eye-icon-closed').style.display = isPassword ? 'none' : 'block';
      document.getElementById('eye-icon-open').style.display = isPassword ? 'block' : 'none';
    });

    // 测试连接
    promptEnhanceTest.addEventListener('click', () => {
      const btn = promptEnhanceTest;
      btn.classList.add('loading');
      promptEnhanceStatus.style.display = 'none';

      vscode.postMessage({
        type: 'testPromptEnhance',
        baseUrl: promptEnhanceUrl.value,
        apiKey: promptEnhanceKey.value
      });

      setTimeout(() => btn.classList.remove('loading'), 2000);
    });

    // 保存 Prompt 增强配置到后端（系统级存储）
    function savePromptEnhanceConfig() {
      const config = {
        baseUrl: promptEnhanceUrl.value,
        apiKey: promptEnhanceKey.value
      };
      // 发送到后端保存（系统级存储）
      vscode.postMessage({ type: 'updatePromptEnhance', config });
    }

    // 更新 Prompt 增强测试结果
    function updatePromptEnhanceStatus(success, message) {
      promptEnhanceStatus.style.display = 'block';
      promptEnhanceStatus.className = 'prompt-enhance-status ' + (success ? 'success' : 'error');
      promptEnhanceStatus.textContent = message;
      promptEnhanceTest.classList.remove('loading');
    }

    // 处理增强后的 Prompt
    function handlePromptEnhanced(enhancedPrompt, error) {
      const btn = document.getElementById('enhance-btn');
      const textSpan = btn.querySelector('.enhance-text');
      // 恢复按钮状态
      btn.classList.remove('loading');
      btn.disabled = false;
      if (textSpan) textSpan.textContent = '增强';

      if (error) {
        addSystemMessage('增强失败: ' + error, 'error');
        return;
      }

      if (enhancedPrompt) {
        const input = document.getElementById('prompt-input');
        input.value = enhancedPrompt;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        addSystemMessage('Prompt 已增强', 'success');
      }
    }

    // 初始化
    render();
    updateSendButtonState();
  </script>
</body>
</html>
