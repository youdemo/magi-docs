                  <svg viewBox="0 0 16 16" id="eye-icon-closed"><path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299l.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/><path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709z"/><path d="M13.646 14.354l-12-12 .708-.708 12 12-.708.708z"/></svg>
                  <svg viewBox="0 0 16 16" id="eye-icon-open" style="display:none"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/></svg>
                </button>
              </div>
            </div>
            <button class="prompt-enhance-test-btn" id="prompt-enhance-test">
              <svg viewBox="0 0 16 16"><path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/></svg>
              测试连接
            </button>
            <div class="prompt-enhance-status" id="prompt-enhance-status" style="display:none"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    window.vscode = vscode;

    // 从 VSCode 状态恢复
    const previousState = vscode.getState() || {};
    let state = null;
    // 🆕 重启后始终显示主对话区域，不恢复上次的 tab 状态
    let currentTopTab = 'thread';
    let currentBottomTab = 'thread';
    let threadMessages = previousState.threadMessages || [];
    // cliOutputs 改为结构化消息数组: { claude: [{role, content, time, streaming}], ... }
    let cliOutputs = previousState.cliOutputs || { claude: [], codex: [], gemini: [] };
    // 兼容旧格式：如果是字符串则转换为空数组
    ['claude', 'codex', 'gemini'].forEach(cli => {
      if (typeof cliOutputs[cli] === 'string') cliOutputs[cli] = [];
    });
    let sessions = previousState.sessions || [];
    let currentSessionId = previousState.currentSessionId || null;
    let pendingChanges = previousState.pendingChanges || [];
    let isProcessing = previousState.isProcessing || false;  // 处理状态
    let thinkingStartAt = previousState.thinkingStartAt || null;
    let streamingHintTimer = null;
    let processingActor = previousState.processingActor || { source: 'orchestrator', cli: 'claude' };
    // 滚动位置记忆：为每个 Tab 存储滚动位置
    let scrollPositions = previousState.scrollPositions || { thread: 0, claude: 0, codex: 0, gemini: 0 };
    let autoScrollEnabled = previousState.autoScrollEnabled || { thread: true, claude: true, codex: true, gemini: true };

    function saveWebviewState() {
      vscode.setState({
        currentTopTab, currentBottomTab, threadMessages, cliOutputs,
        sessions, currentSessionId, pendingChanges, isProcessing, thinkingStartAt, processingActor, scrollPositions,
        autoScrollEnabled
      });
    }

    // 保存当前 Tab 的滚动位置
    function saveScrollPosition() {
      const mainContent = document.getElementById('main-content');
      if (mainContent) {
        scrollPositions[currentBottomTab] = mainContent.scrollTop;
      }
    }

    // 恢复指定 Tab 的滚动位置
    function restoreScrollPosition(tab) {
      const mainContent = document.getElementById('main-content');
      if (mainContent && scrollPositions[tab] !== undefined) {
        mainContent.scrollTop = scrollPositions[tab];
      }
    }

    function formatElapsed(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const minutes = String(Math.floor(totalSec / 60)).padStart(2, '0');
      const seconds = String(totalSec % 60).padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    function updateStreamingHints() {
      const hints = document.querySelectorAll('.message-streaming-hint[data-start-at]');
      if (!hints.length) return;
      hints.forEach(hint => {
        const startAt = Number(hint.dataset.startAt || '');
        if (!startAt) return;
        const elapsedText = formatElapsed(Date.now() - startAt);
        const elapsedSpan = hint.querySelector('.thinking-elapsed');
        if (elapsedSpan) {
          elapsedSpan.textContent = `用时 ${elapsedText}`;
        }
      });
    }

    function startStreamingHintTimer() {
      if (streamingHintTimer) return;
      streamingHintTimer = setInterval(updateStreamingHints, 1000);
      updateStreamingHints();
    }

    function stopStreamingHintTimer() {
      if (!streamingHintTimer) return;
      clearInterval(streamingHintTimer);
      streamingHintTimer = null;
    }

    function setProcessingState(next) {
      if (isProcessing === next) return;
      isProcessing = next;
      if (next) {
        if (!thinkingStartAt) thinkingStartAt = Date.now();
      } else {
        thinkingStartAt = null;
      }
      updateSendButtonState();
      saveWebviewState();
    }

    function setProcessingActor(source, cli) {
      processingActor = {
        source: source || 'orchestrator',
        cli: cli || 'claude'
      };
      saveWebviewState();
    }

    // 恢复状态时如果正在处理，初始化计时起点
    if (isProcessing) {
      if (!thinkingStartAt) thinkingStartAt = Date.now();
    }

    // 更新发送按钮状态
    function updateSendButtonState() {
      const btn = document.getElementById('execute-btn');
      if (!btn) return;
      if (isProcessing) {
        btn.classList.add('processing');
        btn.title = '停止 (Esc)';
      } else {
        btn.classList.remove('processing');
        btn.title = '发送 (Cmd+Enter)';
      }
    }

    // 打断当前操作
    function interruptCurrentOperation() {
      if (!isProcessing) return;
      vscode.postMessage({ type: 'interruptTask' });
      setProcessingState(false);

      // 停止所有流式消息
      threadMessages = threadMessages.filter(m => {
        if (!m.streaming) return true;
        if (m.content) {
          m.streaming = false;
          m.interrupted = true;
          return true;
        }
        return false;
      });

      saveWebviewState();
      renderMainContent();
      addSystemMessage('操作已中断', 'info');
    }

    vscode.postMessage({ type: 'getState' });

    // 防抖渲染：避免频繁重渲染导致闪动
    let renderDebounceTimer = null;
    let lastRenderTime = 0;
    const RENDER_DEBOUNCE_MS = 100;  // 100ms 防抖
    const MIN_RENDER_INTERVAL_MS = 200;  // 最小渲染间隔 200ms

    function debouncedRender() {
      const now = Date.now();
      if (now - lastRenderTime < MIN_RENDER_INTERVAL_MS) {
        // 如果距离上次渲染太近，使用防抖
        if (renderDebounceTimer) clearTimeout(renderDebounceTimer);
        renderDebounceTimer = setTimeout(() => {
          lastRenderTime = Date.now();
          render();
        }, RENDER_DEBOUNCE_MS);
      } else {
        // 否则立即渲染
        lastRenderTime = now;
        render();
      }
    }

    // 主对话面板渲染节流（避免高频输出造成卡顿）
    let mainContentDebounceTimer = null;
    function scheduleRenderMainContent() {
      if (mainContentDebounceTimer) return;
      mainContentDebounceTimer = setTimeout(() => {
        mainContentDebounceTimer = null;
        renderMainContent();
      }, 80);
    }

    // 处理来自扩展的消息
    window.addEventListener('message', event => {
      const msg = event.data;
      if (msg.type === 'stateUpdate') {
        state = msg.state;
        const prevSessionId = currentSessionId;
        sessions = state.sessions || [];
        currentSessionId = state.currentSessionId;
        pendingChanges = state.pendingChanges || [];

        // 从后端状态同步 isRunning（只在变化时更新）
        if (state.isRunning !== undefined && state.isRunning !== isProcessing) {
          setProcessingState(state.isRunning);
        }

        // 更新阶段指示器（不触发完整渲染）
        if (state.orchestratorPhase) {
          updatePhaseIndicator(state.orchestratorPhase, state.isRunning);
        }

        if (currentSessionId && currentSessionId !== prevSessionId) {
          loadSessionMessages(currentSessionId);
        }
        saveWebviewState();
        // 使用防抖渲染
        debouncedRender();
        renderSessionList();
      }
      else if (msg.type === 'subTaskOutput') {
        // 会话隔离：只处理当前会话的输出
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          console.log('[Webview] 忽略非当前会话的输出, msgSessionId:', msg.sessionId, 'currentSessionId:', currentSessionId);
          return;
        }

        const cli = msg.cliType || 'claude';
        // 保存消息来源：orchestrator/worker/system
        const source = msg.source || 'worker';
        const messages = cliOutputs[cli] || [];

        // 尝试解析 JSON 消息
        const chunk = msg.output || '';

        // 编排者消息：直接作为对话内容插入
        if (source === 'orchestrator') {
          const content = chunk.trim();
          if (content) {
            messages.push({
              role: 'assistant',
              content: content,
              time: new Date().toLocaleTimeString().slice(0,5),
              timestamp: Date.now(),
              streaming: false,
              source: source
            });
            cliOutputs[cli] = messages;
            saveWebviewState();
            if (currentBottomTab === cli) {
              scheduleRenderMainContent();
            }
          }
          return;
        }

        // 处理多行输出（每行可能是一个 JSON 事件）
        const parsed = appendStreamJsonChunk(cli, chunk, source);

        cliOutputs[cli] = messages;

        // CLI 面板增量更新
        let lastCliMsg = messages[messages.length - 1];
        if (!lastCliMsg || !lastCliMsg.streaming) {
          messages.push({
            role: 'assistant',
            content: '',
            time: new Date().toLocaleTimeString().slice(0,5),
            timestamp: Date.now(),
            streaming: true,
            startedAt: Date.now(),
            source: source,
            cli: cli
          });
          lastCliMsg = messages[messages.length - 1];
        }
        const trimmedChunk = (chunk || '').trim();
        const likelyJson = trimmedChunk.startsWith('{') || trimmedChunk.startsWith('[');
        if (parsed && parsed.hasJson) {
          lastCliMsg.content = parsed.text || '';
          if (parsed.thinking && parsed.thinking.length > 0) {
            lastCliMsg.thinking = parsed.thinking;
          }
          if (parsed.toolCalls && parsed.toolCalls.length > 0) {
            lastCliMsg.toolCalls = parsed.toolCalls;
          }
          if (parsed.completed) {
            lastCliMsg.streaming = false;
          }
        } else if (trimmedChunk && !likelyJson) {
          lastCliMsg.content = (lastCliMsg.content || '') + chunk;
        }
        const hasCliContent = lastCliMsg && lastCliMsg.content && lastCliMsg.content.trim().length > 0;

        // 同步到主对话窗口（Worker 输出完整展示）
        if (source !== 'orchestrator') {
          const threadMsg = applyThreadStreamUpdate(source, cli, parsed, trimmedChunk ? chunk : '', likelyJson);
          const needThreadFullRender = parsed && parsed.hasJson &&
            (threadMsg.toolCountChanged || threadMsg.thinkingCountChanged);
          if (!needThreadFullRender && threadMsg.content) {
            if (!updateStreamingMessage(threadMsg.streamKey, threadMsg.content)) {
              scheduleRenderMainContent();
            }
          } else if (needThreadFullRender) {
            scheduleRenderMainContent();
            threadMsg.toolCountChanged = false;
            threadMsg.thinkingCountChanged = false;
          }
          throttledSaveState();
        }

        // 尝试增量更新 CLI 面板
        let cliNeedFullRender = false;
        if (currentBottomTab === cli && hasCliContent) {
          if (!updateCliStreamingMessage(cli, lastCliMsg.content)) {
            cliNeedFullRender = true;
          }
        }
        if (lastCliMsg?.toolCallsChanged) {
          cliNeedFullRender = true;
        }
        if (parsed && parsed.hasJson) {
          const toolCount = parsed.toolCalls ? parsed.toolCalls.length : 0;
          if (lastCliMsg.lastToolCount !== toolCount) {
            cliNeedFullRender = true;
            lastCliMsg.lastToolCount = toolCount;
          }
        }
        if (cliNeedFullRender && currentBottomTab === cli) {
          scheduleRenderMainContent();
          if (lastCliMsg) {
            lastCliMsg.renderedToolCallsVersion = lastCliMsg.toolCallsVersion || lastCliMsg.renderedToolCallsVersion;
            lastCliMsg.toolCallsChanged = false;
          }
        }

        // 使用节流保存状态，避免频繁序列化
        throttledSaveState();
        // 使用平滑滚动
        smoothScrollToBottom();
        updateCliDots();
      }
      else if (msg.type === 'cliResponse') {
        // 更新处理状态
        setProcessingState(false);
        // 保存消息来源
        const source = msg.source || 'worker';

        // loading 消息不再存入数组，无需移除

        // 修复问题3：如果有错误，在主对话窗口显示明显的错误消息
        if (msg.error) {
          threadMessages.push({
            role: 'assistant',
            type: 'error',
            cli: msg.cli,
            content: msg.error,
            time: new Date().toLocaleTimeString().slice(0,5),
            isError: true,
            source: source  // 保存来源
          });
          addSystemMessage('任务执行失败: ' + msg.error.substring(0, 100), 'error');
        }

        // 同时更新对应 CLI 的输出面板 - 标记流式消息完成
        if (msg.cli && source !== 'orchestrator') {
          const cliMessages = cliOutputs[msg.cli] || [];
          const lastMsg = cliMessages[cliMessages.length - 1];
          if (lastMsg && lastMsg.streaming) {
            // 更新最后一条流式消息的内容并标记完成
            lastMsg.content = msg.error ? '错误: ' + msg.error : (msg.content || lastMsg.content || '(空响应)');
            lastMsg.streaming = false;
            lastMsg.source = source;  // 保存来源
            if (lastMsg.toolCalls && lastMsg.toolCalls.length > 0) {
              lastMsg.toolCalls.forEach(tool => {
                if (!tool.status || tool.status === 'running') {
                  tool.status = 'completed';
                }
              });
            }
          } else if (msg.content) {
            // 如果没有流式消息，创建新的完成消息
            cliMessages.push({
              role: 'assistant',
              content: msg.content,
              time: new Date().toLocaleTimeString().slice(0,5),
              timestamp: Date.now(),
              streaming: false,
              source: source  // 保存来源
            });
          }
          cliOutputs[msg.cli] = cliMessages;
        }

        // 同步更新主对话中的对应 Worker 流式消息
        if (msg.cli && source !== 'orchestrator') {
          const updated = finalizeThreadStream(source, msg.cli, msg.content, msg.error);
          if (updated) {
            scheduleRenderMainContent();
          }
        }

        saveWebviewState();
        render();
        if (currentBottomTab === msg.cli) renderMainContent();
        requestAnimationFrame(() => {
          const mainContent = document.getElementById('main-content');
          if (mainContent) mainContent.scrollTop = mainContent.scrollHeight;
        });
      }
      else if (msg.type === 'cliSessionEvent') {
        // 会话事件只记录日志，不展示到 CLI 面板
      }
      else if (msg.type === 'streamingUpdate') {
        // 🆕 获取消息来源信息
        const source = msg.source || 'orchestrator';
        const cli = msg.cli || 'claude';
        const streamKey = getStreamKey(source, cli);
        let streamingIdx = threadMessages.findIndex(m => m.streaming && m.streamKey === streamKey);

        // 优化：只有有内容时才处理
        const hasContent = msg.content && msg.content.trim().length > 0;
        if (!hasContent) return; // 无内容时保留 isProcessing 状态显示的加载动画

        let needFullRender = false;
        setProcessingActor(source, cli);
        if (source === 'orchestrator') {
          const latency = getStreamLatency(cli);
          if (!latency.firstSentAt && msg.sentAt) {
            latency.firstSentAt = msg.sentAt;
          }
        }
        const isOrchestratorStream = source === 'orchestrator';
        const isAppend = Boolean(msg.append) && isOrchestratorStream;
        const parsed = isOrchestratorStream
          ? (isAppend ? appendStreamJsonChunk(cli, msg.content, source) : parseStreamJsonBuffer(msg.content, cli, source))
          : { hasJson: false };
        const nextContent = parsed && parsed.hasJson ? parsed.text : (isAppend ? null : msg.content);

        // loading 消息不再存入数组，直接添加或更新 streaming 消息
        if (streamingIdx === -1) {
          const newStreamingMsg = {
            role: 'assistant',
            content: nextContent ?? '',
            time: new Date().toLocaleTimeString().slice(0,5),
            streaming: true,
            startedAt: Date.now(),
            source: source,  // 🆕 保存来源
            cli: cli,        // 🆕 保存 CLI 类型
            streamKey: streamKey
          };
          if (parsed && parsed.hasJson) {
            if (parsed.thinking && parsed.thinking.length > 0) newStreamingMsg.thinking = parsed.thinking;
            if (parsed.toolCalls && parsed.toolCalls.length > 0) newStreamingMsg.toolCalls = parsed.toolCalls;
            const toolCount = parsed.toolCalls ? parsed.toolCalls.length : 0;
            const thinkingCount = parsed.thinking ? parsed.thinking.length : 0;
            newStreamingMsg.lastToolCount = toolCount;
            newStreamingMsg.lastThinkingCount = thinkingCount;
            needFullRender = toolCount > 0 || thinkingCount > 0;
          }
          threadMessages.push(newStreamingMsg);
          if (source === 'orchestrator') {
            const latency = getStreamLatency(cli);
            if (!latency.firstRenderAt) {
              latency.firstRenderAt = Date.now();
              if (latency.firstSentAt) {
                console.log('[MultiCLI] Orchestrator stream first render latency(ms):', latency.firstRenderAt - latency.firstSentAt);
              }
            }
          }
          needFullRender = true; // 新增了元素，需要完整渲染
        } else {
          if (nextContent !== null) {
            threadMessages[streamingIdx].content = nextContent;
          }
          // 🆕 更新来源信息（如果之前没有）
          if (!threadMessages[streamingIdx].source) {
            threadMessages[streamingIdx].source = source;
          }
          if (!threadMessages[streamingIdx].cli) {
            threadMessages[streamingIdx].cli = cli;
          }
          if (parsed && parsed.hasJson) {
            threadMessages[streamingIdx].thinking = parsed.thinking || [];
            threadMessages[streamingIdx].toolCalls = parsed.toolCalls || [];
            const toolCount = parsed.toolCalls ? parsed.toolCalls.length : 0;
            const thinkingCount = parsed.thinking ? parsed.thinking.length : 0;
            if (threadMessages[streamingIdx].lastToolCount !== toolCount) {
              needFullRender = true;
              threadMessages[streamingIdx].lastToolCount = toolCount;
            }
            if (threadMessages[streamingIdx].lastThinkingCount !== thinkingCount) {
              needFullRender = true;
              threadMessages[streamingIdx].lastThinkingCount = thinkingCount;
            }
          }
          // 优化：尝试增量更新
          if (!needFullRender && !updateStreamingMessage(streamKey, threadMessages[streamingIdx].content || '')) {
            needFullRender = true;
          }
        }

        if (needFullRender) {
          scheduleRenderMainContent();
        }

        // 使用节流保存和平滑滚动
        if (!isOrchestratorStream || !isAppend || shouldSaveStreamState()) {
          throttledSaveState();
        }
        smoothScrollToBottom();
      }
      else if (msg.type === 'streamingComplete') {
        const source = msg.source || 'orchestrator';
        const cli = msg.cli || 'claude';
        if (source === 'orchestrator') {
          const latency = getStreamLatency(cli);
          if (!latency.firstSentAt && msg.sentAt) {
            latency.firstSentAt = msg.sentAt;
          }
        }
        const streamKey = getStreamKey(source, cli);
        const content = msg.error ? ('错误: ' + msg.error) : msg.content;
        const parsed = source === 'orchestrator' && !msg.error ? parseStreamJsonBuffer(msg.content || '', cli, source) : null;
        const streamingIdx = threadMessages.findIndex(m => m.streaming && m.streamKey === streamKey);
        const finalContent = parsed && parsed.hasJson ? parsed.text : content;

        if (streamingIdx !== -1) {
          if (finalContent) {
            threadMessages[streamingIdx].content = finalContent;
          }
          threadMessages[streamingIdx].streaming = false;
          threadMessages[streamingIdx].source = source;
          threadMessages[streamingIdx].cli = cli;
          threadMessages[streamingIdx].streamKey = streamKey;
          if (parsed && parsed.hasJson) {
            threadMessages[streamingIdx].thinking = parsed.thinking || [];
            threadMessages[streamingIdx].toolCalls = (parsed.toolCalls || []).map(tool => {
              if (!tool.status || tool.status === 'running') {
                return { ...tool, status: 'completed' };
              }
              return tool;
            });
          }
          if (msg.error) {
            threadMessages[streamingIdx].type = 'error';
            threadMessages[streamingIdx].isError = true;
          }
        } else if (finalContent) {
          threadMessages.push({
            role: 'assistant',
            content: finalContent,
            time: new Date().toLocaleTimeString().slice(0,5),
            streaming: false,
            source: source,
            cli: cli,
            streamKey: streamKey,
            isError: !!msg.error,
            type: msg.error ? 'error' : undefined
          });
          if (parsed && parsed.hasJson) {
            const lastIdx = threadMessages.length - 1;
            threadMessages[lastIdx].thinking = parsed.thinking || [];
            threadMessages[lastIdx].toolCalls = (parsed.toolCalls || []).map(tool => {
              if (!tool.status || tool.status === 'running') {
                return { ...tool, status: 'completed' };
              }
              return tool;
            });
          }
        }

        saveWebviewState();
        renderMainContent();
        smoothScrollToBottom();
        if (source === 'orchestrator') {
          const latency = getStreamLatency(cli);
          if (latency.firstSentAt) {
            console.log('[MultiCLI] Orchestrator stream total latency(ms):', Date.now() - latency.firstSentAt);
          }
          resetStreamState(cli, source);
        }
      }
      else if (msg.type === 'cliStatusChanged') { addSystemMessage(msg.cli + ' 状态已更新', 'info'); updateCliDots(); }
      else if (msg.type === 'cliStatusUpdate') { updateCliConnectionStatus(msg.statuses); }
      else if (msg.type === 'taskInterrupted') {
        // 🆕 任务被中断时，停止所有流式消息
        setProcessingState(false);

        let hasUpdates = false;
        threadMessages.forEach(m => {
          if (m.streaming) {
            m.streaming = false;
            m.interrupted = true;
            hasUpdates = true;
          }
        });

        // 更新 CLI 输出面板中的 streaming 消息
        ['claude', 'codex', 'gemini'].forEach(cli => {
          const messages = cliOutputs[cli] || [];
          messages.forEach(m => {
            if (m.streaming) {
              m.streaming = false;
              m.interrupted = true;
              hasUpdates = true;
            }
          });
        });

        if (hasUpdates) {
          saveWebviewState();
          renderMainContent();
        }
      }
      else if (msg.type === 'promptEnhanceResult') { updatePromptEnhanceStatus(msg.success, msg.message); }
      else if (msg.type === 'promptEnhanced') { handlePromptEnhanced(msg.enhancedPrompt, msg.error); }
      else if (msg.type === 'promptEnhanceConfig') {
        // 从后端接收系统级配置
        const urlInput = document.getElementById('prompt-enhance-url');
        const keyInput = document.getElementById('prompt-enhance-key');
        if (urlInput) urlInput.value = msg.baseUrl || '';
        if (keyInput) keyInput.value = msg.apiKey || '';
      }
      else if (msg.type === 'cliError') { addSystemMessage(msg.cli + ': ' + msg.error, 'error'); }
      else if (msg.type === 'toast') { addSystemMessage(msg.message, msg.toastType || 'info'); }
      // 问题4修复：处理主线信息更新
      else if (msg.type === 'mainlineUpdate') {
        handleMainlineUpdate(msg);
      }
      else if (msg.type === 'sessionCreated') { sessions.push(msg.session); currentSessionId = msg.session.id; saveWebviewState(); renderSessionList(); addSystemMessage('新会话已创建', 'success'); }
      else if (msg.type === 'sessionSwitched') { currentSessionId = msg.sessionId; loadSessionMessages(msg.sessionId); saveWebviewState(); renderSessionList(); }
      else if (msg.type === 'sessionsUpdated') { sessions = msg.sessions; saveWebviewState(); renderSessionList(); }
      // showDiff 消息不再需要处理，现在直接在 VS Code 中打开原生 diff 视图
      // 新增：交互模式和验证相关消息
      else if (msg.type === 'interactionModeChanged') { updateInteractionModeUI(msg.mode); addSystemMessage('已切换到 ' + getModeDisplayName(msg.mode) + ' 模式', 'info'); }
      else if (msg.type === 'phaseChanged') {
        // 传递 isRunning 参数
        updatePhaseIndicator(msg.phase, msg.isRunning);
      }
      else if (msg.type === 'verificationResult') {
        if (msg.success) {
          addSystemMessage('验证通过: ' + msg.summary, 'success');
        } else {
          addSystemMessage('验证失败: ' + msg.summary, 'error');
        }
      }
      else if (msg.type === 'recoveryRequest') { showRecoveryDialog(msg.taskId, msg.error, msg.canRetry, msg.canRollback); }
      else if (msg.type === 'recoveryResult') {
        addSystemMessage(msg.message, msg.success ? 'success' : 'error');
      }
      // 执行统计数据更新
      else if (msg.type === 'executionStatsUpdate') {
        updateExecutionStats(msg.stats, msg.orchestratorStats);
      }
      // CLI 降级通知
      else if (msg.type === 'cliFallbackNotice') {
        addSystemMessage(`${msg.originalCli} 降级到 ${msg.fallbackCli}: ${msg.reason}`, 'warning');
      }
      // 新增：执行计划确认请求
      else if (msg.type === 'orchestratorMessage') {
        const messageType = msg.messageType || '';
        if (messageType === 'plan_ready' || messageType === 'question_request') return;
        if (!msg.content || !msg.content.trim()) return;

        const entry = {
          role: 'assistant',
          content: msg.content,
          time: new Date().toLocaleTimeString().slice(0,5),
          source: 'orchestrator'
        };

        if (messageType === 'error') {
          entry.type = 'error';
          entry.isError = true;
        }

        threadMessages.push(entry);
        saveWebviewState();
        renderMainContent();
        smoothScrollToBottom();
      }
      else if (msg.type === 'questionRequest') {
        showQuestionRequest(msg.questions || []);
      }
      else if (msg.type === 'confirmationRequest') {
        showPlanConfirmation(msg.plan, msg.formattedPlan);
      }
    });

    // 🆕 方案A：只保留内联卡片，移除弹窗
    // 显示执行计划确认 - 只在消息流中添加内联卡片
    function showPlanConfirmation(plan, formattedPlan) {
      // 检查是否已存在待确认的消息（避免重复添加）
      const existingPendingIdx = threadMessages.findIndex(m => m.type === 'plan_confirmation' && m.isPending);
      if (existingPendingIdx !== -1) {
        // 已有待确认消息，更新内容
        threadMessages[existingPendingIdx].content = formattedPlan;
        threadMessages[existingPendingIdx].plan = plan;
      } else {
        // 在消息流中添加确认卡片
        const confirmationMsg = {
          role: 'system',
          type: 'plan_confirmation',
          content: formattedPlan,
          plan: plan,
          time: new Date().toLocaleTimeString().slice(0, 5),
          isPending: true
        };
        threadMessages.push(confirmationMsg);
      }

      saveWebviewState();
      renderMainContent();

      // 自动滚动到确认卡片位置
      requestAnimationFrame(() => {
        const mainContent = document.getElementById('main-content');
        if (mainContent) {
          mainContent.scrollTop = mainContent.scrollHeight;
        }
      });
    }

    // 显示问题补充卡片
    function showQuestionRequest(questions) {
      const normalized = Array.isArray(questions) ? questions.filter(q => q && String(q).trim()) : [];
      if (normalized.length === 0) return;

      const existingIdx = threadMessages.findIndex(m => m.type === 'question_request' && m.isPending);
      if (existingIdx !== -1) {
        threadMessages[existingIdx].questions = normalized;
      } else {
        threadMessages.push({
          role: 'system',
          type: 'question_request',
          questions: normalized,
          time: new Date().toLocaleTimeString().slice(0, 5),
          isPending: true
        });
      }

      setProcessingState(false);
      saveWebviewState();
      renderMainContent();
      const input = document.getElementById('prompt-input');
      if (input) {
        input.placeholder = '请回答补充问题后发送...';
        input.focus();
      }
      requestAnimationFrame(() => {
        const mainContent = document.getElementById('main-content');
        if (mainContent) {
          mainContent.scrollTop = mainContent.scrollHeight;
        }
      });
    }

    function hasPendingQuestion() {
      return threadMessages.some(m => m.type === 'question_request' && m.isPending);
    }

    function handleQuestionAnswer(answer, cancelled) {
      const idx = threadMessages.findIndex(m => m.type === 'question_request' && m.isPending);
      if (idx === -1) return;
      threadMessages[idx].isPending = false;
      threadMessages[idx].answered = !cancelled;
      threadMessages[idx].answer = cancelled ? '' : (answer || '');
      threadMessages[idx].cancelled = !!cancelled;
      vscode.postMessage({ type: 'answerQuestions', answer: cancelled ? null : (answer || '') });
      const input = document.getElementById('prompt-input');
      if (input) {
        input.placeholder = '描述你的任务... (可粘贴图片)';
      }
      saveWebviewState();
      renderMainContent();
      smoothScrollToBottom();
    }

    // 处理确认卡片按钮点击（通过事件委托）
    document.body.addEventListener('click', (e) => {
      const btn = e.target.closest('.plan-confirm-btn');
      if (btn) {
        const action = btn.dataset.action;
        const confirmed = action === 'confirm';
        handlePlanConfirmation(confirmed);
      }
    });

    document.body.addEventListener('click', (e) => {
      const btn = e.target.closest('.question-btn');
      if (!btn) return;
      const action = btn.dataset.action;
      const card = btn.closest('.question-card');
      const textarea = card ? card.querySelector('.question-answer') : null;
      const answer = textarea ? textarea.value.trim() : '';
      if (action === 'submit') {
        if (!answer) {
          addSystemMessage('请先回答问题后再提交', 'warning');
          return;
        }
        handleQuestionAnswer(answer, false);
      } else if (action === 'cancel') {
        handleQuestionAnswer('', true);
      }
    });

    // 处理计划确认/取消
    function handlePlanConfirmation(confirmed) {
      // 发送确认消息到后端
      vscode.postMessage({ type: 'confirmPlan', confirmed: confirmed });

      // 更新消息状态
      const confirmIdx = threadMessages.findIndex(m => m.type === 'plan_confirmation' && m.isPending);
      if (confirmIdx !== -1) {
        threadMessages[confirmIdx].isPending = false;
        threadMessages[confirmIdx].confirmed = confirmed;
      }

      saveWebviewState();
      renderMainContent();
    }

    // 检查是否有待确认的面板
    function hasPendingConfirmation() {
      return threadMessages.some(m => m.type === 'plan_confirmation' && m.isPending);
    }

    // 取消待确认的面板
    function cancelPendingConfirmation() {
      if (hasPendingConfirmation()) {
        handlePlanConfirmation(false);
      }
    }

    // 恢复确认面板状态（切换插件后恢复）- 内联卡片无需特殊恢复，状态已在 threadMessages 中
    function restorePlanConfirmation() {
      // 内联卡片的状态已通过 saveWebviewState/restoreWebviewState 持久化
      // 只需确保渲染正确即可
      if (hasPendingConfirmation()) {
        renderMainContent();
      }
    }

    // 问题4修复：处理主线信息更新
    function handleMainlineUpdate(msg) {
      const time = new Date().toLocaleTimeString().slice(0, 5);
      const finalizeCliStreaming = (cli, success) => {
        if (!cli) return;
        const cliMessages = cliOutputs[cli] || [];
        let updated = false;
        for (let i = cliMessages.length - 1; i >= 0; i--) {
          const m = cliMessages[i];
          if (m && m.streaming) {
            m.streaming = false;
            if (!m.content || !m.content.trim()) {
              cliMessages.splice(i, 1);
            }
            updated = true;
            break;
          }
        }
        if (updated) {
          cliOutputs[cli] = cliMessages;
          saveWebviewState();
          if (currentBottomTab === cli) {
            scheduleRenderMainContent();
          }
        }
      };

      if (msg.updateType === 'subtask_started') {
        // 添加主线进度消息
        threadMessages.push({
          role: 'system',
          type: 'mainline_progress',
          progressType: 'started',
          cli: msg.cli,
          description: msg.description,
          subTaskId: msg.subTaskId,
          time: time
        });
        renderMainContent();
        smoothScrollToBottom();
      } else if (msg.updateType === 'subtask_completed') {
        // 更新对应的进度消息状态
        const progressIdx = threadMessages.findIndex(
          m => m.type === 'mainline_progress' && m.subTaskId === msg.subTaskId && m.progressType === 'started'
        );
        if (progressIdx !== -1) {
          threadMessages[progressIdx].progressType = 'completed';
          threadMessages[progressIdx].success = msg.success;
          // 尝试增量更新
          if (!updateMainlineProgress(msg.subTaskId, 'completed', msg.success)) {
            renderMainContent();
          }
        }

        finalizeCliStreaming(msg.cli, msg.success);
      } else if (msg.updateType === 'subtask_failed') {
        // 🆕 修复：确保 error 是字符串
        let errorMsg = msg.error || '未知错误';
        if (typeof errorMsg === 'object') {
          errorMsg = errorMsg.message || errorMsg.error || JSON.stringify(errorMsg);
        }
        const cliName = msg.cli ? msg.cli.toUpperCase() : '';

        // 更新对应的进度消息状态为失败
        const progressIdx = threadMessages.findIndex(
          m => m.type === 'mainline_progress' && m.subTaskId === msg.subTaskId && m.progressType === 'started'
        );
        if (progressIdx !== -1) {
          threadMessages[progressIdx].progressType = 'failed';
          threadMessages[progressIdx].error = errorMsg;
          threadMessages[progressIdx].cli = msg.cli || threadMessages[progressIdx].cli;
          renderMainContent();
        }

        finalizeCliStreaming(msg.cli, false);
      }
    }

    // 增量更新主线进度状态
    function updateMainlineProgress(subTaskId, status, success) {
      const container = document.getElementById('main-content');
      if (!container) return false;

      const progressCard = container.querySelector('.mainline-progress-card[data-subtask-id="' + subTaskId + '"]');
      if (!progressCard) return false;

      // 更新状态类
      progressCard.classList.remove('started', 'completed', 'failed');
      progressCard.classList.add(status);

      // 更新状态图标
      const statusIcon = progressCard.querySelector('.mainline-status-icon');
      if (statusIcon) {
        if (status === 'completed' && success) {
          statusIcon.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg>';
        } else if (status === 'failed') {
          statusIcon.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>';
        }
      }

      return true;
    }

    // 格式化执行计划为 HTML
    function formatPlanHtml(formattedPlan) {
      // 将 Markdown 格式转换为简单 HTML
      return formattedPlan
        .replace(/## (.*)/g, '<h2>$1</h2>')
        .replace(/### (.*)/g, '<h3>$1</h3>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>')
        .replace(/---/g, '<hr>');
    }

    // 格式化消息内容为更友好的展示
    // 轻量级语法高亮函数 - 修复版
    function highlightSyntax(code, lang) {
      const langLower = (lang || '').toLowerCase();

      // 按行处理，保留原始缩进
      const lines = code.split('\n');
      const highlightedLines = lines.map(line => {
        // 保存前导空格
        const leadingSpaces = line.match(/^(\s*)/)[1];
        const content = line.slice(leadingSpaces.length);

        // 如果是空行，直接返回
        if (!content) return leadingSpaces;

        // 🆕 使用占位符保护字符串和注释，避免被后续处理破坏
        const placeholders = [];
        let tempContent = content;

        // 提取并保护字符串（双引号和单引号）
        tempContent = tempContent.replace(/"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`/g, (match) => {
          const idx = placeholders.length;
          placeholders.push({ type: 'string', value: match });
          return `__PLACEHOLDER_${idx}__`;
        });

        // 提取并保护注释
        if (['js', 'javascript', 'ts', 'typescript', 'go', 'rust', 'java', 'kotlin', 'c', 'cpp'].includes(langLower)) {
          tempContent = tempContent.replace(/\/\/.*$/g, (match) => {
            const idx = placeholders.length;
            placeholders.push({ type: 'comment', value: match });
            return `__PLACEHOLDER_${idx}__`;
          });
        }
        if (['py', 'python', 'sh', 'bash', 'shell', 'zsh', 'yaml', 'yml'].includes(langLower)) {
          tempContent = tempContent.replace(/#.*$/g, (match) => {
            const idx = placeholders.length;
            placeholders.push({ type: 'comment', value: match });
            return `__PLACEHOLDER_${idx}__`;
          });
        }

        // 转义 HTML（在提取字符串和注释之后）
        let result = escapeHtml(tempContent);

        // 根据语言定义关键字
        let keywords = [];
        let types = [];
        let builtins = [];

        if (['js', 'javascript', 'ts', 'typescript', 'jsx', 'tsx'].includes(langLower)) {
          keywords = ['const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while', 'do', 'switch', 'case', 'break', 'continue', 'try', 'catch', 'finally', 'throw', 'new', 'delete', 'typeof', 'instanceof', 'in', 'of', 'class', 'extends', 'super', 'this', 'static', 'get', 'set', 'async', 'await', 'yield', 'import', 'export', 'from', 'as', 'default', 'void', 'interface', 'type', 'enum', 'implements', 'private', 'public', 'protected', 'readonly'];
          types = ['string', 'number', 'boolean', 'object', 'any', 'never', 'unknown', 'void', 'Array', 'Promise', 'Map', 'Set', 'Record', 'Partial', 'Required', 'Readonly'];
          builtins = ['null', 'undefined', 'true', 'false', 'NaN', 'Infinity', 'console', 'window', 'document', 'Math', 'JSON', 'Object', 'String', 'Number', 'Boolean', 'Date', 'RegExp', 'Error'];
        } else if (['py', 'python'].includes(langLower)) {
          keywords = ['def', 'class', 'return', 'if', 'elif', 'else', 'for', 'while', 'try', 'except', 'finally', 'raise', 'import', 'from', 'as', 'with', 'pass', 'break', 'continue', 'lambda', 'yield', 'global', 'nonlocal', 'assert', 'del', 'in', 'is', 'not', 'and', 'or', 'async', 'await'];
          types = ['int', 'str', 'float', 'bool', 'list', 'dict', 'tuple', 'set', 'bytes', 'type', 'object'];
          builtins = ['True', 'False', 'None', 'self', 'print', 'len', 'range', 'open', 'input', 'super', 'isinstance', 'hasattr', 'getattr', 'setattr'];
        } else if (['java', 'kotlin'].includes(langLower)) {
          keywords = ['public', 'private', 'protected', 'static', 'final', 'abstract', 'class', 'interface', 'extends', 'implements', 'new', 'return', 'if', 'else', 'for', 'while', 'do', 'switch', 'case', 'break', 'continue', 'try', 'catch', 'finally', 'throw', 'throws', 'import', 'package', 'this', 'super', 'void', 'instanceof'];
          types = ['int', 'long', 'short', 'byte', 'float', 'double', 'boolean', 'char', 'String', 'Object', 'Integer', 'List', 'Map', 'Set'];
          builtins = ['null', 'true', 'false'];
        } else if (['go', 'golang'].includes(langLower)) {
          keywords = ['func', 'return', 'if', 'else', 'for', 'range', 'switch', 'case', 'default', 'break', 'continue', 'go', 'select', 'chan', 'defer', 'panic', 'recover', 'package', 'import', 'var', 'const', 'type', 'struct', 'interface', 'map', 'make', 'new'];
          types = ['int', 'int8', 'int16', 'int32', 'int64', 'uint', 'float32', 'float64', 'string', 'bool', 'byte', 'rune', 'error'];
          builtins = ['nil', 'true', 'false', 'iota', 'append', 'len', 'cap', 'copy', 'delete', 'close'];
        } else if (['rust', 'rs'].includes(langLower)) {
          keywords = ['fn', 'let', 'mut', 'const', 'return', 'if', 'else', 'match', 'for', 'while', 'loop', 'break', 'continue', 'struct', 'enum', 'impl', 'trait', 'pub', 'use', 'mod', 'crate', 'self', 'super', 'where', 'async', 'await', 'move', 'ref', 'static', 'unsafe', 'dyn'];
          types = ['i8', 'i16', 'i32', 'i64', 'i128', 'u8', 'u16', 'u32', 'u64', 'u128', 'f32', 'f64', 'bool', 'char', 'str', 'String', 'Vec', 'Option', 'Result', 'Box', 'Rc', 'Arc'];
          builtins = ['true', 'false', 'Some', 'None', 'Ok', 'Err', 'Self'];
        } else if (['sh', 'bash', 'shell', 'zsh'].includes(langLower)) {
          keywords = ['if', 'then', 'else', 'elif', 'fi', 'for', 'while', 'do', 'done', 'case', 'esac', 'function', 'return', 'exit', 'export', 'local', 'readonly', 'declare', 'in'];
          builtins = ['echo', 'cd', 'pwd', 'ls', 'rm', 'cp', 'mv', 'mkdir', 'cat', 'grep', 'sed', 'awk', 'npm', 'node', 'git', 'curl', 'wget', 'chmod', 'chown', 'sudo'];
        } else if (['json'].includes(langLower)) {
          // JSON 特殊处理：还原占位符后再处理
          result = result.replace(/__PLACEHOLDER_(\d+)__/g, (_, idx) => {
            const ph = placeholders[parseInt(idx)];
            return '<span class="syntax-string">' + escapeHtml(ph.value) + '</span>';
          });
          // 高亮布尔值和 null
          result = result.replace(/\b(true|false|null)\b/g, '<span class="syntax-builtin">$1</span>');
          // 高亮数字
          result = result.replace(/:\s*(-?\d+\.?\d*(?:[eE][+-]?\d+)?)\b/g, ': <span class="syntax-number">$1</span>');
          return leadingSpaces + result;
        }

        // 高亮数字（在关键字之前，避免匹配到 span 标签中的数字）
        result = result.replace(/\b(\d+\.?\d*(?:[eE][+-]?\d+)?)\b/g, '<span class="syntax-number">$1</span>');

        // 高亮关键字
        keywords.forEach(kw => {
          const regex = new RegExp('(?<![\\w-])(' + kw + ')(?![\\w-])', 'g');
          result = result.replace(regex, '<span class="syntax-keyword">$1</span>');
        });

        // 高亮类型
        types.forEach(t => {
          const regex = new RegExp('(?<![\\w-])(' + t + ')(?![\\w-])', 'g');
          result = result.replace(regex, '<span class="syntax-type">$1</span>');
        });

        // 高亮内置常量/函数
        builtins.forEach(b => {
          const regex = new RegExp('(?<![\\w-])(' + b + ')(?![\\w-])', 'g');
          result = result.replace(regex, '<span class="syntax-builtin">$1</span>');
        });

        // 🆕 还原占位符为高亮后的内容
        result = result.replace(/__PLACEHOLDER_(\d+)__/g, (_, idx) => {
          const ph = placeholders[parseInt(idx)];
          if (ph.type === 'string') {
            return '<span class="syntax-string">' + escapeHtml(ph.value) + '</span>';
          } else if (ph.type === 'comment') {
            return '<span class="syntax-comment">' + escapeHtml(ph.value) + '</span>';
          }
          return escapeHtml(ph.value);
        });

        return leadingSpaces + result;
      });

      return highlightedLines.join('\n');
    }

    // Markdown 渲染函数
    function renderMarkdown(content) {
      if (!content) return '';
      content = content.replace(/\r\n/g, '\n');

      // 🆕 使用占位符保护代码块，避免被后续处理破坏
      const codeBlockPlaceholders = [];

      // 处理代码块，支持多种格式
      content = content.replace(/```(\w*)[ \t]*\n?([\s\S]*?)```/g, function(match, lang, code) {
        const langLabel = lang || 'text';
        const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
        const trimmedCode = code.replace(/^\n+/, '').replace(/\n+$/, '');
        if (!trimmedCode) return '';
        const highlightedCode = highlightSyntax(trimmedCode, langLabel);
        const html = '<div class="markdown-code-block">' +
          '<div class="markdown-code-header">' +
          '<span class="markdown-code-lang">' + escapeHtml(langLabel) + '</span>' +
          '<div class="markdown-code-actions">' +
          '<button class="markdown-code-btn" onclick="copyCodeBlock(\'' + codeId + '\', this)">复制</button>' +
          '</div></div>' +
          '<div class="markdown-code-content"><pre><code id="' + codeId + '">' + highlightedCode + '</code></pre></div>' +
          '</div>';
        const idx = codeBlockPlaceholders.length;
        codeBlockPlaceholders.push(html);
        return `__CODEBLOCK_${idx}__`;
      });

      // 🆕 保护行内代码，避免被粗体/斜体处理破坏
      const inlineCodePlaceholders = [];
      content = content.replace(/`([^`]+)`/g, function(match, code) {
        const idx = inlineCodePlaceholders.length;
        // 行内代码需要 HTML 转义
        inlineCodePlaceholders.push('<code>' + escapeHtml(code) + '</code>');
        return `__INLINECODE_${idx}__`;
      });

      // 处理标题
      content = content.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      content = content.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      content = content.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // 处理粗体和斜体
      content = content.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      content = content.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // 处理链接
      content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

      // 处理无序列表
      content = content.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
      content = content.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

      // 处理有序列表
      content = content.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

      // 处理引用块
      content = content.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      content = content.replace(/<\/blockquote>\n<blockquote>/g, '\n');

      // 处理分隔线
      content = content.replace(/^---$/gm, '<hr>');

      // 🆕 还原行内代码占位符
      content = content.replace(/__INLINECODE_(\d+)__/g, (_, idx) => inlineCodePlaceholders[parseInt(idx)]);

      // 🆕 还原代码块占位符
      content = content.replace(/__CODEBLOCK_(\d+)__/g, (_, idx) => codeBlockPlaceholders[parseInt(idx)]);

      // 处理段落（连续的非空行）
      const lines = content.split('\n');
      let result = '';
      let inParagraph = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const isSpecial = line.startsWith('<h') || line.startsWith('<ul') ||
                         line.startsWith('<ol') || line.startsWith('<blockquote') ||
                         line.startsWith('<hr') || line.startsWith('<div') ||
                         line.startsWith('<li') || line.startsWith('</');

        if (line.trim() === '') {
          if (inParagraph) {
            result += '</p>';
            inParagraph = false;
          }
          result += '\n';
        } else if (isSpecial) {
          if (inParagraph) {
            result += '</p>';
            inParagraph = false;
          }
          result += line + '\n';
        } else {
          if (!inParagraph) {
            result += '<p>';
            inParagraph = true;
          }
          result += line + '\n';
        }
      }
      if (inParagraph) result += '</p>';

      return result;
    }

    function sanitizeOrchestratorMessage(content) {
      if (!content) return '';

      text = text.replace(/`([^`]+)`/g, '$1');
      const lines = text.split('\n');
      const filtered = lines.filter(line => {
        const trimmed = line.trim();
        if (!trimmed) return true;
        if (/^(diff|index |\+\+\+|---|@@)/i.test(trimmed)) return false;
        if (/^(文件|修改文件|变更|diff|patch|文件列表)/i.test(trimmed)) return false;
        return true;
      });
      return filtered.join('\n').replace(/\n{3,}/g, '\n\n').trim();

    function shouldRenderAsCodeBlock(content) {
      if (!content) return false;
      const trimmed = content.trim();
      if (!trimmed) return false;
      if (trimmed.startsWith('```')) return false;
      if (trimmed.startsWith('{') || trimmed.startsWith('[')) return true;
      if (!content.includes('\n')) return false;
      if (/^\s*\d+→/m.test(content)) return true;
      return /^(\s{2,}|\t)/m.test(content);

    function renderToolPanelContent(content) {
      if (!content) return '';
      const text = typeof content === 'string' ? content : String(content);
      let trimmed = text.trim();
      if (!trimmed) return '';
      const fenced = extractSingleCodeFence(trimmed);
      if (fenced) {
        trimmed = (fenced.body || '').trim();
      }
      if (!trimmed) return '';
      const escaped = escapeHtml(trimmed);
      if (trimmed.startsWith('{') || trimmed.startsWith('[') || shouldRenderAsCodeBlock(trimmed)) {
        return '<pre class="tool-raw">' + escaped + '</pre>';

      const normalized = escaped.replace(/(\r?\n){2,}/g, '\n');
      return '<div class="tool-text">' + normalized.replace(/\n/g, '<br>') + '</div>';

    function renderToolTrack(toolCalls, panelPrefix) {
      if (!toolCalls || toolCalls.length === 0) return '';

        const tsA = a.timestamp || 0;
        const tsB = b.timestamp || 0;
        if (tsA !== tsB) return tsA - tsB;
        return (a.seq || 0) - (b.seq || 0);
      });
      let html = '<div class="tool-track">';
      sorted.forEach((tool, toolIdx) => {
        if (tool.kind && tool.kind !== 'call') return;
        if (tool.name === '工具结果') return;
        const toolContent = tool.input || '';
        if (!toolContent || !String(toolContent).trim()) return;
        const isLatest = toolIdx === sorted.length - 1;
        const toolPanelId = panelPrefix + '-' + toolIdx;
        const toolStatus = tool.status || 'completed';
        html += '<div class="tool-item collapsible-panel tool-call" data-panel-id="' + toolPanelId + '">';
        html += '<div class="collapsible-header" onclick="togglePanel(\'' + toolPanelId + '\')">';
        html += '<span class="tool-name">' + getToolIcon(tool.name) + escapeHtml(tool.name || '工具调用') + '</span>';
        html += '<span class="tool-status ' + toolStatus + '">' + (toolStatus === 'running' ? '执行中' : toolStatus === 'failed' ? '失败' : '完成') + '</span>';

        html += '</div>';
        html += '<div class="collapsible-content' + (isLatest ? ' expanded' : '') + '"><div class="collapsible-body tool-body">' + renderToolPanelContent(toolContent) + '</div></div>';

    function appendStreamJsonChunk(cli, chunk, role) {

    // 复制代码块

    function extractJsonInfo(content) {
      if (!content) return { isJson: false, jsonText: '' };
      const trimmed = content.trim();
      if (!trimmed) return { isJson: false, jsonText: '' };
      if (!(trimmed.startsWith('{') || trimmed.startsWith('['))) return { isJson: false, jsonText: '' };
      try {
        JSON.parse(trimmed);
        return { isJson: true, jsonText: trimmed };
      } catch {
        return { isJson: false, jsonText: '' };
      }

    function extractSingleCodeFence(content) {
      if (!content) return null;
      const trimmed = content.trim();
      const match = trimmed.match(/^```(\w*)\s*\n([\s\S]*?)\n?```\s*$/);
      if (!match) return null;
      return { lang: match[1] || '', body: match[2] || '' };
    }

    function buildToolPayloads(toolCalls) {
      const payloads = new Set();
      const jsonPayloads = new Set();
      if (!Array.isArray(toolCalls)) return { payloads, jsonPayloads };
      toolCalls.forEach(call => {
        const raw = call?.input;
        if (raw === undefined || raw === null) return;
        const text = formatToolPayload(raw).trim();
        if (!text) return;
        payloads.add(text);
        if (text.startsWith('{') || text.startsWith('[')) {

            const parsed = JSON.parse(text);
            jsonPayloads.add(JSON.stringify(parsed));
          } catch {
            // ignore parse errors

      const normalized = String(text).replace(/\r\n/g, '\n');
      const parts = normalized.split(/```/);
      return parts.map((part, idx) => {
        if (idx % 2 === 1) return part;
        return part.replace(/\n{2,}/g, '\n');
      }).join('```');
    }

    function normalizeMessageContent(content, options) {
      const raw = collapseExtraBlankLines(content || '');
      const trimmed = raw.trim();
      if (!trimmed) {
        return { type: 'empty', content: '' };
      }

      const toolCalls = options?.toolCalls || [];
      const hasToolCalls = Array.isArray(toolCalls) && toolCalls.length > 0;
      const toolPayloads = hasToolCalls ? buildToolPayloads(toolCalls) : { payloads: new Set(), jsonPayloads: new Set() };
      const strippedRaw = hasToolCalls ? stripToolPayloadsFromContent(raw, toolPayloads) : raw;
      const strippedTrimmed = strippedRaw.trim();
      if (hasToolCalls && !strippedTrimmed) {
        return { type: 'empty', content: '' };
      }
      const hasMarkdown = /```|^#{1,3} |^\* |\*\*|^\d+\. |^> |^---$/m.test(raw);
      const isSummary = raw.includes('执行完成') || raw.includes('任务完成') || raw.includes('已完成');
      const isTask = raw.includes('任务分析') || raw.includes('执行计划');
      const jsonInfo = extractJsonInfo(strippedRaw);

      if (hasToolCalls && jsonInfo.isJson && matchesToolPayload(jsonInfo.jsonText, toolPayloads)) {
        return { type: 'empty', content: '' };
      }
      if (hasToolCalls) {
        const codeFence = extractSingleCodeFence(strippedRaw);
        if (codeFence && matchesToolPayload(codeFence.body, toolPayloads)) {
          return { type: 'empty', content: '' };
        }
      }

      if (hasMarkdown) {
        return { type: 'markdown', content: strippedRaw };
      }
      if (isSummary) {
        return { type: 'summary', content: strippedRaw };
      }
      if (isTask) {
        return { type: 'task', content: strippedRaw };
      }
      if (jsonInfo.isJson) {
        return { type: 'json', content: jsonInfo.jsonText };
      }
      if (shouldRenderAsCodeBlock(strippedRaw)) {
        return { type: 'code', content: strippedRaw };
      }
      return { type: 'text', content: strippedRaw };
    }

    function renderMessageContent(normalized, cli) {
      if (!normalized || normalized.type === 'empty') return '';
      if (normalized.type === 'summary') {
        return formatAsSummaryCard(normalized.content, cli);
      }
      if (normalized.type === 'task') {
        return formatAsTaskCard(normalized.content, cli);
      }
      if (normalized.type === 'markdown') {
        return '<div class="markdown-rendered">' + renderMarkdown(normalized.content) + '</div>';
      }
      if (normalized.type === 'json') {
        return '<div class="markdown-rendered">' + renderMarkdown('```json\n' + normalized.content.replace(/\n$/, '') + '\n```') + '</div>';
      }
      if (normalized.type === 'code') {
        return formatSimpleContent(normalized.content);
      }
      return formatSimpleContent(normalized.content);
    }

    function formatMessageContent(content, cli, options) {
      const normalized = normalizeMessageContent(content, { toolCalls: options?.toolCalls });
      return renderMessageContent(normalized, cli);
    }

    function renderNormalizedContent(content, cli, options) {
      const normalized = normalizeMessageContent(content, { toolCalls: options?.toolCalls });
      return {
        html: renderMessageContent(normalized, cli),
        isMarkdown: ['markdown', 'json', 'code', 'summary', 'task'].includes(normalized.type)
      };
    }

    // 格式化为执行摘要卡片
    function formatAsSummaryCard(content, cli) {
      // 提取关键信息
      const filesMatch = content.match(/修改了?\s*(\d+)\s*个?文件/);
      const filesCount = filesMatch ? filesMatch[1] : '0';

      const successMatch = content.match(/成功|完成|通过/);
      const isSuccess = !!successMatch;

      return '<div class="summary-card">' +
        '<div class="summary-card-header' + (isSuccess ? '' : ' failed') + '">' +
        '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>' +
        '<span class="summary-card-title">' + (isSuccess ? '执行完成' : '执行失败') + '</span>' +
        '</div>' +
        '<div class="summary-card-body">' +
        '<div class="summary-stats">' +
        '<div class="summary-stat"><div class="summary-stat-value">' + filesCount + '</div><div class="summary-stat-label">文件修改</div></div>' +
        '</div>' +
        '<div class="summary-content"><div class="markdown-rendered">' + renderMarkdown(content) + '</div></div>' +
        '</div></div>';
    }

    // 格式化为任务卡片
    function formatAsTaskCard(content, cli) {
      const cliClass = cli ? ' ' + cli.toLowerCase() : '';
      return '<div class="task-card">' +
        '<div class="task-card-header">' +
        '<div class="task-card-title">' +
        '<svg viewBox="0 0 16 16"><path d="M2.5 1A1.5 1.5 0 0 0 1 2.5v11A1.5 1.5 0 0 0 2.5 15h6.086a1.5 1.5 0 0 0 1.06-.44l4.915-4.914A1.5 1.5 0 0 0 15 8.586V2.5A1.5 1.5 0 0 0 13.5 1h-11z"/></svg>' +
        '任务分析' +
        '</div>' +
        (cli ? '<span class="task-card-cli' + cliClass + '">' + cli.toUpperCase() + '</span>' : '') +
        '</div>' +
        '<div class="task-card-body"><div class="markdown-rendered">' + renderMarkdown(content) + '</div></div>' +
        '</div>';
    }

    // 简单内容格式化
    function formatSimpleContent(content) {
      if (shouldRenderAsCodeBlock(content)) {
        const trimmed = content.replace(/\n$/, '');
        const wrapped = trimmed.trim().startsWith('{') || trimmed.trim().startsWith('[')
          ? '```json\n' + trimmed + '\n```'
          : '```text\n' + trimmed + '\n```';
        return '<div class="markdown-rendered">' + renderMarkdown(wrapped) + '</div>';
      }
      // 🆕 修复：先处理行内代码（在 HTML 转义之前），然后再转义其他内容
      // 保护行内代码
      const inlineCodePlaceholders = [];
      let processed = content.replace(/`([^`]+)`/g, function(match, code) {
        const idx = inlineCodePlaceholders.length;
        inlineCodePlaceholders.push('<code>' + escapeHtml(code) + '</code>');
        return `__SIMPLECODE_${idx}__`;
      });
      // 保护粗体
      const boldPlaceholders = [];
      processed = processed.replace(/\*\*(.*?)\*\*/g, function(match, text) {
        const idx = boldPlaceholders.length;
        boldPlaceholders.push('<strong>' + escapeHtml(text) + '</strong>');
        return `__SIMPLEBOLD_${idx}__`;
      });
      // 转义剩余内容
      processed = escapeHtml(processed);
      // 还原占位符
      processed = processed.replace(/__SIMPLECODE_(\d+)__/g, (_, idx) => inlineCodePlaceholders[parseInt(idx)]);
      processed = processed.replace(/__SIMPLEBOLD_(\d+)__/g, (_, idx) => boldPlaceholders[parseInt(idx)]);
      // 处理换行（压缩连续空行，避免行间距过大）
      const normalized = processed.replace(/(\r?\n){2,}/g, '\n');
      return normalized.replace(/\n/g, '<br>');
    }

    // 提取简短描述（用于状态卡片）
    function extractShortDescription(content) {
      if (!content) return '正在处理...';
      // 移除代码块
      let text = content.replace(/```[\s\S]*?```/g, '[代码]');
      // 取第一行非空内容
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length === 0) return '正在处理...';
      // 截取前 60 个字符
      let desc = lines[0].trim();
      if (desc.length > 60) desc = desc.substring(0, 57) + '...';
      return desc;
    }

    // 提取完成摘要
    function extractCompletionSummary(content) {
      if (!content) return '已完成';
      // 尝试提取文件修改信息
      const fileMatch = content.match(/修改了?\s*(\d+)\s*个?文件/);
      if (fileMatch) return '已完成，修改了 ' + fileMatch[1] + ' 个文件';
      // 尝试提取行数信息
      const lineMatch = content.match(/(\d+)\s*行/);
      if (lineMatch) return '已完成，' + lineMatch[1] + ' 行变更';
      // 默认摘要
      const lines = content.split('\n').filter(l => l.trim());
      if (lines.length > 0) {
        let summary = lines[lines.length - 1].trim();
        if (summary.length > 50) summary = summary.substring(0, 47) + '...';
        return summary;
      }
      return '已完成';
    }

    // 获取模式显示名称
    function getModeDisplayName(mode) {
      switch (mode) {
        case 'ask': return '对话';
        case 'agent': return '代理';
        case 'auto': return '自动';

      }

    // 更新阶段指示器
    function updatePhaseIndicator(phase, isRunningFromBackend) {
      console.log('[Webview] 当前阶段:', phase, '后端运行状态:', isRunningFromBackend);
      const indicator = document.getElementById('phase-indicator');
      if (!indicator) return;

      // 阶段映射
      const phaseMap = {
        'idle': 0,
        'started': 1,  // 新增
        'phase1_analysis': 1,
        'analyzing': 1,
        'phase2_waiting_confirmation': 2,
        'waiting_confirmation': 2,
        'waiting_questions': 2,
        'phase3_execution': 3,
        'dispatching': 3,
        'monitoring': 3,
        'integrating': 4,
        'phase4_verification': 5,
        'verifying': 5,
        'phase5_recovery': 6,
        'recovering': 6,
        'phase6_summary': 7,
        'summarizing': 7,
        'completed': 8,
        'failed': -1,
        'interrupted': -2  // 新增
      };

      const currentPhaseNum = phaseMap[phase] || 0;

      // 根据阶段和后端状态更新 isProcessing
      let nextProcessing = false;
      if (isRunningFromBackend !== undefined) {
        nextProcessing = isRunningFromBackend;
      } else {
        // 根据阶段推断运行状态
        nextProcessing = currentPhaseNum > 0 && currentPhaseNum < 7;
      }
      if (phase === 'waiting_questions') {
        nextProcessing = false;
      }
      setProcessingState(nextProcessing);

      // 显示/隐藏指示器
      if (currentPhaseNum > 0 && currentPhaseNum < 8) {
        indicator.classList.add('visible');
      } else {
        indicator.classList.remove('visible');
      }

      // 更新各阶段状态
      const steps = indicator.querySelectorAll('.phase-step');
      const connectors = indicator.querySelectorAll('.phase-step-connector');

      steps.forEach((step, idx) => {
        const stepNum = idx + 1;
        step.classList.remove('active', 'completed');
        if (stepNum === currentPhaseNum) {
          step.classList.add('active');
        } else if (stepNum < currentPhaseNum) {
          step.classList.add('completed');
        }
      });

      connectors.forEach((conn, idx) => {
        conn.classList.toggle('completed', idx + 1 < currentPhaseNum);
      });
    }

          html += '<span class="collapsible-title"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/></svg>思考过程</span>';

        contentEl.textContent = content;

    // 更新 CLI 执行统计面板
    function updateExecutionStats(stats, orchestratorStats) {
      if (!stats || !Array.isArray(stats)) return;

      // 🆕 更新编排者汇总统计
      if (orchestratorStats) {
        const totalTasksEl = document.getElementById('orch-total-tasks');
        const successEl = document.getElementById('orch-success');
        const failedEl = document.getElementById('orch-failed');
        const inputTokensEl = document.getElementById('orch-input-tokens');
        const outputTokensEl = document.getElementById('orch-output-tokens');
        if (totalTasksEl) totalTasksEl.textContent = orchestratorStats.totalTasks || 0;
        if (successEl) successEl.textContent = orchestratorStats.totalSuccess || 0;
        if (failedEl) failedEl.textContent = orchestratorStats.totalFailed || 0;
        if (inputTokensEl) inputTokensEl.textContent = formatTokenCount(orchestratorStats.totalInputTokens || 0);
        if (outputTokensEl) outputTokensEl.textContent = formatTokenCount(orchestratorStats.totalOutputTokens || 0);
      }

      stats.forEach(stat => {
        const card = document.querySelector(`.cli-stat-card[data-cli="${stat.cli}"]`);
        if (!card) return;

        // 更新健康状态
        card.classList.toggle('healthy', stat.isHealthy);
        card.classList.toggle('unhealthy', !stat.isHealthy);

        const healthDot = card.querySelector('.health-dot');
        if (healthDot) {
          healthDot.classList.toggle('healthy', stat.isHealthy);
          healthDot.classList.toggle('unhealthy', !stat.isHealthy);
        }

        // 更新成功率
        const rateEl = card.querySelector('.cli-stat-rate');
        if (rateEl) {
          const rate = stat.totalExecutions > 0 ? Math.round(stat.successRate * 100) : '--';
          rateEl.textContent = rate === '--' ? '--' : rate + '%';
          rateEl.className = 'cli-stat-rate';
          if (rate !== '--') {
            if (rate >= 80) rateEl.classList.add('good');
            else if (rate >= 60) rateEl.classList.add('warning');
            else rateEl.classList.add('bad');
          }
        }

        // 更新详情
        const detailEl = card.querySelector('.cli-stat-detail');
        if (detailEl) {
          const avgTime = stat.avgDuration > 0 ? Math.round(stat.avgDuration / 1000) + 's' : '-';
          detailEl.textContent = `${stat.totalExecutions} 次执行 · 平均 ${avgTime}`;
        }

        // 🆕 更新 token 统计
        const tokensEl = card.querySelector('.cli-stat-tokens');
        if (tokensEl) {
          const inputTokens = formatTokenCount(stat.totalInputTokens || 0);
          const outputTokens = formatTokenCount(stat.totalOutputTokens || 0);
          tokensEl.textContent = `${inputTokens} / ${outputTokens}`;
        }

        // 更新进度条
        const barFill = card.querySelector('.cli-stat-bar-fill');
        if (barFill) {
          const rate = stat.totalExecutions > 0 ? stat.successRate * 100 : 0;
          barFill.style.width = rate + '%';
          barFill.className = 'cli-stat-bar-fill';
          if (rate >= 80) barFill.classList.add('good');
          else if (rate >= 60) barFill.classList.add('warning');
          else barFill.classList.add('bad');
        }
      });
    }

    // 🆕 格式化 token 数量（自动选择合适单位：K/M/G）
    function formatTokenCount(count) {
      if (count >= 1000000000) return (count / 1000000000).toFixed(2) + 'G';
      if (count >= 1000000) return (count / 1000000).toFixed(2) + 'M';
      if (count >= 1000) return (count / 1000).toFixed(2) + 'K';
      return count.toString();
    }

    // 请求执行统计数据
    function requestExecutionStats() {
      vscode.postMessage({ type: 'requestExecutionStats' });
    }

    // Session 选择器

    const sessionDropdown = document.getElementById('session-dropdown');

    });

    document.addEventListener('click', (e) => {
      if (!sessionDropdown.contains(e.target) && e.target !== sessionSelectorBtn) {

        sessionDropdown.classList.remove('visible');

    function renderSessionList() {
      const listEl = document.getElementById('session-list');
      const emptyEl = document.getElementById('session-empty');
      const nameEl = document.getElementById('current-session-name');
      const currentSession = sessions.find(s => s.id === currentSessionId);
      nameEl.textContent = currentSession ? (currentSession.name || '会话 ' + currentSession.id.slice(0,6)) : '新会话';

      if (sessions.length === 0) {
        listEl.innerHTML = '';
