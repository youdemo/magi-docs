        success: '<svg class="toast-icon success" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>',
        error: '<svg class="toast-icon error" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>',
        warning: '<svg class="toast-icon warning" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>',
        info: '<svg class="toast-icon info" viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>'
      };
      toast.innerHTML = icons[type] + '<span class="toast-message">' + escapeHtml(message) + '</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>';
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hiding'); setTimeout(() => toast.remove(), 200); }, duration);
    }

    // 系统消息（显示在对话面板中，替代大部分 Toast）
    function addSystemMessage(message, type = 'info') {
      const icons = {
        success: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>',
        error: '<svg viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>',
        warning: '<svg viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>',
        info: '<svg viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>'
      };
      const now = new Date();
      const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

      // 🔧 修复：使用 threadMessages 而不是 messages
      threadMessages.push({
        type: 'system_notice',
        noticeType: type,
        content: message,
        time: time,
        timestamp: Date.now()
      });

      // 渲染并滚动
      renderMainContent();
      smoothScrollToBottom();
      throttledSaveState();
    }

    // 设置面板
    const settingsOverlay = document.getElementById('settings-overlay');
    document.getElementById('settings-btn').addEventListener('click', () => {
      settingsOverlay.classList.add('visible');
      // 打开设置面板时请求 CLI 状态和执行统计
      requestCliStatus();
      requestExecutionStats();
    });
    document.getElementById('settings-close-btn').addEventListener('click', () => settingsOverlay.classList.remove('visible'));
    settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('visible'); });

    // 设置面板 Tab 切换
    document.querySelectorAll('.settings-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;
        // 更新 Tab 按钮状态
        document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        // 更新 Tab 内容显示
        document.querySelectorAll('.settings-tab-content').forEach(content => content.classList.remove('active'));
        document.getElementById('settings-tab-' + targetTab).classList.add('active');
      });
    });

    // CLI 刷新按钮
    document.getElementById('cli-refresh-btn').addEventListener('click', () => {
      const btn = document.getElementById('cli-refresh-btn');
      btn.classList.add('loading');
      btn.disabled = true;
      requestCliStatus();
      // loading 状态会在 updateCliConnectionStatus 响应时停止
    });

    // 统计重置按钮
    document.getElementById('stats-reset-btn').addEventListener('click', () => {
      vscode.postMessage({ type: 'resetExecutionStats' });
    });

    // 请求 CLI 连接状态
    function requestCliStatus() {
      vscode.postMessage({ type: 'checkCliStatus' });
    }

    // 更新 CLI 连接状态 UI
    function updateCliConnectionStatus(cliStatuses) {
      // 停止刷新按钮的 loading 状态
      const refreshBtn = document.getElementById('cli-refresh-btn');
      if (refreshBtn) {
        refreshBtn.classList.remove('loading');
        refreshBtn.disabled = false;
      }

      if (!cliStatuses) return;
      const statusTexts = {
        'available': '可用',
        'not_installed': '未安装',
        'auth_failed': '认证失败',
        'unknown': '未知'
      };
      ['claude', 'codex', 'gemini'].forEach(cli => {
        const item = document.querySelector(`.cli-connection-item[data-cli="${cli}"]`);
        if (!item) return;
        const status = cliStatuses[cli] || { status: 'unknown' };
        const isAvailable = status.status === 'available';

        // 更新样式
        item.classList.remove('available', 'unavailable');
        item.classList.add(isAvailable ? 'available' : 'unavailable');

        // 更新状态文本
        const statusEl = item.querySelector('.cli-connection-status');
        if (statusEl) {
          statusEl.textContent = status.version ? `版本: ${status.version}` : (statusTexts[status.status] || status.status);
        }

        // 更新徽章
        const badge = item.querySelector('.cli-connection-badge');
        if (badge) {
          badge.classList.remove('available', 'unavailable', 'checking');
          badge.classList.add(isAvailable ? 'available' : 'unavailable');
          badge.textContent = isAvailable ? '已连接' : (statusTexts[status.status] || '不可用');
        }
      });
    }

    // Prompt 增强配置
    const promptEnhanceUrl = document.getElementById('prompt-enhance-url');
    const promptEnhanceKey = document.getElementById('prompt-enhance-key');
    const promptEnhanceEye = document.getElementById('prompt-enhance-eye');
    const promptEnhanceTest = document.getElementById('prompt-enhance-test');
    const promptEnhanceStatus = document.getElementById('prompt-enhance-status');

    // 从后端获取系统级配置（初始化时请求）
    vscode.postMessage({ type: 'getPromptEnhanceConfig' });

    // 输入变化时保存到后端（系统级存储）
    promptEnhanceUrl.addEventListener('change', savePromptEnhanceConfig);
    promptEnhanceKey.addEventListener('change', savePromptEnhanceConfig);

    // 密钥显示/隐藏切换
    promptEnhanceEye.addEventListener('click', () => {
      const isPassword = promptEnhanceKey.type === 'password';
      promptEnhanceKey.type = isPassword ? 'text' : 'password';
      document.getElementById('eye-icon-closed').style.display = isPassword ? 'none' : 'block';
      document.getElementById('eye-icon-open').style.display = isPassword ? 'block' : 'none';
    });

    // 测试连接
    promptEnhanceTest.addEventListener('click', () => {
      const btn = promptEnhanceTest;
      btn.classList.add('loading');
      btn.disabled = true;
      promptEnhanceStatus.style.display = 'none';

      vscode.postMessage({
        type: 'testPromptEnhance',
        baseUrl: promptEnhanceUrl.value,
        apiKey: promptEnhanceKey.value
      });
      // 动画会在 updatePromptEnhanceStatus 响应时停止，不再使用固定超时
    });

    // 保存 Prompt 增强配置到后端（系统级存储）
    function savePromptEnhanceConfig() {
      const config = {
        baseUrl: promptEnhanceUrl.value,
        apiKey: promptEnhanceKey.value
      };
      // 发送到后端保存（系统级存储）
      vscode.postMessage({ type: 'updatePromptEnhance', config });
    }

    // 更新 Prompt 增强测试结果
    function updatePromptEnhanceStatus(success, message) {
      promptEnhanceStatus.style.display = 'block';
      promptEnhanceStatus.className = 'prompt-enhance-status ' + (success ? 'success' : 'error');
      promptEnhanceStatus.textContent = message;
      promptEnhanceTest.classList.remove('loading');
      promptEnhanceTest.disabled = false;
    }

    // 处理增强后的 Prompt
    function handlePromptEnhanced(enhancedPrompt, error) {
      const btn = document.getElementById('enhance-btn');
      const textSpan = btn.querySelector('.enhance-text');
      // 恢复按钮状态
      btn.classList.remove('loading');
      btn.disabled = false;
      if (textSpan) textSpan.textContent = '增强';

      if (error) {
        addSystemMessage('增强失败: ' + error, 'error');
        return;
      }

      if (enhancedPrompt) {
        const input = document.getElementById('prompt-input');
        input.value = enhancedPrompt;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        addSystemMessage('Prompt 已增强', 'success');
      }
    }

    // 初始化
    render();
    updateSendButtonState();
  </script>
</body>
</html>
