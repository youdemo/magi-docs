  <script src="{{libUri}}/marked.min.js"></script>
  <script src="{{libUri}}/highlight.min.js"></script>

  <script>
    const vscode = typeof acquireVsCodeApi === 'function'
      ? acquireVsCodeApi()
      : {
          postMessage: () => {},
          getState: () => ({}),
          setState: () => {}
        };
    window.vscode = vscode;

    // 🆕 配置 marked 和 highlight.js
    // 配置 marked 使用 highlight.js 进行代码高亮
    if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
      marked.setOptions({
        highlight: function(code, lang) {
          if (lang && hljs.getLanguage(lang)) {
            try {
              return hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
            } catch (e) {
              console.warn('[Marked] highlight error:', e);
            }
          }
          // 自动检测语言
          try {
            return hljs.highlightAuto(code).value;
          } catch (e) {
            return code;
          }
        },
        breaks: true,        // 支持 GFM 换行
        gfm: true,           // 启用 GitHub Flavored Markdown
        headerIds: false,    // 禁用标题 ID（避免安全问题）
        mangle: false,       // 禁用邮箱地址混淆
      });
      console.log('[MultiCLI] marked + highlight.js 初始化成功');
    } else {
      console.warn('[MultiCLI] marked 或 highlight.js 未加载');
    }

    // 🔧 问题2修复：全局错误处理
    window.onerror = function(message, source, lineno, colno, error) {
      console.error('[MultiCLI Error]', message, source, lineno, colno, error);
      // 显示用户友好的错误提示
      try {
        const toast = document.createElement('div');
        toast.className = 'toast toast-error';
        toast.textContent = '发生错误，请刷新页面重试';
        toast.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:12px 20px;background:#d32f2f;color:white;border-radius:4px;z-index:9999;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
      } catch (e) { /* 忽略 toast 显示错误 */ }
      return false; // 继续默认处理
    };

    window.addEventListener('unhandledrejection', function(event) {
      console.error('[MultiCLI Unhandled Promise]', event.reason);
    });

    // 从 VSCode 状态恢复
    const previousState = vscode.getState() || {};
    let state = null;
   
    let currentTopTab = 'thread';
    let currentBottomTab = 'thread';
    let threadMessages = previousState.threadMessages || [];
    // cliOutputs 改为结构化消息数组: { claude: [{role, content, time, streaming}], ... }
    let cliOutputs = previousState.cliOutputs || { claude: [], codex: [], gemini: [] };
    // 兼容旧格式：如果是字符串则转换为空数组
    ['claude', 'codex', 'gemini'].forEach(cli => {
      if (typeof cliOutputs[cli] === 'string') cliOutputs[cli] = [];
    });
    let sessions = previousState.sessions || [];
    let currentSessionId = previousState.currentSessionId || null;
    let pendingChanges = previousState.pendingChanges || [];
    let isProcessing = previousState.isProcessing || false;  // 处理状态
    let thinkingStartAt = previousState.thinkingStartAt || null;
    let streamingHintTimer = null;
    let processingActor = previousState.processingActor || { source: 'orchestrator', cli: 'claude' };
    // 滚动位置记忆：为每个 Tab 存储滚动位置
    let scrollPositions = previousState.scrollPositions || { thread: 0, claude: 0, codex: 0, gemini: 0 };
    let autoScrollEnabled = previousState.autoScrollEnabled || { thread: true, claude: true, codex: true, gemini: true };
    let hasInitialRender = false;

    // 🔧 问题1修复：消息列表数量限制，防止无限增长
    const MAX_THREAD_MESSAGES = 500;
    const MAX_CLI_MESSAGES = 200;

    function trimMessageLists() {
      // 裁剪 threadMessages，保留最新的消息
      if (threadMessages.length > MAX_THREAD_MESSAGES) {
        threadMessages = threadMessages.slice(-MAX_THREAD_MESSAGES);
      }
      // 裁剪 cliOutputs
      ['claude', 'codex', 'gemini'].forEach(cli => {
        if (cliOutputs[cli] && cliOutputs[cli].length > MAX_CLI_MESSAGES) {
          cliOutputs[cli] = cliOutputs[cli].slice(-MAX_CLI_MESSAGES);
        }
      });
    }

    function saveWebviewState() {
      // 保存前裁剪消息列表
      trimMessageLists();
      vscode.setState({
        currentTopTab, currentBottomTab, threadMessages, cliOutputs,
        sessions, currentSessionId, pendingChanges, isProcessing, thinkingStartAt, processingActor, scrollPositions,
        autoScrollEnabled
      });
    }

    function renderInitialView() {
      if (hasInitialRender) return;
      renderMainContent();
      renderSessionList();
      updateEditsBadge();
      updateTasksBadge();
      hasInitialRender = true;
    }

    // 保存当前 Tab 的滚动位置
    function saveScrollPosition() {
      const mainContent = document.getElementById('main-content');
      if (mainContent) {
        scrollPositions[currentBottomTab] = mainContent.scrollTop;
      }
    }

    function formatElapsed(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const minutes = String(Math.floor(totalSec / 60)).padStart(2, '0');
      const seconds = String(totalSec % 60).padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    /**
     * 格式化相对时间（如"刚刚"、"5分钟前"）
     */
    function formatRelativeTime(timestamp) {
      if (!timestamp) return '';
      const now = Date.now();
      const diff = now - timestamp;

      if (diff < 60000) return '刚刚';
      if (diff < 3600000) {
        const mins = Math.floor(diff / 60000);
        return mins + ' 分钟前';
      }
      if (diff < 86400000) {
        const hours = Math.floor(diff / 3600000);
        return hours + ' 小时前';
      }
      if (diff < 604800000) {
        const days = Math.floor(diff / 86400000);
        return days + ' 天前';
      }
      // 超过一周显示具体日期
      return new Date(timestamp).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }

    /**
     * 复制消息内容到剪贴板
     */
    function copyMessageContent(btn, msgIdx) {
      const msgEl = btn.closest('.message');
      if (!msgEl) return;

      const contentEl = msgEl.querySelector('.message-content');
      if (!contentEl) return;

      const text = contentEl.textContent || '';
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.title = '已复制';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.title = '复制消息';
        }, 2000);
      });
    }

    /**
     * 切换消息展开/折叠状态
     */
    function toggleMessageExpand(btn) {
      const wrapper = btn.closest('.message-collapsible-wrapper');
      if (!wrapper) return;

      const contentEl = wrapper.querySelector('.message-content');
      if (!contentEl) return;

      const isCollapsed = contentEl.classList.contains('collapsed');
      if (isCollapsed) {
        contentEl.classList.remove('collapsed');
        contentEl.classList.add('expandable');
        btn.textContent = '收起';
      } else {
        contentEl.classList.add('collapsed');
        contentEl.classList.remove('expandable');
        btn.textContent = '展开更多';
      }
    }

    /**
     * 检查消息是否需要折叠
     * 条件：超过15行 或 超过1500字符（约等于折叠高度200px能显示的内容）
     */
    function shouldCollapseMessage(content) {
      if (!content) return false;
      const lineCount = (content.match(/\n/g) || []).length + 1;
      const charCount = content.length;
      // 必须同时满足：行数超过15行 且 字符数超过500
      // 这样可以避免只有几行但每行很短的内容被折叠
      return lineCount > 15 && charCount > 500;
    }

    function updateStreamingHints() {
      // 🔧 修复：同时更新 streaming-hint 和 streaming-footer
      const hints = document.querySelectorAll('.message-streaming-hint[data-start-at], .message-streaming-footer[data-start-at]');
      if (!hints.length) return;
      hints.forEach(hint => {
        const startAt = Number(hint.dataset.startAt || '');
        if (!startAt) return;
        const elapsedText = formatElapsed(Date.now() - startAt);
        const elapsedSpan = hint.querySelector('.thinking-elapsed');
        if (elapsedSpan) {
          elapsedSpan.textContent = `用时 ${elapsedText}`;
        }
      });
    }

    /**
     * 更新所有消息的相对时间显示
     */
    function updateRelativeTimes() {
      const timeSpans = document.querySelectorAll('.message-time[data-timestamp]');
      timeSpans.forEach(span => {
        const timestamp = Number(span.dataset.timestamp || '');
        if (timestamp) {
          span.textContent = formatRelativeTime(timestamp);
        }
      });
    }

    // 每分钟更新一次相对时间
    let relativeTimeTimer = null;
    function startRelativeTimeTimer() {
      if (relativeTimeTimer) return;
      relativeTimeTimer = setInterval(updateRelativeTimes, 60000);
    }
    function stopRelativeTimeTimer() {
      if (!relativeTimeTimer) return;
      clearInterval(relativeTimeTimer);
      relativeTimeTimer = null;
    }
    startRelativeTimeTimer();

    function startStreamingHintTimer() {
      if (streamingHintTimer) return;
      streamingHintTimer = setInterval(updateStreamingHintsWithTimeout, 1000);
      updateStreamingHintsWithTimeout();
    }

    function stopStreamingHintTimer() {
      if (!streamingHintTimer) return;
      clearInterval(streamingHintTimer);
      streamingHintTimer = null;
    }

    // 🔧 风险1修复：带超时检测的流式提示更新
    const STREAM_TIMEOUT = 5 * 60 * 1000; // 5 分钟超时
    function updateStreamingHintsWithTimeout() {
      const now = Date.now();
      let hasTimeout = false;

      // 检测 Thread 消息超时
      threadMessages.forEach(m => {
        if (m.streaming && m.startedAt && (now - m.startedAt > STREAM_TIMEOUT)) {
          console.warn('[Webview] 流式消息超时，自动结束:', m.streamKey);
          m.streaming = false;
          m.timeout = true;
          m.content = (m.content || '') + '\n\n⚠️ 响应超时，已自动结束';
          hasTimeout = true;
        }
      });

      // 检测 CLI 消息超时
      ['claude', 'codex', 'gemini'].forEach(cli => {
        const msgs = cliOutputs[cli] || [];
        msgs.forEach(m => {
          if (m.streaming && m.startedAt && (now - m.startedAt > STREAM_TIMEOUT)) {
            console.warn('[Webview] CLI 流式消息超时，自动结束:', cli);
            m.streaming = false;
            m.timeout = true;
            m.content = (m.content || '') + '\n\n⚠️ 响应超时，已自动结束';
            hasTimeout = true;
          }
        });
      });

      // 如果有超时，更新状态
      if (hasTimeout) {
        const hasActiveStreaming = threadMessages.some(m => m.streaming) ||
          ['claude', 'codex', 'gemini'].some(c => (cliOutputs[c] || []).some(m => m.streaming));
        if (!hasActiveStreaming) {
          setProcessingState(false);
          stopStreamingHintTimer();
        }
        saveWebviewState();
        renderMainContent();
        return;
      }

      // 原有的提示更新逻辑
      updateStreamingHints();
    }

    // 🔧 问题3修复：页面不可见时暂停定时器，节省资源
    // 注意：必须在 stopStreamingHintTimer 和 updateStreamingHintsWithTimeout 定义之后注册
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopRelativeTimeTimer();
        stopStreamingHintTimer();
      } else {
        startRelativeTimeTimer();
        // 如果有活跃的流式消息，重新启动流式提示定时器
        const hasActiveStreaming = threadMessages.some(m => m.streaming) ||
          ['claude', 'codex', 'gemini'].some(cli => (cliOutputs[cli] || []).some(m => m.streaming));
        if (hasActiveStreaming) {
          startStreamingHintTimer();
        }
        // 立即更新一次
        updateRelativeTimes();
        updateStreamingHints();
      }
    });

    // 🔧 P3 修复：增强 setProcessingState，支持强制重置 thinkingStartAt
    function setProcessingState(next, forceResetTimer = false) {
      const changed = isProcessing !== next;
      isProcessing = next;
      if (next) {
        // 如果是新的处理周期或强制重置，更新 thinkingStartAt
        if (!thinkingStartAt || forceResetTimer) {
          thinkingStartAt = Date.now();
        }
      } else {
        thinkingStartAt = null;
      }
      if (changed) {
        updateSendButtonState();
        saveWebviewState();
      }
    }

    function setProcessingActor(source, cli) {
      processingActor = {
        source: source || 'orchestrator',
        cli: cli || 'claude'
      };
      saveWebviewState();
    }

    // 恢复状态时如果正在处理，初始化计时起点
    if (isProcessing) {
      if (!thinkingStartAt) thinkingStartAt = Date.now();
    }

    // 更新发送按钮状态
    function updateSendButtonState() {
      const btn = document.getElementById('execute-btn');
      if (!btn) return;
      if (isProcessing) {
        btn.classList.add('processing');
        btn.title = '停止 (Esc)';
      } else {
        btn.classList.remove('processing');
        btn.title = '发送 (Cmd+Enter)';
      }
    }

    // 打断当前操作
    function interruptCurrentOperation() {
      if (!isProcessing) return;
      vscode.postMessage({ type: 'interruptTask' });
      setProcessingState(false);

      // 停止所有流式消息
      threadMessages = threadMessages.filter(m => {
        if (!m.streaming) return true;
        if (m.content) {
          m.streaming = false;
          m.interrupted = true;
          return true;
        }
        return false;
      });

      saveWebviewState();
      renderMainContent();
      addSystemMessage('操作已中断', 'info');
    }

    vscode.postMessage({ type: 'getState' });
    renderInitialView();

    function renderStatePanels() {
      updateCliDots();
      renderSessionList();
      updateEditsBadge();
      updateTasksBadge();
      renderTasksView();
      renderEditsView();
      if (state?.interactionMode) {
        updateInteractionModeUI(state.interactionMode);
      }
    }

    // 主对话面板渲染节流（避免高频输出造成卡顿）
    let mainContentDebounceTimer = null;
    let pendingRenderCount = 0;
    const RENDER_DEBOUNCE_MS = 80;
    const RENDER_MAX_WAIT_MS = 200; // 最大等待时间，确保不会无限延迟
    let lastRenderTime = 0;

    function scheduleRenderMainContent() {
      pendingRenderCount++;

      // 如果距离上次渲染超过最大等待时间，立即渲染
      const now = Date.now();
      if (now - lastRenderTime > RENDER_MAX_WAIT_MS && pendingRenderCount > 3) {
        if (mainContentDebounceTimer) {
          clearTimeout(mainContentDebounceTimer);
          mainContentDebounceTimer = null;
        }
        pendingRenderCount = 0;
        lastRenderTime = now;
        renderMainContent();
        return;
      }

      if (mainContentDebounceTimer) return;
      mainContentDebounceTimer = setTimeout(() => {
        mainContentDebounceTimer = null;
        pendingRenderCount = 0;
        lastRenderTime = Date.now();
        renderMainContent();
      }, RENDER_DEBOUNCE_MS);
    }

    function buildThinkingPanelHtml(panelId, thinkingItems, expanded) {
      if (!thinkingItems || thinkingItems.length === 0) return '';
      const thinkingContent = thinkingItems.join('\n\n');
      let html = '<div class="collapsible-panel thinking" data-panel-id="' + panelId + '">';
      html += "<div class=\"collapsible-header\" onclick=\"togglePanel('" + panelId + "')\">";
      html += '<span class="collapsible-icon' + (expanded ? ' expanded' : '') + '"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 12.796V3.204L11.481 8 6 12.796z"/></svg></span>';
      html += '<span class="collapsible-title"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/></svg>思考过程</span>';
      html += '<span class="collapsible-badge">' + thinkingItems.length + ' 步</span>';
      html += '</div>';
      html += '<div class="collapsible-content' + (expanded ? ' expanded' : '') + '"><div class="collapsible-body markdown-rendered">' + renderMarkdown(thinkingContent) + '</div></div>';
      html += '</div>';
      return html;
    }

    // 处理来自扩展的消息
    window.addEventListener('message', event => {
      const msg = event.data;
      if (msg.type === 'stateUpdate') {
        state = msg.state;
        const prevSessionId = currentSessionId;
        sessions = state.sessions || [];
        currentSessionId = state.currentSessionId;
        pendingChanges = state.pendingChanges || [];

        // 从后端状态同步 isRunning（只在变化时更新）
        if (state.isRunning !== undefined && state.isRunning !== isProcessing) {
          setProcessingState(state.isRunning);
        }

        // 更新阶段指示器（不触发完整渲染）
        if (state.orchestratorPhase) {
          updatePhaseIndicator(state.orchestratorPhase, state.isRunning);
        }

        const needsSessionLoad = currentSessionId
          && (currentSessionId !== prevSessionId || threadMessages.length === 0);
        if (needsSessionLoad) {
          loadSessionMessages(currentSessionId);
          renderMainContent();
          hasInitialRender = true;
        } else if (!hasInitialRender) {
          renderMainContent();
          hasInitialRender = true;
        }
        if (state.activePlan) {
          // 🔧 修复：如果已有 plan_confirmation 卡片，不再创建 plan_ready 卡片
          const hasPlanConfirmation = threadMessages.some(m => m.type === 'plan_confirmation' && m.isPending);
          const hasPlanPreview = threadMessages.some(m => m.type === 'plan_ready' && m.planId === state.activePlan.planId);
          if (!hasPlanPreview && !hasPlanConfirmation) {
            showPlanPreview(state.activePlan.formattedPlan, state.activePlan.planId, state.activePlan.updatedAt, state.activePlan.review);
          }
          const relatedTask = (state.tasks || []).find(t => t.planId === state.activePlan.planId);
          const reviewRejected = state.activePlan.review?.status === 'rejected';
          const shouldResume = !reviewRejected && relatedTask && relatedTask.status !== 'completed' && !state.isRunning;
          const hasResumeNotice = threadMessages.some(m => m.type === 'system_notice' && String(m.content || '').includes('未完成计划'));
          if (shouldResume && !hasResumeNotice) {
            addSystemMessage('检测到未完成计划，可输入 /start-work 继续执行。', 'warning');
          }
        }
        saveWebviewState();
        renderStatePanels();
      }
      else if (msg.type === 'cliSessionEvent') {
        // 会话事件只记录日志，不展示到 CLI 面板
      }
      // 标准消息处理 - 新的消息流开始
      else if (msg.type === 'standardMessage') {
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          return;
        }
        handleStandardMessage(msg.message);
      }
      // 🆕 标准消息更新 - 流式更新
      else if (msg.type === 'standardUpdate') {
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          return;
        }
        handleStandardUpdate(msg.update);
      }
      // 🆕 标准消息完成
      else if (msg.type === 'standardComplete') {
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          return;
        }
        handleStandardComplete(msg.message);
      }
      else if (msg.type === 'cliStatusChanged') { addSystemMessage(msg.cli + ' 状态已更新', 'info'); updateCliDots(); }
      else if (msg.type === 'cliStatusUpdate') { updateCliConnectionStatus(msg.statuses); }
      else if (msg.type === 'taskInterrupted') {
        // 🔧 风险2修复：任务中断时停止定时器
        stopStreamingHintTimer();
        setProcessingState(false);

        let hasUpdates = false;
        threadMessages.forEach(m => {
          if (m.streaming) {
            m.streaming = false;
            m.interrupted = true;
            hasUpdates = true;
          }
        });

        // 更新 CLI 输出面板中的 streaming 消息
        ['claude', 'codex', 'gemini'].forEach(cli => {
          const messages = cliOutputs[cli] || [];
          messages.forEach(m => {
            if (m.streaming) {
              m.streaming = false;
              m.interrupted = true;
              hasUpdates = true;
            }
          });
        });

        if (hasUpdates) {
          saveWebviewState();
          renderMainContent();
        }
      }
      else if (msg.type === 'promptEnhanceResult') { updatePromptEnhanceStatus(msg.success, msg.message); }
      else if (msg.type === 'promptEnhanced') { handlePromptEnhanced(msg.enhancedPrompt, msg.error); }
      else if (msg.type === 'promptEnhanceConfig') {
        // 从后端接收系统级配置
        const urlInput = document.getElementById('prompt-enhance-url');
        const keyInput = document.getElementById('prompt-enhance-key');
        if (urlInput) urlInput.value = msg.baseUrl || '';
        if (keyInput) keyInput.value = msg.apiKey || '';
      }
      else if (msg.type === 'cliError') { addSystemMessage(msg.cli + ': ' + msg.error, 'error'); }
      else if (msg.type === 'toast') { addSystemMessage(msg.message, msg.toastType || 'info'); }
      else if (msg.type === 'sessionCreated') {
        sessions.push(msg.session);
        currentSessionId = msg.session.id;
        threadMessages = [];
        cliOutputs = { claude: [], codex: [], gemini: [] };
        saveWebviewState();
        renderMainContent();
        renderSessionList();
        addSystemMessage('新会话已创建', 'success');
      }
      else if (msg.type === 'sessionSwitched') { currentSessionId = msg.sessionId; loadSessionMessages(msg.sessionId); saveWebviewState(); renderSessionList(); }
      else if (msg.type === 'sessionsUpdated') { sessions = msg.sessions; saveWebviewState(); renderSessionList(); }
      // showDiff 消息不再需要处理，现在直接在 VS Code 中打开原生 diff 视图
      // 新增：交互模式和验证相关消息
      else if (msg.type === 'interactionModeChanged') { updateInteractionModeUI(msg.mode); addSystemMessage('已切换到 ' + getModeDisplayName(msg.mode) + ' 模式', 'info'); }
      else if (msg.type === 'phaseChanged') {
        // 传递 isRunning 参数
        updatePhaseIndicator(msg.phase, msg.isRunning);
      }
      else if (msg.type === 'verificationResult') {
        if (msg.success) {
          addSystemMessage('验证通过: ' + msg.summary, 'success');
        } else {
          addSystemMessage('验证失败: ' + msg.summary, 'error');
        }
      }
      else if (msg.type === 'recoveryRequest') { showRecoveryDialog(msg.taskId, msg.error, msg.canRetry, msg.canRollback); }
      else if (msg.type === 'recoveryResult') {
        addSystemMessage(msg.message, msg.success ? 'success' : 'error');
      }
      // 执行统计数据更新
      else if (msg.type === 'executionStatsUpdate') {
        updateExecutionStats(msg.stats, msg.orchestratorStats);
      }
      // CLI 降级通知
      else if (msg.type === 'cliFallbackNotice') {
        addSystemMessage(`${msg.originalCli} 降级到 ${msg.fallbackCli}: ${msg.reason}`, 'warning');
      }
      // CLI 任务卡片（子代理面板显示任务信息）
      else if (msg.type === 'cliTaskCard') {
        if (msg.sessionId && msg.sessionId !== currentSessionId) return;
        const cli = msg.cli;
        if (!cli) return;

        const cliMessages = cliOutputs[cli] || [];
        cliMessages.push({
          type: 'task_card',
          role: 'system',
          taskId: msg.taskId,
          subTaskId: msg.subTaskId,
          description: msg.description,
          targetFiles: msg.targetFiles || [],
          reason: msg.reason || '',
          status: msg.status || 'started',
          time: new Date().toLocaleTimeString().slice(0, 5),
          timestamp: Date.now(),
          cli: cli
        });
        cliOutputs[cli] = cliMessages;

        if (currentBottomTab === cli) {
          scheduleRenderMainContent();
        }
        saveWebviewState();
      }
      // [已迁移到 standardMessage] orchestratorMessage 处理已移除
      else if (msg.type === 'questionRequest') {
        // 🔧 P6 修复：增强会话隔离
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          console.log('[Webview] 忽略非当前会话的 questionRequest');
          return;
        }
        showQuestionRequest(msg.questions || []);
      }
      // 🆕 处理需求澄清请求 - 作为普通 AI 消息显示
      else if (msg.type === 'clarificationRequest') {
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          console.log('[Webview] 忽略非当前会话的 clarificationRequest');
          return;
        }
        showClarificationAsMessage(msg.questions, msg.context, msg.ambiguityScore, msg.originalPrompt);
      }
      // 🆕 处理 Worker 问题请求
      else if (msg.type === 'workerQuestionRequest') {
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          console.log('[Webview] 忽略非当前会话的 workerQuestionRequest');
          return;
        }
        showWorkerQuestion(msg.workerId, msg.question, msg.context, msg.options);
      }
      else if (msg.type === 'confirmationRequest') {
        // 🔧 P6 修复：增强会话隔离
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          console.log('[Webview] 忽略非当前会话的 confirmationRequest');
          return;
        }
        showPlanConfirmation(msg.plan, msg.formattedPlan);
      }
      // 🔧 处理 CLI 询问事件
      else if (msg.type === 'cliQuestion') {
        // 🔧 P6 修复：增强会话隔离
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          console.log('[Webview] 忽略非当前会话的 cliQuestion');
          return;
        }
        showCliQuestion(msg);
      }
      // 🔧 处理 CLI 询问超时事件
      else if (msg.type === 'cliQuestionTimeout') {
        // 🔧 P6 修复：增强会话隔离
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          console.log('[Webview] 忽略非当前会话的 cliQuestionTimeout');
          return;
        }
        handleCliQuestionTimeout(msg);
      }
      // 🔧 处理 CLI 询问回答结果
      else if (msg.type === 'cliQuestionAnswered') {
        // 🔧 P6 修复：增强会话隔离
        if (msg.sessionId && msg.sessionId !== currentSessionId) {
          console.log('[Webview] 忽略非当前会话的 cliQuestionAnswered');
          return;
        }
        handleCliQuestionAnswered(msg);
      }
    });


    // 显示执行计划确认 - 只在消息流中添加内联卡片
    function showPlanConfirmation(plan, formattedPlan) {
      // 🔧 修复：将已有的 plan_ready 卡片转换为 plan_confirmation，而不是创建新卡片
      const planReadyIdx = threadMessages.findIndex(m => m.type === 'plan_ready');
      if (planReadyIdx !== -1) {
        // 直接将 plan_ready 转换为 plan_confirmation
        const existingMsg = threadMessages[planReadyIdx];
        existingMsg.type = 'plan_confirmation';
        existingMsg.content = formattedPlan;
        existingMsg.plan = plan;
        existingMsg.isPending = true;
        // 保留原有的 review 信息（如果有）
        saveWebviewState();
        renderMainContent();
        requestAnimationFrame(() => {
          const mainContent = document.getElementById('main-content');
          if (mainContent) {
            mainContent.scrollTop = mainContent.scrollHeight;
          }
        });
        return;
      }

      // 检查是否已存在待确认的消息（避免重复添加）
      const existingPendingIdx = threadMessages.findIndex(m => m.type === 'plan_confirmation' && m.isPending);
      if (existingPendingIdx !== -1) {
        // 已有待确认消息，更新内容
        threadMessages[existingPendingIdx].content = formattedPlan;
        threadMessages[existingPendingIdx].plan = plan;
      } else {

        const confirmationMsg = {
          role: 'system',
          type: 'plan_confirmation',
          content: formattedPlan,

          time: new Date().toLocaleTimeString().slice(0, 5),
          timestamp: Date.now(),
          isPending: true
        };

      renderMainContent();

    // 显示问题补充卡片
    function showQuestionRequest(questions) {
      const normalized = Array.isArray(questions) ? questions.filter(q => q && String(q).trim()) : [];
      if (normalized.length === 0) return;

      const existingIdx = threadMessages.findIndex(m => m.type === 'question_request' && m.isPending);
      if (existingIdx !== -1) {
        threadMessages[existingIdx].questions = normalized;
      } else {
        threadMessages.push({
          role: 'system',
          type: 'question_request',
          questions: normalized,
          time: new Date().toLocaleTimeString().slice(0, 5),
          timestamp: Date.now(),
          isPending: true
        });
      }

      setProcessingState(false);
      saveWebviewState();
      renderMainContent();

        if (mainContent) {
          mainContent.scrollTop = mainContent.scrollHeight;
        }

    // 🆕 显示澄清请求作为普通 AI 消息（参考 Augment 的自然对话模式）
    function showClarificationAsMessage(questions, context, ambiguityScore, originalPrompt) {
      const normalized = Array.isArray(questions) ? questions.filter(q => q && String(q).trim()) : [];
      if (normalized.length === 0) return;

      // 构建澄清消息内容（Markdown 格式）
      let content = '';
      if (context) {
        content += context + '\n\n';
      }
      content += '为了更好地理解您的需求，请帮我澄清以下问题：\n\n';
      normalized.forEach((q, i) => {
        content += `${i + 1}. ${q}\n`;
      });
      content += '\n请在下方输入框中回复您的补充信息。';

      // 作为普通 assistant 消息添加
      threadMessages.push({
        role: 'assistant',
        content: content,
        time: new Date().toLocaleTimeString().slice(0, 5),
        timestamp: Date.now(),
        source: 'orchestrator',
        cli: 'claude',
        // 标记这是澄清消息，用于后续识别
        isClarification: true,
        clarificationData: {
          questions: normalized,
          context: context,
          ambiguityScore: ambiguityScore,
          originalPrompt: originalPrompt
        }
      });

      // 设置等待澄清状态
      window._pendingClarification = {
        questions: normalized,
        context: context,
        ambiguityScore: ambiguityScore,
        originalPrompt: originalPrompt,
        timestamp: Date.now()
      };

      setProcessingState(false);
      saveWebviewState();
      renderMainContent();

      const input = document.getElementById('prompt-input');
      if (input) {
        input.placeholder = '请输入补充信息...';
        input.focus();
      }
      smoothScrollToBottom();
    }

    // 🆕 检查是否有待处理的澄清（使用全局状态而非消息类型）
    function hasPendingClarification() {
      return !!window._pendingClarification;
    }

    // 🆕 处理澄清回答（用户在输入框中自然回复）
    function handleClarificationAnswer(answerText, cancelled) {
      if (!window._pendingClarification) return;

      const clarificationData = window._pendingClarification;

      // 清除待处理状态
      window._pendingClarification = null;

      // 发送澄清回答到后端
      vscode.postMessage({
        type: 'answerClarification',
        answers: cancelled ? null : { _userResponse: answerText },
        additionalInfo: answerText
      });

      const input = document.getElementById('prompt-input');
      if (input) {
        input.placeholder = '描述你的任务... (可粘贴图片)';
      }

      if (!cancelled) {
        setProcessingState(true);
      }

      renderMainContent();
    }

    // 🆕 显示 Worker 问题作为普通 AI 消息（参考 Augment 的自然对话模式）
    function showWorkerQuestion(workerId, question, context, options) {
      // 构建 Worker 问题消息内容（Markdown 格式）
      let content = `**${workerId}** 需要您的帮助：\n\n`;

        content += `\n\n> ${context}`;
      }

      // 作为普通 assistant 消息添加
      threadMessages.push({
        role: 'assistant',
        content: content,
        time: new Date().toLocaleTimeString().slice(0, 5),
        timestamp: Date.now(),
        source: 'worker',
        cli: workerId,
        // 标记这是 Worker 问题，用于后续识别
        isWorkerQuestion: true,
        workerQuestionData: {
          workerId: workerId,
          question: question,
          context: context,
          options: options
        }
      });

      // 设置等待 Worker 问题回答状态
      window._pendingWorkerQuestion = {
        workerId: workerId,
        question: question,
        context: context,
        options: options,
        timestamp: Date.now()
      };

      setProcessingState(false);
      saveWebviewState();
      renderMainContent();

    // 🆕 处理 Worker 问题回答（用户在输入框中自然回复）
    function handleWorkerQuestionAnswer(answer, cancelled) {
      if (!window._pendingWorkerQuestion) return;

      // 清除待处理状态
      window._pendingWorkerQuestion = null;

      vscode.postMessage({
        type: 'answerWorkerQuestion',
        answer: cancelled ? null : (answer || '')
      });

      const input = document.getElementById('prompt-input');
      if (input) {
        input.placeholder = '描述你的任务... (可粘贴图片)';
      }

      if (!cancelled) {
        setProcessingState(true);
      }
      saveWebviewState();
      renderMainContent();
    }

    function handleQuestionAnswer(answer, cancelled) {
      const idx = threadMessages.findIndex(m => m.type === 'question_request' && m.isPending);
      if (idx === -1) return;
      threadMessages[idx].isPending = false;
      threadMessages[idx].answered = !cancelled;
      threadMessages[idx].answer = cancelled ? '' : (answer || '');
      threadMessages[idx].cancelled = !!cancelled;
      vscode.postMessage({ type: 'answerQuestions', answer: cancelled ? null : (answer || '') });
      const input = document.getElementById('prompt-input');
      if (input) {
        input.placeholder = '描述你的任务... (可粘贴图片)';
      }
      saveWebviewState();
      renderMainContent();
      smoothScrollToBottom();
    }

    // 🔧 显示 CLI 询问卡片
    function showCliQuestion(msg) {
      console.log('[Webview] 收到 CLI 询问:', msg);

      // 在 CLI 输出中添加询问卡片
      const cli = msg.cli || 'claude';
      if (!cliOutputs[cli]) {
        cliOutputs[cli] = [];
      }

      // 添加询问消息
      const questionMsg = {
        role: 'cli_question',
        type: 'cli_question',
        cli: cli,
        questionId: msg.questionId,
        content: msg.content,
        pattern: msg.pattern,
        time: new Date().toLocaleTimeString().slice(0, 5),
        timestamp: msg.timestamp || Date.now(),
        isPending: true,
        adapterRole: msg.adapterRole
      };

      cliOutputs[cli].push(questionMsg);

      // 同时在 Thread 面板显示（如果是 orchestrator 模式）
      if (msg.adapterRole === 'orchestrator') {
        threadMessages.push({
          ...questionMsg,
          role: 'system'
        });

      setProcessingState(false);
      saveWebviewState();
      renderMainContent();

        if (mainContent) {
          mainContent.scrollTop = mainContent.scrollHeight;
        }
      });

    // 🔧 处理 CLI 询问超时
    function handleCliQuestionTimeout(msg) {
      console.log('[Webview] CLI 询问超时:', msg);

      const cli = msg.cli || 'claude';
      const questionId = msg.questionId;

      // 更新 CLI 输出中的询问状态
      if (cliOutputs[cli]) {
        const idx = cliOutputs[cli].findIndex(m => m.type === 'cli_question' && m.questionId === questionId);
        if (idx !== -1) {
          cliOutputs[cli][idx].isPending = false;
          cliOutputs[cli][idx].timedOut = true;
          cliOutputs[cli][idx].answer = 'n (超时自动回答)';
        }
      }

      // 更新 Thread 面板中的询问状态
      const threadIdx = threadMessages.findIndex(m => m.type === 'cli_question' && m.questionId === questionId);
      if (threadIdx !== -1) {
        threadMessages[threadIdx].isPending = false;
        threadMessages[threadIdx].timedOut = true;
        threadMessages[threadIdx].answer = 'n (超时自动回答)';
      }

      saveWebviewState();
      renderMainContent();
    }

    // 🔧 处理 CLI 询问回答结果
    function handleCliQuestionAnswered(msg) {
      console.log('[Webview] CLI 询问已回答:', msg);

      const cli = msg.cli || 'claude';
      const questionId = msg.questionId;

      // 更新 CLI 输出中的询问状态
      if (cliOutputs[cli]) {
        const idx = cliOutputs[cli].findIndex(m => m.type === 'cli_question' && m.questionId === questionId);
        if (idx !== -1) {
          cliOutputs[cli][idx].isPending = false;
          cliOutputs[cli][idx].answered = msg.success;
          cliOutputs[cli][idx].answer = msg.answer;
          cliOutputs[cli][idx].error = msg.error;
        }
      }

      // 更新 Thread 面板中的询问状态
      const threadIdx = threadMessages.findIndex(m => m.type === 'cli_question' && m.questionId === questionId);
      if (threadIdx !== -1) {
        threadMessages[threadIdx].isPending = false;
        threadMessages[threadIdx].answered = msg.success;
        threadMessages[threadIdx].answer = msg.answer;
        threadMessages[threadIdx].error = msg.error;
      }

      setProcessingState(true);
      saveWebviewState();
      renderMainContent();
    }

    // 格式化执行计划为 HTML
    function formatPlanHtml(formattedPlan) {
      // 将 Markdown 格式转换为简单 HTML
      return formattedPlan
        .replace(/## (.*)/g, '<h2>$1</h2>')
        .replace(/### (.*)/g, '<h3>$1</h3>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>')
        .replace(/---/g, '<hr>');
    }

    /**
     * 解析代码块语言标签，提取语言和文件路径
     * 支持格式: ```python:path/to/file.py 或 ```python path/to/file.py
     */
    function parseCodeBlockMeta(langLine) {
      if (!langLine) return { lang: 'text', filepath: null };

      // 尝试匹配 language:filepath 或 language filepath
      const colonMatch = langLine.match(/^(\w+):(.+)$/);
      if (colonMatch) {
        return { lang: colonMatch[1], filepath: colonMatch[2].trim() };
      }

      const spaceMatch = langLine.match(/^(\w+)\s+(.+)$/);
      if (spaceMatch) {
        return { lang: spaceMatch[1], filepath: spaceMatch[2].trim() };
      }

      return { lang: langLine || 'text', filepath: null };
    }

    /**
     * 渲染代码块（带行号、文件路径、差异高亮）
     * 使用 highlight.js 进行语法高亮
     */
    function renderCodeBlock(code, lang, filepath) {
      const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
      const trimmedCode = code.replace(/^\n+/, '').replace(/\n+$/, '');
      if (!trimmedCode) return '';

      const lines = trimmedCode.split('\n');
      const isDiff = lang === 'diff' || lines.some(line => /^[+-](?!\+\+|--)\s/.test(line));

      // 使用 highlight.js 高亮整个代码块
      let highlightedCode = '';
      if (typeof hljs !== 'undefined' && lang && lang !== 'text' && lang !== 'diff') {
        try {
          if (hljs.getLanguage(lang)) {
            highlightedCode = hljs.highlight(trimmedCode, { language: lang, ignoreIllegals: true }).value;
          } else {
            // 尝试自动检测
            highlightedCode = hljs.highlightAuto(trimmedCode).value;
          }
        } catch (e) {
          console.warn('[renderCodeBlock] highlight error:', e);
          highlightedCode = escapeHtml(trimmedCode);
        }
      } else {
        highlightedCode = escapeHtml(trimmedCode);
      }

      // 将高亮后的代码按行分割
      const highlightedLines = highlightedCode.split('\n');

      // 构建行号和代码行
      let lineNumbersHtml = '';
      let codeLinesHtml = '';

      lines.forEach((originalLine, idx) => {
        const lineNum = idx + 1;
        lineNumbersHtml += '<div class="code-line-number">' + lineNum + '</div>';

        // 检测差异行
        let lineClass = 'code-line';
        let displayLine = highlightedLines[idx] || '';

        if (isDiff) {
          if (/^[+](?!\+\+)/.test(originalLine)) {
            lineClass += ' diff-add';
            // 移除前导 + 的高亮版本
            displayLine = displayLine.replace(/^[+]/, '');
          } else if (/^[-](?!--)/.test(originalLine)) {
            lineClass += ' diff-del';
            // 移除前导 - 的高亮版本
            displayLine = displayLine.replace(/^[-]/, '');
          }
        }

        codeLinesHtml += '<div class="' + lineClass + '">' + displayLine + '</div>';
      });

      // 构建头部信息
      let headerInfoHtml = '<div class="markdown-code-info">';
      headerInfoHtml += '<span class="markdown-code-lang">' + escapeHtml(lang) + '</span>';

      if (filepath) {
        // 文件路径可点击，跳转到 VSCode
        const fileIcon = '<svg viewBox="0 0 16 16"><path d="M13.5 1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h9.5a.5.5 0 0 0 .5-.5v-12a.5.5 0 0 0-.5-.5zM4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h9.5a1.5 1.5 0 0 0 1.5-1.5V1.5A1.5 1.5 0 0 0 13.5 0H4z"/></svg>';
        headerInfoHtml += '<span class="markdown-code-filepath" onclick="openFileInEditor(\'' + escapeHtml(filepath) + '\')" title="点击在编辑器中打开">' + fileIcon + escapeHtml(filepath) + '</span>';
      }
      headerInfoHtml += '</div>';

      // 构建完整 HTML
      const html = '<div class="markdown-code-block' + (isDiff ? ' diff-block' : '') + '">' +
        '<div class="markdown-code-header">' +
        headerInfoHtml +
        '<div class="markdown-code-actions">' +
        '<button class="markdown-code-btn" onclick="copyCodeBlock(\'' + codeId + '\', this)">复制</button>' +
        '</div></div>' +
        '<div class="markdown-code-content">' +
        '<div class="code-line-numbers">' + lineNumbersHtml + '</div>' +
        '<div class="code-lines" id="' + codeId + '">' + codeLinesHtml + '</div>' +
        '</div></div>';

      return html;
    }

    /**
     * 在编辑器中打开文件
     */
    function openFileInEditor(filepath) {
      if (!filepath) return;
      vscode.postMessage({ type: 'openFile', filepath: filepath });
    }

    // Markdown 渲染函数
    /**
     * Markdown 渲染函数 - 使用 marked 库
     * 支持：标题、列表、代码块、行内代码、粗体、斜体、链接、图片、表格、引用、分隔线
     */
    function renderMarkdown(content) {
      if (!content) return '';

      // 检查 marked 是否可用
      if (typeof marked === 'undefined') {
        console.warn('[renderMarkdown] marked 库未加载，使用简单渲染');
        return escapeHtml(content).replace(/\n/g, '<br>');
      }

      try {
        // 使用自定义 renderer 处理代码块
        const renderer = new marked.Renderer();

        // 自定义代码块渲染（保留行号、diff 高亮、文件路径功能）
        renderer.code = function(code, infostring) {
          const { lang, filepath } = parseCodeBlockMeta(infostring || '');
          return renderCodeBlock(code, lang, filepath);
        };

        // 自定义链接渲染（添加 target="_blank"）
        renderer.link = function(href, title, text) {
          const titleAttr = title ? ` title="${escapeHtml(title)}"` : '';
          return `<a href="${escapeHtml(href)}"${titleAttr} target="_blank" class="markdown-link">${text}</a>`;
        };

        // 自定义图片渲染
        renderer.image = function(href, title, text) {
          const titleAttr = title ? ` title="${escapeHtml(title)}"` : '';
          return `<img src="${escapeHtml(href)}" alt="${escapeHtml(text)}"${titleAttr}>`;
        };

        // 渲染 Markdown
        const html = marked.parse(content, { renderer });
        return html;
      } catch (e) {
        console.error('[renderMarkdown] 解析错误:', e);
        return escapeHtml(content).replace(/\n/g, '<br>');
      }
    }

    function shouldRenderAsCodeBlock(content) {
      if (!content) return false;
      const trimmed = content.trim();
      if (!trimmed) return false;
      if (trimmed.startsWith('```')) return false;
      if (trimmed.startsWith('{') || trimmed.startsWith('[')) return true;
      if (!content.includes('\n')) return false;
      if (/^\s*\d+→/m.test(content)) return true;
      if (/^\s*\d+\s*[:|>]/m.test(content)) return true;
      if (/^\s*\d+\s*-\s+/m.test(content)) return true;
      if (/^\s*\d+\)\s+/m.test(content)) return true;
      if (/^\s*\d+\.\s+/m.test(content)) return true;
      return /^(\s{2,}|\t)/m.test(content);
    }

    function renderToolPanelContent(content) {
      if (!content) return '';
      const text = typeof content === 'string' ? content : String(content);
      let trimmed = text.trim();
      if (!trimmed) return '';
      const fenced = extractSingleCodeFence(trimmed);
      if (fenced) {
        trimmed = (fenced.body || '').trim();
      }
      if (!trimmed) return '';
      const escaped = escapeHtml(trimmed);
      if (trimmed.startsWith('{') || trimmed.startsWith('[') || shouldRenderAsCodeBlock(trimmed)) {
        return '<pre class="tool-raw">' + escaped + '</pre>';
      }
      const normalized = escaped.replace(/(\r?\n){2,}/g, '\n');
      return '<div class="tool-text">' + normalized.replace(/\n/g, '<br>') + '</div>';
    }

    // 渲染单个工具调用项（使用统一卡片组件风格）
    function renderToolCallItem(tool, toolIdx, panelPrefix, isLatest) {
      const toolContent = tool.input || '';
      if (!toolContent || !String(toolContent).trim()) return '';

      const toolPanelId = panelPrefix + '-' + toolIdx;
      const toolStatus = tool.status || 'completed';
      const statusText = toolStatus === 'running' ? '执行中' : toolStatus === 'failed' ? '失败' : '完成';
      const badgeClass = toolStatus === 'running' ? 'badge-running' : toolStatus === 'failed' ? 'badge-failed' : 'badge-completed';

      // 使用统一卡片组件渲染工具调用
      return renderUnifiedCard({
        type: 'tool',
        variant: toolStatus === 'failed' ? 'error' : toolStatus === 'running' ? 'info' : 'success',
        icon: getToolIcon(tool.name),
        title: tool.name || '工具调用',
        badges: [{ text: statusText, class: badgeClass }],
        content: renderToolPanelContent(toolContent),
        collapsed: true,           // 启用折叠功能
        expanded: isLatest,        // 最新的工具调用默认展开
        panelId: toolPanelId,      // 折叠面板 ID
        className: 'tool-item tool-call',
        dataAttrs: { 'panel-id': toolPanelId }
      });
    }

    function renderToolTrack(toolCalls, panelPrefix) {
      if (!toolCalls || toolCalls.length === 0) return '';
      const sorted = [...toolCalls].sort((a, b) => {
        const tsA = a.timestamp || 0;
        const tsB = b.timestamp || 0;
        if (tsA !== tsB) return tsA - tsB;
        return (a.seq || 0) - (b.seq || 0);
      });

      // 过滤有效的工具调用
      const validTools = sorted.filter(tool => {
        if (tool.kind && tool.kind !== 'call') return false;
        if (tool.name === '工具结果') return false;
        const toolContent = tool.input || '';
        return toolContent && String(toolContent).trim();
      });

      if (validTools.length === 0) return '';

      let html = '<div class="tool-track">';
      validTools.forEach((tool, toolIdx) => {
        const isLatest = toolIdx === validTools.length - 1;
        html += renderToolCallItem(tool, toolIdx, panelPrefix, isLatest);
      });
      html += '</div>';
      return html;
    }

    const streamStates = {};

    function getStreamState(cli, role) {
      const key = (role ? role + ':' : '') + (cli || 'orchestrator');
      if (!streamStates[key]) {
        streamStates[key] = {
          pending: '',
          text: '',
          thinking: [],
          toolMap: new Map(),
          hasJson: false,
          completed: false
        };
      }
      return streamStates[key];
    }

    function upsertTool(toolMap, tool) {
      if (!tool) return;
      const isResult = tool.kind === 'result' || tool.name === '工具结果';
      const id = tool.id || tool.tool_call_id || (isResult ? '' : tool.name) || ('tool-' + toolMap.size);
      if (id && toolMap.has(id)) {
        const existing = toolMap.get(id);
        const keepName = existing?.name && (isResult || tool.name === '工具调用');
        toolMap.set(id, {
          ...existing,
          ...tool,
          name: keepName ? existing.name : (tool.name || existing.name),
          input: tool.input ?? existing.input,
          result: tool.result ?? existing.result,
          status: tool.status || existing.status
        });
        return;
      }
      if (isResult) {
        let lastRunningKey = null;
        for (const [key, value] of toolMap.entries()) {
          if (value && (value.kind === 'call' || !value.kind) && (value.status === 'running' || !value.status)) {
            lastRunningKey = key;
          }
        }
        if (lastRunningKey) {
          const existing = toolMap.get(lastRunningKey);
          toolMap.set(lastRunningKey, {
            ...existing,
            result: tool.result ?? existing.result,
            status: 'completed'
          });
          return;
        }
      }
      if (id) {
        toolMap.set(id, tool);
      } else {
        toolMap.set('tool-' + toolMap.size, tool);
      }
    }

    function appendStreamText(state, text) {
      if (!text) return;
      const normalized = String(text);
      if (!normalized.trim()) return;
      if (
        state.text.endsWith(normalized) ||
        state.text.endsWith('\n' + normalized) ||
        state.text.endsWith('\n\n' + normalized)
      ) {
        return;
      }
      state.text += normalized;
    }

    function appendStreamTextWithGap(state, text) {
      if (!text) return;
      const normalized = String(text);
      if (!normalized.trim()) return;
      const candidate = (state.text ? '\n\n' : '') + normalized;
      if (
        state.text.endsWith(normalized) ||
        state.text.endsWith(candidate) ||
        state.text.endsWith('\n' + normalized)
      ) {
        return;
      }
      state.text += candidate;
    }

    function applyParsedChunk(parsed, state) {
      if (parsed.type === 'assistant' && parsed.message?.content) {
        for (const block of parsed.message.content) {
          if (block.type === 'text' && block.text) {
            appendStreamText(state, block.text);
          }
          if (block.type === 'thinking' && block.thinking) {
            state.thinking.push(block.thinking);
          }
          if (block.type === 'tool_use') {
            upsertTool(state.toolMap, {
              id: block.id,
              name: block.name || '工具调用',
              input: formatToolPayload(block.input),
              status: 'running',
              kind: 'call'
            });
          }
          if (block.type === 'tool_result') {
            upsertTool(state.toolMap, {
              id: block.tool_use_id || block.id,
              name: block.name || '工具结果',
              result: formatToolPayload(block.content || block.result || block.output),
              status: 'completed',
              kind: 'result'
            });
            const toolText = formatToolPayload(block.content || block.result || block.output);
            if (toolText) {
              appendStreamTextWithGap(state, toolText);
            }
          }
        }
        return;
      }

      if (parsed.type === 'item.completed' && parsed.item) {
        if (parsed.item.type === 'agent_message' && parsed.item.text) {
          appendStreamText(state, parsed.item.text);
        } else if (parsed.item.type === 'reasoning' && parsed.item.text) {
          state.thinking.push(parsed.item.text);
        }
        return;
      }

      if (parsed.type === 'user' && parsed.message?.content) {
        for (const block of parsed.message.content) {
          if (block.type === 'tool_result') {
            upsertTool(state.toolMap, {
              id: block.tool_use_id || block.id,
              name: block.name || '工具结果',
              result: formatToolPayload(block.content || block.result || block.output),
              status: 'completed',
              kind: 'result'
            });
            const toolText = formatToolPayload(block.content || block.result || block.output);
            if (toolText) {
              appendStreamTextWithGap(state, toolText);
            }
          }
        }
        return;
      }

      if (parsed.type === 'message' && parsed.role === 'user' && Array.isArray(parsed.content)) {
        parsed.content.forEach(block => {
          if (block?.type === 'tool_result') {
            upsertTool(state.toolMap, {
              id: block.tool_use_id || block.id,
              name: block.name || '工具结果',
              result: formatToolPayload(block.content || block.result || block.output),
              status: 'completed',
              kind: 'result'
            });
            const toolText = formatToolPayload(block.content || block.result || block.output);
            if (toolText) {
              appendStreamTextWithGap(state, toolText);
            }
          }
        });
        return;
      }

      if (parsed.type === 'message' && parsed.role === 'assistant' && parsed.content) {
        appendStreamText(state, parsed.content);
        return;
      }

      if (parsed.type === 'thinking' && parsed.content) {
        state.thinking.push(parsed.content);
        return;
      }

      if (parsed.thinking) {
        if (Array.isArray(parsed.thinking)) {
          state.thinking.push(...parsed.thinking);
        } else {
          state.thinking.push(parsed.thinking);
        }
        return;
      }

      const toolCalls = parsed.tool_calls || parsed.toolCalls || parsed.tools;
      if (Array.isArray(toolCalls) && toolCalls.length > 0) {
        toolCalls.forEach(call => {
          const fn = call.function || call.func || {};
          upsertTool(state.toolMap, {
            id: call.id || call.tool_call_id,
            name: call.name || fn.name || '工具调用',
            input: formatToolPayload(call.input || fn.arguments || call.arguments),
            status: call.status || 'running',
            kind: 'call'
          });
        });
        return;
      }

      if (parsed.type === 'tool_call' || parsed.type === 'tool_use') {
        upsertTool(state.toolMap, {
          id: parsed.id || parsed.tool_call_id,
          name: parsed.name || parsed.tool_name || '工具调用',
          input: formatToolPayload(parsed.input || parsed.arguments),
          status: parsed.status || 'running',
          kind: 'call'
        });
        return;
      }

      if (parsed.type === 'tool_result' || parsed.type === 'tool_response') {
        upsertTool(state.toolMap, {
          id: parsed.tool_call_id || parsed.id,
          name: parsed.name || parsed.tool_name || '工具结果',
          result: formatToolPayload(parsed.result || parsed.output || parsed.content),
          status: 'completed',
          kind: 'result'
        });
        const toolText = formatToolPayload(parsed.result || parsed.output || parsed.content);
        if (toolText) {
          state.text += (state.text ? '\n\n' : '') + toolText;
        }
        return;
      }

      if (parsed.type === 'result' && (parsed.result || parsed.response)) {
        if (!state.text) {
          state.text = parsed.result || parsed.response;
        }
        state.completed = true;
      }
    }

    // =========================================================================
    // 🆕 标准消息处理函数
    // =========================================================================

    // 标准消息存储 - 按 messageId 索引
    const standardMessages = new Map();

    /**
     * 处理新的标准消息
     */
    function handleStandardMessage(message) {
      if (!message || !message.id) {
        console.warn('[Webview] 收到无效的标准消息:', message);
        return;
      }

      console.log('[Webview] 收到标准消息:', message.id, message.type, message.lifecycle);

      // 存储消息
      standardMessages.set(message.id, message);

      // 获取目标信息
      const isOrchestrator = message.source === 'orchestrator';
      const cli = message.cli || 'claude';
      const target = message.metadata?.extra?.target || (isOrchestrator ? 'thread' : 'cli');

      // 处理特殊消息类型
      if (message.type === 'plan') {
        // 计划预览消息 - 调用 showPlanPreview
        const content = extractTextFromBlocks(message.blocks || []);
        const planId = message.metadata?.taskId || message.id;
        showPlanPreview(content, planId, message.timestamp, message.metadata?.extra?.review);
        return;
      }

      // 检查是否已存在该消息（避免重复添加）
      const messages = isOrchestrator ? threadMessages : (cliOutputs[cli] || []);
      const existingMsg = messages.find(m => m.standardMessageId === message.id);

      if (existingMsg) {
        // 更新现有消息
        const updatedMsg = standardToWebviewMessage(message);
        Object.assign(existingMsg, updatedMsg);
      } else {
        // 转换为 Webview 消息格式
        const webviewMsg = standardToWebviewMessage(message);

        // 处理进度更新消息的合并逻辑
        if (message.type === 'progress' && isOrchestrator) {
          const milestoneKeywords = [
            '开始', '完成', '成功', '失败', '通过', '未通过', '跳过',
            '第', '轮', '阶段', '验证', '联调', '汇总', '回滚',
            '子任务', '分发', '执行模式'
          ];
          const isMilestone = milestoneKeywords.some(kw => (webviewMsg.content || '').includes(kw));
          const lastProgress = threadMessages[threadMessages.length - 1];
          const lastIsMilestone = lastProgress && lastProgress.messageType === 'progress' &&
            milestoneKeywords.some(kw => (lastProgress.content || '').includes(kw));

          // 只有当前消息和上一条消息都不是里程碑时才合并
          if (lastProgress && lastProgress.messageType === 'progress' &&
              lastProgress.source === 'orchestrator' &&
              !isMilestone && !lastIsMilestone) {
            lastProgress.content = webviewMsg.content;
            lastProgress.timestamp = webviewMsg.timestamp;
            lastProgress.time = webviewMsg.time;
            saveWebviewState();
            scheduleRenderMainContent();
            smoothScrollToBottom();
            return;
          }
        }

        if (isOrchestrator) {
          // 编排者消息 -> Thread 面板
          threadMessages.push(webviewMsg);
        } else {
          // Worker 消息 -> CLI 面板
          if (!cliOutputs[cli]) {
            cliOutputs[cli] = [];
          }
          cliOutputs[cli].push(webviewMsg);
        }
      }

      // 设置处理状态
      if (message.lifecycle === 'streaming') {
        setProcessingState(true);
        setProcessingActor(message.source, cli);
      }

      saveWebviewState();
      scheduleRenderMainContent();
      smoothScrollToBottom();
      updateCliDots();
    }

    /**
     * 处理标准消息更新（流式）
     */
    function handleStandardUpdate(update) {
      if (!update || !update.messageId) {
        return;
      }

      const message = standardMessages.get(update.messageId);
      if (!message) {
        console.warn('[Webview] 未找到消息:', update.messageId);
        return;
      }

      // 应用更新到标准消息
      applyUpdateToStandardMessage(message, update);

      // 查找并更新对应的 Webview 消息
      const isOrchestrator = message.source === 'orchestrator';
      const cli = message.cli || 'claude';
      const messages = isOrchestrator ? threadMessages : (cliOutputs[cli] || []);

      const webviewMsg = messages.find(m => m.standardMessageId === update.messageId);
      if (webviewMsg) {
        // 应用更新
        if (update.updateType === 'append' && update.appendText) {
          webviewMsg.content = (webviewMsg.content || '') + update.appendText;

          // 尝试增量更新 DOM
          const updateSuccess = isOrchestrator
            ? updateStreamingMessage(webviewMsg.streamKey, webviewMsg.content)
            : updateCliStreamingMessage(cli, webviewMsg.content);

          if (!updateSuccess) {
            scheduleRenderMainContent();
          }
        } else if (update.updateType === 'replace' && update.replaceText !== undefined) {
          webviewMsg.content = update.replaceText;
          scheduleRenderMainContent();
        } else if (update.updateType === 'block_update' && update.blocks) {
          // 更新 thinking 和 toolCalls
          const newThinking = extractThinkingFromBlocks(update.blocks);
          const newToolCalls = extractToolCallsFromBlocks(update.blocks);
          if (newThinking.length > 0) {
            webviewMsg.thinking = [...(webviewMsg.thinking || []), ...newThinking];
          }
          if (newToolCalls.length > 0) {
            // 合并工具调用
            const toolMap = new Map((webviewMsg.toolCalls || []).map(t => [t.id, t]));
            for (const tool of newToolCalls) {
              toolMap.set(tool.id, tool);
            }
            webviewMsg.toolCalls = Array.from(toolMap.values());
          }
          scheduleRenderMainContent();
        }
      }

      throttledSaveState();
      smoothScrollToBottom();
      updateCliDots();
    }

    /**
     * 处理标准消息完成
     */
    function handleStandardComplete(message) {
      if (!message || !message.id) {
        return;
      }

      console.log('[Webview] 标准消息完成:', message.id, message.lifecycle);

      // 更新存储的消息
      standardMessages.set(message.id, message);

      // 查找并更新对应的 Webview 消息
      const isOrchestrator = message.source === 'orchestrator';
      const cli = message.cli || 'claude';
      const messages = isOrchestrator ? threadMessages : (cliOutputs[cli] || []);

      const webviewMsg = messages.find(m => m.standardMessageId === message.id);
      if (webviewMsg) {
        // 更新最终状态
        const finalMsg = standardToWebviewMessage(message);
        Object.assign(webviewMsg, finalMsg);
        webviewMsg.streaming = false;

        if (message.lifecycle === 'interrupted') {
          webviewMsg.interrupted = true;
        }
        if (message.lifecycle === 'failed') {
          webviewMsg.error = message.metadata?.error;
        }
      }

      // 检查是否还有活跃的流式消息
      const hasActiveStreaming = threadMessages.some(m => m.streaming) ||
        ['claude', 'codex', 'gemini'].some(c => (cliOutputs[c] || []).some(m => m.streaming));

      if (!hasActiveStreaming) {
        stopStreamingHintTimer();
        setProcessingState(false);
      }

      saveWebviewState();
      scheduleRenderMainContent();
      smoothScrollToBottom();
    }

    /**
     * 将标准消息转换为 Webview 消息格式
     */
    function standardToWebviewMessage(message) {
      // 🆕 直接使用后端已解析的 blocks，不再重新解析
      const blocks = message.blocks || [];
      const textContent = extractTextFromBlocks(blocks);
      const thinking = extractThinkingFromBlocks(blocks);
      const toolCalls = extractToolCallsFromBlocks(blocks);
      const codeBlocks = extractCodeBlocksFromBlocks(blocks);

      return {
        role: message.source === 'user' ? 'user' : 'assistant',
        content: textContent,
        time: new Date(message.timestamp).toLocaleTimeString().slice(0, 5),
        timestamp: message.timestamp,
        streaming: message.lifecycle === 'streaming',
        startedAt: message.lifecycle === 'streaming' ? Date.now() : undefined,
        source: message.source,
        cli: message.cli,
        streamKey: generateStreamKey(message.source, message.cli),
        thinking: thinking,
        toolCalls: toolCalls,
        codeBlocks: codeBlocks,  // 🆕 新增：已解析的代码块
        parsedBlocks: blocks,     // 🆕 新增：保留原始 blocks 供渲染使用
        // 标准消息扩展字段
        standardMessageId: message.id,
        traceId: message.traceId,
        lifecycle: message.lifecycle,
        messageType: message.type,
      };
    }

    /**
     * 从内容块中提取文本（包括 markdown）
     * 🆕 后端已解析，这里只需要提取
     */
    function extractTextFromBlocks(blocks) {
      return blocks
        .filter(b => b.type === 'text')
        .map(b => b.content)
        .join('\n');
    }

    /**
     * 🆕 从内容块中提取代码块
     */
    function extractCodeBlocksFromBlocks(blocks) {
      return blocks
        .filter(b => b.type === 'code')
        .map(b => ({
          language: b.language || 'text',
          content: b.content,
          filename: b.filename,
        }));
    }

    /**
     * 从内容块中提取思考内容
     */
    function extractThinkingFromBlocks(blocks) {
      return blocks
        .filter(b => b.type === 'thinking')
        .map(b => ({
          content: b.content,
          summary: b.summary,
        }));
    }

    /**
     * 从内容块中提取工具调用
     */
    function extractToolCallsFromBlocks(blocks) {
      return blocks
        .filter(b => b.type === 'tool_call')
        .map(b => ({
          id: b.toolId,
          name: b.toolName,
          status: b.status,
          input: b.input,
          output: b.output,
          error: b.error,
        }));
    }

    /**
     * 应用更新到标准消息
     */
    function applyUpdateToStandardMessage(message, update) {
      if (update.updateType === 'append' && update.appendText) {
        // 找到或创建文本块
        let textBlock = message.blocks.find(b => b.type === 'text');
        if (!textBlock) {
          textBlock = { type: 'text', content: '', isMarkdown: true };
          message.blocks.push(textBlock);
        }
        textBlock.content += update.appendText;
      } else if (update.updateType === 'replace' && update.replaceText !== undefined) {
        let textBlock = message.blocks.find(b => b.type === 'text');
        if (!textBlock) {
          textBlock = { type: 'text', content: '', isMarkdown: true };
          message.blocks.push(textBlock);
        }
        textBlock.content = update.replaceText;
      } else if (update.updateType === 'block_update' && update.blocks) {
        // 合并新的块
        for (const newBlock of update.blocks) {
          if (newBlock.type === 'tool_call') {
            // 工具调用按 ID 更新
            const existing = message.blocks.find(b => b.type === 'tool_call' && b.toolId === newBlock.toolId);
            if (existing) {
              Object.assign(existing, newBlock);
            } else {
              message.blocks.push(newBlock);
            }
          } else {
            message.blocks.push(newBlock);
          }
        }
      }
    }

    // 复制代码块（适配新的行号结构）
    function copyCodeBlock(codeId, btn) {
      const codeEl = document.getElementById(codeId);
      if (!codeEl) return;

      // 新结构：代码在 .code-lines 中，每行是一个 .code-line div
      // 需要提取纯文本，忽略差异标记
      let text = '';
      const lines = codeEl.querySelectorAll('.code-line');
      if (lines.length > 0) {
        text = Array.from(lines).map(line => {
          // 获取行文本，移除差异前缀（如果有）
          let lineText = line.textContent;
          // 差异行的 ::before 伪元素不会被 textContent 获取，所以直接返回
          return lineText;
        }).join('\n');
      } else {
        // 兼容旧结构
        text = codeEl.textContent;
      }

      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    /**
     * 直接渲染后端已解析的 blocks
     * 这是唯一的渲染入口，不再需要前端解析
     */
    function renderParsedBlocks(blocks, cli) {
      if (!blocks || blocks.length === 0) {
        return { html: '', isMarkdown: false };
      }

      let html = '';
      let hasMarkdown = false;

      for (const block of blocks) {
        switch (block.type) {
          case 'text':
            if (block.isMarkdown) {
              html += '<div class="markdown-rendered">' + renderMarkdown(block.content) + '</div>';
              hasMarkdown = true;
            } else {
              html += formatSimpleContent(block.content);
            }
            break;

          case 'code':
            const lang = block.language || 'text';
            const filename = block.filename || '';
            html += renderCodeBlock(block.content, lang, filename);
            hasMarkdown = true;
            break;

          case 'thinking':
            // 思考块通常在消息头部单独渲染，这里跳过
            break;

          case 'tool_call':
            // 工具调用块通常在消息底部单独渲染，这里跳过
            break;

          default:
            // 未知类型，作为文本处理
            html += formatSimpleContent(block.content || '');
        }
      }

      return { html, isMarkdown: hasMarkdown };
    }

    /**
     * 渲染消息内容 - 区分流式和完成状态
     * 流式阶段：使用 content 直接渲染（简单 Markdown）
     * 完成阶段：使用后端解析的 parsedBlocks 渲染（结构化）
     */
    function renderMessageContentSmart(message, cli) {
      // 流式阶段：parsedBlocks 可能为空，使用累积的 content 直接渲染
      if (message.streaming) {
        const content = message.content || '';
        if (!content) {
          return { html: '', isMarkdown: false };
        }
        // 流式时使用简单 Markdown 渲染，避免不完整代码块的闪烁
        return {
          html: renderMarkdown(content),
          isMarkdown: true
        };
      }

      // 完成阶段：使用后端解析的 blocks 渲染（代码高亮、结构化）
      if (message.parsedBlocks && message.parsedBlocks.length > 0) {
        return renderParsedBlocks(message.parsedBlocks, cli);
      }

      // 兜底：如果没有 blocks，用 content 渲染
      const content = message.content || '';
      if (!content) {
        return { html: '', isMarkdown: false };
      }
      return {
        html: renderMarkdown(content),
        isMarkdown: true
      };
    }

    function getLatestTaskStats() {
      const tasks = state?.tasks || [];
      if (tasks.length === 0) {
        return { filesCount: 0, completedSubTasks: 0, totalSubTasks: 0 };
      }
      const task = tasks[tasks.length - 1];
      const subTasks = task?.subTasks || [];
      const completedSubTasks = subTasks.filter(st => st.status === 'completed').length;
      const totalSubTasks = subTasks.length;
      const modifiedFiles = new Set();
      subTasks.forEach(st => {
        const files = st.modifiedFiles && st.modifiedFiles.length > 0
          ? st.modifiedFiles
          : (st.targetFiles || []);
        (files || []).forEach(file => {
          if (typeof file === 'string' && file.trim()) {
            modifiedFiles.add(file);
          }
        });
      });
      if (modifiedFiles.size === 0 && Array.isArray(pendingChanges) && pendingChanges.length > 0) {
        pendingChanges.forEach(change => {
          if (change?.filePath) {
            modifiedFiles.add(change.filePath);
          }
        });
      }
      return {
        filesCount: modifiedFiles.size,
        completedSubTasks,
        totalSubTasks,
      };
    }

    // 简单内容格式化（纯渲染，不做内容类型判断）
    function formatSimpleContent(content) {
      if (!content) return '';

      // 保护行内代码
      const inlineCodePlaceholders = [];
      let processed = content.replace(/`([^`]+)`/g, function(match, code) {
        const idx = inlineCodePlaceholders.length;
        inlineCodePlaceholders.push('<code>' + escapeHtml(code) + '</code>');
        return `__SIMPLECODE_${idx}__`;
      });
      // 保护粗体
      const boldPlaceholders = [];
      processed = processed.replace(/\*\*(.*?)\*\*/g, function(match, text) {
        const idx = boldPlaceholders.length;
        boldPlaceholders.push('<strong>' + escapeHtml(text) + '</strong>');
        return `__SIMPLEBOLD_${idx}__`;
      });
      // 转义剩余内容
      processed = escapeHtml(processed);
      // 还原占位符
      processed = processed.replace(/__SIMPLECODE_(\d+)__/g, (_, idx) => inlineCodePlaceholders[parseInt(idx)]);
      processed = processed.replace(/__SIMPLEBOLD_(\d+)__/g, (_, idx) => boldPlaceholders[parseInt(idx)]);
      // 处理换行（压缩连续空行，避免行间距过大）
      const normalized = processed.replace(/(\r?\n){2,}/g, '\n');
      return normalized.replace(/\n/g, '<br>');
    }

    // 获取模式显示名称
    function getModeDisplayName(mode) {
      switch (mode) {
        case 'ask': return '对话';
        case 'agent': return '代理';
        case 'auto': return '自动';
        default: return mode;
      }
    }

    // 更新阶段指示器
    function updatePhaseIndicator(phase, isRunningFromBackend) {
      console.log('[Webview] 当前阶段:', phase, '后端运行状态:', isRunningFromBackend);
      const indicator = document.getElementById('phase-indicator');
      if (!indicator) return;

      // 阶段映射
      const phaseMap = {
        'idle': 0,
        'started': 1,  // 新增
        'phase1_analysis': 1,
        'analyzing': 1,
        'phase2_waiting_confirmation': 2,
        'waiting_confirmation': 2,
        'waiting_questions': 2,
        'phase3_execution': 3,
        'dispatching': 3,
        'monitoring': 3,
        'integrating': 4,
        'phase4_verification': 5,
        'verifying': 5,
        'phase5_recovery': 6,
        'recovering': 6,
        'phase6_summary': 7,
        'summarizing': 7,
        'completed': 8,
        'failed': -1,
        'interrupted': -2  // 新增
      };

      const currentPhaseNum = phaseMap[phase] || 0;

      // 根据阶段和后端状态更新 isProcessing
      let nextProcessing = false;
      if (isRunningFromBackend !== undefined) {
        nextProcessing = isRunningFromBackend;
      } else {
        // 根据阶段推断运行状态
        nextProcessing = currentPhaseNum > 0 && currentPhaseNum < 7;
      }
      if (phase === 'waiting_questions') {
        nextProcessing = false;
      }

      // 🔧 修复：任务完成/失败/中断时，清理所有 streaming 状态
      if (!nextProcessing && (phase === 'completed' || phase === 'failed' || phase === 'interrupted' || phase === 'idle')) {
        let hasUpdates = false;
        threadMessages.forEach(m => {
          if (m.streaming) {
            m.streaming = false;
            hasUpdates = true;
          }
        });
        ['claude', 'codex', 'gemini'].forEach(cli => {
          const msgs = cliOutputs[cli] || [];
          msgs.forEach(m => {
            if (m.streaming) {
              m.streaming = false;
              hasUpdates = true;
            }
          });
        });
        if (hasUpdates) {
          saveWebviewState();
          renderMainContent();
        }
      }

      setProcessingState(nextProcessing);

      // 显示/隐藏指示器
      if (currentPhaseNum > 0 && currentPhaseNum < 8) {
        indicator.classList.add('visible');
      } else {
        indicator.classList.remove('visible');
      }

      // 更新各阶段状态
      const steps = indicator.querySelectorAll('.phase-step');
      const connectors = indicator.querySelectorAll('.phase-step-connector');

      steps.forEach((step, idx) => {
        const stepNum = idx + 1;
        step.classList.remove('active', 'completed');
        if (stepNum === currentPhaseNum) {
          step.classList.add('active');
        } else if (stepNum < currentPhaseNum) {
          step.classList.add('completed');
        }
      });

      connectors.forEach((conn, idx) => {
        conn.classList.toggle('completed', idx + 1 < currentPhaseNum);
      });
    }

    // 顶部 Tab 切换
    document.querySelectorAll('.top-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTopTab = tab.dataset.tab;
        // 切换 Tab 面板
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-' + currentTopTab)?.classList.add('active');
        render();
      });
    });

    // 底部 Tab 切换 - 切换消息区域内容
    document.querySelectorAll('.bottom-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // 切换前保存当前滚动位置
        saveScrollPosition();

        document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const newTab = tab.dataset.bottomTab;
        currentBottomTab = newTab;
        renderMainContent();

        // 切换后：如果有保存的位置则恢复，否则滚动到底部
        requestAnimationFrame(() => {
          const mainContent = document.getElementById('main-content');
          if (mainContent) {
            const savedPos = scrollPositions[newTab];
            if (savedPos !== undefined && savedPos > 0) {
              mainContent.scrollTop = savedPos;
            } else {
              // 默认滚动到底部
              mainContent.scrollTop = mainContent.scrollHeight;
            }
          }
        });
      });
    });

    /**
     * 统一卡片组件 - 所有卡片类型的基础渲染函数
     * @param {object} options - 卡片配置
     * @returns {string} - HTML 字符串
     */
    function renderUnifiedCard(options) {
      const {
        type = 'default',      // 卡片类型：task, summary, error, notice, plan, question, tool
        variant = '',          // 变体：orchestrator, claude, codex, gemini, success, error, warning, info
        icon = '',             // 图标 SVG 字符串
        title = '',            // 标题
        badges = [],           // 徽章数组 [{ text, class }]
        time = '',             // 时间
        content = '',          // 内容 HTML
        footer = '',           // 底部 HTML
        collapsed = false,     // 是否可折叠
        expanded = true,       // 是否展开
        panelId = '',          // 折叠面板 ID
        dataAttrs = {},        // 额外 data-* 属性
        className = ''         // 额外 CSS 类
      } = options;

      const variantClass = variant ? ' card-' + variant : '';
      const typeClass = ' card-type-' + type;
      const collapsedClass = collapsed ? ' collapsible-panel' : '';
      const extraClass = className ? ' ' + className : '';

      // 构建 data 属性
      let dataStr = '';
      if (panelId) dataStr += ' data-panel-id="' + panelId + '"';
      Object.entries(dataAttrs).forEach(([key, val]) => {
        dataStr += ' data-' + key + '="' + escapeHtml(String(val)) + '"';
      });

      let html = '<div class="unified-card' + typeClass + variantClass + collapsedClass + extraClass + '"' + dataStr + '>';

      // 卡片头部
      if (title || icon || badges.length || time) {
        const headerClick = collapsed && panelId ? ' onclick="togglePanel(\'' + panelId + '\')"' : '';
        html += '<div class="card-header"' + headerClick + '>';
        if (icon) {
          html += '<span class="card-icon">' + icon + '</span>';
        }
        if (title) {
          html += '<span class="card-title">' + escapeHtml(title) + '</span>';
        }
        if (badges.length > 0) {
          html += '<span class="card-badges">';
          badges.forEach(badge => {
            const badgeClass = badge.class ? ' ' + badge.class : '';
            html += '<span class="card-badge' + badgeClass + '">' + escapeHtml(badge.text) + '</span>';
          });
          html += '</span>';
        }
        if (time) {
          html += '<span class="card-time">' + escapeHtml(time) + '</span>';
        }
        if (collapsed) {
          html += '<span class="collapsible-icon' + (expanded ? ' expanded' : '') + '"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 12.796V3.204L11.481 8 6 12.796z"/></svg></span>';
        }
        html += '</div>';
      }

      // 卡片内容
      if (content) {
        const contentExpandedClass = collapsed ? (expanded ? ' expanded' : '') : '';
        if (collapsed) {
          html += '<div class="collapsible-content' + contentExpandedClass + '"><div class="card-body">' + content + '</div></div>';
        } else {
          html += '<div class="card-body">' + content + '</div>';
        }
      }

      // 卡片底部
      if (footer) {
        html += '<div class="card-footer">' + footer + '</div>';
      }

      html += '</div>';
      return html;
    }

    /**
     * 获取消息的角色信息（用于显示徽章）
     * @param {object} message - 消息对象
     * @param {string} source - 消息来源 ('orchestrator' | 'worker')
     * @param {string} defaultCli - 默认 CLI 类型
     * @returns {{ roleName: string, badgeClass: string }}
     */
    function getRoleInfo(message, source, defaultCli) {
      if (message.role === 'user') {
        return { roleName: '', badgeClass: '' };
      }
      if (source === 'orchestrator') {
        return { roleName: 'Orchestrator', badgeClass: 'orchestrator' };
      }
      if (message.cli) {
        return { roleName: message.cli.toUpperCase(), badgeClass: message.cli.toLowerCase() };
      }
      if (defaultCli) {
        return { roleName: defaultCli.toUpperCase(), badgeClass: defaultCli.toLowerCase() };
      }
      return { roleName: 'AI', badgeClass: 'assistant' };
    }

    /**
     * 获取消息分组键（用于判断是否与上一条消息同源）
     * @param {object} message - 消息对象
     * @param {string} source - 消息来源
     * @returns {string}
     */
    function getMessageGroupKey(message, source) {
      if (message.role === 'user') return 'user';
      return source + '-' + (message.cli || 'ai');
    }

     * @returns {string|null} - 返回 HTML 字符串，或 null 表示普通消息
     */
    function renderSpecialMessage(m, idx, tabType) {
      // 任务卡片（CLI 面板专用）
      if (m.type === 'task_card') {
        return renderTaskCard(m, idx);
      }
      // 系统通知（所有面板通用）
      if (m.type === 'system_notice') {
        return renderSystemNotice(m, idx);
      }
      // 错误消息（所有面板通用）
      if (m.type === 'error' || m.isError) {
        return renderErrorMessage(m, idx);
      }
      // 以下仅 Thread 面板支持
      if (tabType === 'thread') {
        if (m.type === 'plan_confirmation') {
          return renderPlanConfirmationCard(m, idx);
        }
        if (m.type === 'plan_ready') {
          return renderPlanPreviewCard(m, idx);
        }
        if (m.type === 'question_request') {
          return renderQuestionCard(m, idx);
        }
        // 🔧 CLI 询问卡片
        if (m.type === 'cli_question') {
          return renderCliQuestionCard(m, idx);
        }
        // 注意：clarification_request 和 worker_question 现在作为普通 assistant 消息显示
        // 不再使用特殊卡片渲染
      }
      return null; // 普通消息，需要使用 renderMessageBlock
